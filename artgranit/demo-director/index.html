  .rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:14px;background:var(--green-l);color:var(--green-d);flex:0 0 30px} .rank.top{background:var(--accent);color:#3a2c00}
  .agent .who2{flex:1;min-width:0} .agent .who2 b{font-size:13.5px} .agent .who2 .z{font-size:11px;color:var(--muted)}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
.langtg{margin-left:auto;display:flex;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:3px}
.langtg button{border:0;background:transparent;color:#fff;font-family:inherit;font-weight:800;font-size:11.5px;letter-spacing:.04em;padding:5px 11px;border-radius:999px;cursor:pointer}
.langtg button.on{background:#c9a227;color:#241c00}
.topbar .role{margin-left:12px}
</style>
