<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diolsem — Panou General (demo Director General / CEO)</title>
<!--
  DEMO INTERN pentru DIRECTORUL GENERAL (CEO).
  Vedere executivă pe toată compania: finanțe, vânzări & magazine, producere,
  achiziții & stoc, echipă, plus deciziile AI. Date DEMO — se completează cu
  cele reale Diolsem. Concept confidențial, proprietatea dezvoltatorului.
-->
<style>
  :root{
    --green:#2e7d32;--green-d:#1b5e20;--green-l:#e8f5e9;--bg:#eef2ec;--card:#fff;
    --ink:#1f2a24;--muted:#6b7a70;--line:#e2e8e2;--amber:#ef6c00;--blue:#1565c0;--accent:#f9a825;--red:#c62828;
    --shadow:0 8px 24px rgba(27,94,32,.10);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:38px;height:38px;color:#fff;flex:0 0 38px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .demo-badge{background:var(--accent);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}

  .shell{display:grid;grid-template-columns:230px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--green-l)} .nav button.on{background:var(--green);color:#fff}
  .nav .mi{font-size:17px;flex:0 0 20px;text-align:center}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0} .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:20px;color:var(--green-d);display:block} .kpi span{font-size:12px;color:var(--muted)}
  .kpi .up{color:var(--green);font-weight:700;font-size:12px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--green-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .split{padding:8px 0}
  .split .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .split .lab b{font-weight:700}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:999px;background:var(--green)}

  .row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4}
  .row:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.ok{background:#e8f5e9;color:var(--green-d)} .st.warn{background:#fff3e0;color:var(--amber)} .st.risk{background:#fdecea;color:var(--red)}
  .row .grow{flex:1} .row .val{font-weight:700;color:var(--ink);font-size:12.5px}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45}
  .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .wish{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .wish h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .wish p.sub{margin:0 0 12px;font-size:12.5px;opacity:.9}
  .wish ol{margin:0;padding-left:20px} .wish li{padding:5px 0;font-size:13.5px;line-height:1.45}
  .wish li b{background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" aria-hidden="true"><g fill="currentColor">
    <circle cx="31.9" cy="16.1" r="7.8"/><circle cx="16.1" cy="16.1" r="7.8"/>
    <circle cx="31.9" cy="31.9" r="7.8"/><circle cx="16.1" cy="31.9" r="7.8"/>
    <rect x="21.6" y="21.6" width="4.8" height="4.8" rx="1.4"/>
  </g></svg>
  <div class="brand"><b>Diolsem</b><span>Panou general</span></div>
  <div class="role">👤 Director General (CEO) <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ===== DATE DEMO — se completează cu cele reale Diolsem ===== */
const LINES=[["Producție proprie (îngrășăminte + protecție)",46],["Revânzare (semințe, import, unelte)",54]];
const CHAN=[["B2B — fermieri, distribuitori",41],["Retail — magazine",34],["Online diolsem.md",25]];
const STORES=[
  {n:"Magazin Central · Chișinău",v:"42 800 lei/zi"},{n:"Magazin Nord · Bălți",v:"18 300 lei/zi"},
  {n:"Magazin Sud · Cahul",v:"15 100 lei/zi"},{n:"Online diolsem.md",v:"27 500 lei/zi"}
];
const RISK=[
  ["risc","3 creanțe restante peste 30 de zile","210 000 lei"],
  ["warn","7 produse sub prag de stoc","reaprovizionare"],
  ["warn","Marjă în scădere pe linia „unelte import”","curs valutar"],
  ["ok","Flux de numerar pozitiv","+420 000 lei luna aceasta"]
];
const DEPTS=[["Vânzări",29],["Producere",11],["Logistică",9],["Achiziții",5],["Contabilitate",4],["Marketing",3],["Conducere",2]];

const WISH=[
  ["Tablou de bord consolidat în timp real","— toate magazinele, online, producția și finanțele într-un singur ecran"],
  ["Prognoză de cerere și de flux de numerar pe sezon","— decid producția și achizițiile din timp"],
  ["Profitabilitate pe linie de business, magazin și produs","— știu unde câștig și unde pierd"],
  ["Alerte automate de risc","— creanțe restante, rupturi de stoc, marjă în scădere"],
  ["Raport executiv automat, zilnic, în limbaj natural",""],
  ["Scenarii „what-if” pentru decizii","— producție, investiții, prețuri, pe date"]
];

const NAV=[
  ["overview","📊","Privire de ansamblu"],
  ["finante","💵","Finanțe"],
  ["vanzari","🏬","Vânzări & magazine"],
  ["producere","🏭","Producere"],
  ["stoc","📦","Achiziții & stoc"],
  ["echipa","👥","Echipă"],
  ["ai","🤖","Decizii AI"]
];
let view="overview";
const $=s=>document.querySelector(s);
function renderNav(){ $('#nav').innerHTML=NAV.map(n=>`<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`).join(''); }
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;

function splits(arr){ return arr.map(x=>`<div class="split"><div class="lab"><span>${x[0]}</span><b>${x[1]}%</b></div><div class="bar"><i style="width:${x[1]}%"></i></div></div>`).join(''); }
function risks(arr){ const lbl={ok:"OK",warn:"atenție",risk:"risc"}; return arr.map(r=>`<div class="row"><span class="st ${r[0]}">${lbl[r[0]]}</span><span class="grow">${r[1]}</span><span class="val">${r[2]}</span></div>`).join(''); }
function autoList(arr){ return arr.map(a=>`<div class="auto"><span class="b">✓</span><span><b>${a[0]}</b>${a[1]?`<span class="benefit">${a[1]}</span>`:''}</span></div>`).join(''); }

function renderMain(){
  const m=$('#main');
  if(view==="overview"){
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Privire de ansamblu</h1><p>Compania la zi — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>2,41 mln lei</b><span>cifră de afaceri (luna)</span></div>
        <div class="kpi"><b>34%</b><span>marjă brută</span></div>
        <div class="kpi"><b>312 000 lei</b><span>profit net (luna)</span></div>
        <div class="kpi"><b class="up">+17%</b><span>creștere vs. anul trecut</span></div>
      </div>
      <div class="wish">
        <h3>🎯 Ce aș automatiza întâi — ca director general</h3>
        <p class="sub">Lucrurile pe care le-aș vrea pe un singur ecran, ca să conduc pe date, nu pe rapoarte întârziate:</p>
        <ol>${WISH.map(w=>`<li>${w[0]} ${w[1]?`<b>${w[1].replace(/^— /,'')}</b>`:''}</li>`).join('')}</ol>
      </div>
      <div class="grid">
        <div class="card"><h3>🧩 Linii de business</h3>${splits(LINES)}</div>
        <div class="card"><h3>🛒 Canale de vânzare</h3>${splits(CHAN)}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚠️ Radar de risc <span class="c">timp real</span></h3>${risks(RISK)}</div>
    `;
  } else if(view==="finante"){
    m.innerHTML=`
      <div class="h"><div class="ic">💵</div><div><h1>Finanțe</h1><p>Profitabilitate și flux de numerar — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>18,6 mln lei</b><span>cifră de afaceri (an, YTD)</span></div>
        <div class="kpi"><b>2,3 mln lei</b><span>profit net (YTD)</span></div>
        <div class="kpi"><b class="up">+420 000 lei</b><span>flux de numerar (luna)</span></div>
        <div class="kpi"><b>980 000 lei</b><span>creanțe de încasat</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>📈 Profitabilitate pe linie</h3>${splits([["Producție proprie — marjă 41%",41],["Revânzare — marjă 28%",28]])}</div>
        <div class="card"><h3>⚠️ Creanțe</h3>${risks([["risk","Restante peste 30 de zile","210 000 lei"],["warn","Scadente săptămâna aceasta","320 000 lei"],["ok","Încasat luna aceasta","1,9 mln lei"]])}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm în finanțe <span class="c">AI</span></h3>
        ${autoList([["Confirmarea automată a încasărilor pe oferte","plata se potrivește singură cu proforma"],["Situația creanțelor în timp real","cine datorează, cât, de când"],["Prognoză de flux de numerar pe sezon","anticipezi golurile de lichiditate"],["Raport financiar executiv automat","fără să aștepți închiderea lunii"]])}
      </div>
    `;
  } else if(view==="vanzari"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏬</div><div><h1>Vânzări & magazine</h1><p>Consolidat pe canale și puncte — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>103 700 lei</b><span>vânzări azi (toate)</span></div>
        <div class="kpi"><b>3 200</b><span>comenzi (luna)</span></div>
        <div class="kpi"><b>4</b><span>magazine (3 + online)</span></div>
        <div class="kpi"><b class="up">+17%</b><span>vs. anul trecut</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>🛒 Pe canale</h3>${splits(CHAN)}</div>
        <div class="card"><h3>🏬 Pe magazine</h3>${STORES.map(s=>`<div class="row"><span class="grow">${s.n}</span><span class="val">${s.v}</span></div>`).join('')}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Tablou consolidat: magazine + online, în timp real",""],["Prognoză de vânzări pe magazin și sezon",""],["Aceeași politică de preț pe toate canalele, inclusiv online","modificabilă doar de directorul de vânzări"],["Profitabilitate pe magazin și pe produs",""]])}
      </div>
    `;
  } else if(view==="producere"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏭</div><div><h1>Producere</h1><p>Diolsem e producător — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>72%</b><span>capacitate utilizată</span></div>
        <div class="kpi"><b>340 t</b><span>output (luna)</span></div>
        <div class="kpi"><b>12</b><span>loturi în producție</span></div>
        <div class="kpi"><b>98%</b><span>loturi conforme QC</span></div>
      </div>
      <div class="card"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Planificare a producției pe cerere","produci ce se va cere, din prognoza de vânzări"],["Trasabilitate completă a lotului","de la materie primă la client, în secunde"],["Control de calitate digital + alerte omologare/valabilitate",""],["Corelare producție ↔ stoc ↔ achiziții","fără rupturi în vârf de sezon"]])}
      </div>
    `;
  } else if(view==="stoc"){
    m.innerHTML=`
      <div class="h"><div class="ic">📦</div><div><h1>Achiziții & stoc</h1><p>Capital în stoc și aprovizionare — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>3,1 mln lei</b><span>valoare stoc</span></div>
        <div class="kpi"><b>7</b><span>produse sub prag</span></div>
        <div class="kpi"><b>3</b><span>importuri în tranzit</span></div>
        <div class="kpi"><b>21</b><span>zile stoc mediu</span></div>
      </div>
      <div class="card"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Reaprovizionare predictivă","comanzi la timp, ținând cont de termenele de import"],["Urmărire termene import + curs valutar",""],["Alerte de rupturi de stoc, pe magazin",""],["Citire automată a facturilor furnizorilor",""]])}
      </div>
    `;
  } else if(view==="echipa"){
    const tot=DEPTS.reduce((s,d)=>s+d[1],0);
    m.innerHTML=`
      <div class="h"><div class="ic">👥</div><div><h1>Echipă</h1><p>${tot} angajați pe departamente — date demo</p></div></div>
      <div class="card"><h3>👥 Angajați pe departamente <span class="c">${tot}</span></h3>
        ${DEPTS.map(d=>`<div class="row"><span class="grow">${d[0]}</span><span class="val">${d[1]}</span></div>`).join('')}
        <p style="color:var(--muted);font-size:12px;margin:10px 0 0">+ vânzătorii din magazine (incluși în Vânzări).</p>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Productivitate pe echipă și pe agent",""],["Comisioane calculate automat",""],["Rapoarte de performanță, fără Excel",""]])}
      </div>
    `;
  } else {
    m.innerHTML=`
      <div class="h"><div class="ic">🤖</div><div><h1>Decizii AI</h1><p>Ce îți dă sistemul, ca director general</p></div></div>
      <div class="card"><h3>⚙️ Automatizări pentru conducere</h3>
        ${autoList([
          ["Tablou de bord consolidat în timp real","toate magazinele, online, producția și finanțele într-un loc"],
          ["Prognoză de cerere și de flux de numerar pe sezon","decizi producția și achizițiile din timp"],
          ["Profitabilitate pe linie de business, magazin și produs","unde câștigi, unde pierzi"],
          ["Alerte automate de risc","creanțe restante, rupturi de stoc, marjă în scădere"],
          ["Raport executiv automat, zilnic, în limbaj natural","fără să aștepți rapoarte manuale"],
          ["Scenarii „what-if” pentru decizii","producție, investiții, prețuri — pe date"]
        ])}
      </div>
      <div class="card" style="margin-top:16px"><h3>🛡️ Principiu</h3>
        <p style="font-size:13.5px;line-height:1.5;margin:0">AI-ul <b>pregătește și propune</b> — deciziile rămân la conducere. Pe un domeniu reglementat (pesticide, omologări), aceasta e garanția de încredere. Construim peste sistemele existente (ex. 1C), nu le înlocuim.</p>
      </div>
    `;
  }
}
$('#legal').textContent="© 2026 · Demo confidențial, realizat la comandă. Date ilustrative — se completează cu cele reale Diolsem. Concept, design și implementare = proprietatea dezvoltatorului; reproducerea fără acord interzisă.";
renderNav(); renderMain();
</script>
</body>
</html>
