<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diolsem — Panou management (demo Director Vânzări)</title>
<!--
  DEMO INTERN pentru DIRECTORUL DE VÂNZĂRI (și conducere).
  Arată compania pe magazine și pe departamente (angajați, sarcini,
  logistică, achiziții, contabilitate, marketing, producere) și
  CE S-AR AUTOMATIZA în fiecare. Datele sunt DEMO — se completează cu
  cele reale Diolsem. Logică/cifre simulate; în producție: date live din
  ERP/1C + AI (Claude). Concept confidențial, proprietatea dezvoltatorului.
-->
<style>
  :root{
    --green:#2e7d32;--green-d:#1b5e20;--green-l:#e8f5e9;--bg:#eef2ec;--card:#fff;
    --ink:#1f2a24;--muted:#6b7a70;--line:#e2e8e2;--amber:#ef6c00;--blue:#1565c0;--accent:#f9a825;
    --shadow:0 8px 24px rgba(27,94,32,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:38px;height:38px;color:#fff;flex:0 0 38px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}

  .shell{display:grid;grid-template-columns:230px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--green-l)}
  .nav button.on{background:var(--green);color:#fff}
  .nav .mi{font-size:17px;flex:0 0 20px;text-align:center}
  .nav .sep{height:1px;background:var(--line);margin:6px 8px}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0}
  .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:22px;color:var(--green-d);display:block}
  .kpi span{font-size:12px;color:var(--muted)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 11px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--green-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .emp{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .emp:first-of-type{border-top:0}
  .emp .av{width:30px;height:30px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:grid;place-items:center;font-size:12px;font-weight:700;flex:0 0 30px}
  .emp .n{flex:1}
  .emp .ct{font-size:11px;color:var(--muted)}

  .task{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4}
  .task:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.man{background:#fff3e0;color:var(--amber)}
  .st.prog{background:#e3f2fd;color:var(--blue)}
  .st.auto{background:#e8f5e9;color:var(--green-d)}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45}
  .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .stores{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:680px){.stores{grid-template-columns:1fr}}
  .store{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
  .store .top{display:flex;align-items:center;gap:10px}
  .store .pin{width:34px;height:34px;border-radius:9px;background:var(--green-l);display:grid;place-items:center;font-size:18px}
  .store b{font-size:14.5px}
  .store .city{font-size:11.5px;color:var(--muted)}
  .store .row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-top:1px solid var(--line);margin-top:8px}
  .store .row:first-of-type{margin-top:10px}
  .tag-ok{color:var(--green-d);font-weight:700}.tag-warn{color:var(--amber);font-weight:700}

  .agent{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .agent:first-of-type{border-top:0}
  .rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:14px;background:var(--green-l);color:var(--green-d);flex:0 0 30px}
  .rank.top{background:var(--accent);color:#3a2c00}
  .agent .who2{flex:1;min-width:0}
  .agent .who2 b{font-size:13.5px}
  .agent .who2 .z{font-size:11px;color:var(--muted)}
  .agent .bar{height:6px;background:var(--line);border-radius:999px;margin-top:5px;overflow:hidden;max-width:170px}
  .agent .bar i{display:block;height:100%;border-radius:999px}
  .agent .nums{text-align:right;flex:0 0 auto;font-size:12px;line-height:1.5}
  .agent .nums .s{font-weight:700}
  .agent .nums .com{color:var(--green-d);font-weight:800;display:block}
  .pct{font-weight:700}

  .wish{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .wish h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .wish p.sub{margin:0 0 12px;font-size:12.5px;opacity:.9}
  .wish ol{margin:0;padding-left:20px}
  .wish li{padding:5px 0;font-size:13.5px;line-height:1.45}
  .wish li b{background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
  .demo-badge{background:var(--accent);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" aria-hidden="true"><g fill="currentColor">
    <circle cx="31.9" cy="16.1" r="7.8"/><circle cx="16.1" cy="16.1" r="7.8"/>
    <circle cx="31.9" cy="31.9" r="7.8"/><circle cx="16.1" cy="31.9" r="7.8"/>
    <rect x="21.6" y="21.6" width="4.8" height="4.8" rx="1.4"/>
  </g></svg>
  <div class="brand"><b>Diolsem</b><span>Panou de management</span></div>
  <div class="role">👤 Director Vânzări <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ============================================================
   DATE DEMO — se completează cu cele reale Diolsem
   ============================================================ */
const STORES=[
  {pin:"🏬",name:"Magazin Central",city:"Chișinău (sediu + depozit)",manager:"V. Rusu",staff:14,sales:"42 800 lei",stock:"OK",ok:true},
  {pin:"🏪",name:"Magazin Nord",city:"Bălți",manager:"A. Ciobanu",staff:7,sales:"18 300 lei",stock:"2 produse sub prag",ok:false},
  {pin:"🏪",name:"Magazin Sud",city:"Cahul",manager:"I. Moraru",staff:6,sales:"15 100 lei",stock:"OK",ok:true},
  {pin:"🛒",name:"Online diolsem.md",city:"Livrare națională",manager:"Echipă e-commerce",staff:5,sales:"27 500 lei",stock:"OK",ok:true}
];

const DEPTS={
  vanzari:{ic:"💼",name:"Vânzări",sub:"B2B, retail, online — oferte și comenzi",
    employees:[["Director vânzări",1,"DV"],["Agenți de teren",6,"AG"],["Operatori comenzi",4,"OP"],["Vânzători magazin",18,"VZ"]],
    tasks:[["Oferte B2B de întocmit azi: 12","man"],["Follow-up clienți fără răspuns: 23","man"],["Comenzi de procesat: 41","prog"],["Target lunar: 78% atins","prog"]],
    autos:[["Generare oferte pe nivel de preț (Retail/Fermier/Angro)","cu aprobarea ta la excepții; gata în secunde"],
      ["Captură comenzi omnicanal","telefon, WhatsApp, site — toate într-un loc, fără re-tastare"],
      ["Prognoză de vânzări pe magazin și sezon","știi ce să ceri la producție și achiziții"],
      ["Distribuție automată a lead-urilor","către agenți, cu reminder de follow-up"],
      ["Comisioane agenți calculate automat","transparent, fără Excel"],
      ["Raport de vânzări zilnic","generat automat dimineața"]]},
  achizitii:{ic:"📦",name:"Achiziții",sub:"furnizori, import, stoc",
    employees:[["Șef achiziții",1,"ȘA"],["Specialiști import",2,"IM"],["Operator aprovizionare",2,"AP"]],
    tasks:[["Importuri în tranzit: 3","prog"],["Produse sub prag de stoc: 5","man"],["Facturi furnizori de introdus: 9","man"]],
    autos:[["Reaprovizionare predictivă","comanzi la timp, ținând cont de termenele de import"],
      ["Urmărire termene import + curs valutar","alerte când trebuie comandat din timp"],
      ["Comparare furnizori","preț, termen, fiabilitate — nu doar cel mai ieftin"],
      ["Citire automată a facturilor","fără tastare manuală"]]},
  logistica:{ic:"🚚",name:"Logistică",sub:"livrări, rute, depozit",
    employees:[["Dispecer",1,"DS"],["Curieri / șoferi",5,"CR"],["Gestionari depozit",3,"GD"]],
    tasks:[["Livrări programate azi: 28","prog"],["Recepție marfă: 2 transporturi","prog"],["Rute de optimizat manual","man"]],
    autos:[["Optimizare rute de livrare","mai multe livrări, mai puțin combustibil"],
      ["Planificare livrări pe zone","grupare automată a comenzilor"],
      ["Tracking comandă pentru client","„unde e comanda mea?” fără telefon"],
      ["Gestiune stoc depozit","scanare + stoc în timp real"],
      ["Confirmare livrare automată","semnătură/foto, status actualizat singur"]]},
  contabilitate:{ic:"💰",name:"Contabilitate",sub:"facturi, încasări, salarii",
    employees:[["Contabil-șef",1,"CȘ"],["Contabili",3,"CB"]],
    tasks:[["Facturi de emis: 17","man"],["Încasări de reconciliat","man"],["Închidere lunară","prog"]],
    autos:[["Confirmare automată a achitărilor pe oferte","plata se potrivește singură cu proforma"],
      ["Reconciliere bancară","încasări ↔ facturi, automat"],
      ["Procesare facturi furnizori","citire și introducere automată"],
      ["Rapoarte de creanțe","cine ne datorează și de când"],
      ["Închidere lunară asistată","mai rapidă, mai puține erori"]]},
  marketing:{ic:"📣",name:"Marketing",sub:"campanii, social media, promoții",
    employees:[["Marketing manager",1,"MM"],["Social media",1,"SM"],["Content / agronom",1,"CT"]],
    tasks:[["Campanie pre-sezon de pregătit","man"],["Postări social media: 6/săpt","prog"],["Promoții de configurat","man"]],
    autos:[["Campanii sezoniere automate pe segmente","fermieri / gospodării / pe cultură"],
      ["Calendar agronomic personalizat","reactivare client sezon de sezon"],
      ["Conținut produse + SEO + traduceri RO/RU","catalog uniform, mai vizibil în Google"],
      ["Recuperare coș abandonat","mesaj automat pe canalul clientului"],
      ["Raport ROI campanii","ce a adus vânzări, ce nu"]]},
  producere:{ic:"🏭",name:"Producere",sub:"loturi, calitate, omologări",
    employees:[["Șef producție",1,"ȘP"],["Operatori",8,"OP"],["Control calitate",2,"QC"]],
    tasks:[["Planificare loturi pentru sezon","man"],["Control calitate loturi în curs","prog"],["Omologări de reînnoit: 2","man"]],
    autos:[["Planificare producție pe cerere","produci ce se va cere, din prognoza de vânzări"],
      ["Fișe de lot digitale","cine, când, ce, cât — fără hârtie"],
      ["Trasabilitate lot","de la materie primă la client, în secunde"],
      ["Control calitate digital","abateri semnalate din timp"],
      ["Alerte valabilitate / omologare","nimic nu expiră pe neașteptate"]]}
};

const AGENTS=[
  {name:"A. Ciobanu",zone:"Nord · Bălți",sales:312400,target:124,com:9372},
  {name:"V. Rusu",zone:"Centru · Chișinău",sales:298100,target:109,com:8943},
  {name:"I. Moraru",zone:"Sud · Cahul",sales:245800,target:98,com:7374},
  {name:"D. Postică",zone:"Centru · Chișinău",sales:210300,target:88,com:6309},
  {name:"M. Cazacu",zone:"Nord · Bălți",sales:176900,target:79,com:5307},
  {name:"S. Bejan",zone:"Online · telesales",sales:154200,target:71,com:4626}
];

const WISH=[
  ["Oferte automate pe nivelul corect de preț","— eu doar aprob excepțiile"],
  ["Toate comenzile (telefon/WhatsApp/site) într-un singur ecran","— fără re-tastare"],
  ["Prognoză de vânzări pe magazin și sezon","— ca să nu ratăm vârful"],
  ["Confirmarea automată a achitărilor","— să nu mai sun contabilitatea"],
  ["Tablou de bord: vânzări pe magazin, pe agent, pe produs, în timp real",""],
  ["Alerte: clienți inactivi, coșuri abandonate, target sub plan",""]
];

/* ============================================================
   RENDARE
   ============================================================ */
const NAV=[
  ["overview","📊","Privire de ansamblu"],
  ["stores","🏬","Magazine"],
  ["sep"],
  ["vanzari","💼","Vânzări"],
  ["agenti","🏆","Agenți (clasament)"],
  ["achizitii","📦","Achiziții"],
  ["logistica","🚚","Logistică"],
  ["contabilitate","💰","Contabilitate"],
  ["marketing","📣","Marketing"],
  ["producere","🏭","Producere"]
];
let view="overview";
const $=s=>document.querySelector(s);

function renderNav(){
  $('#nav').innerHTML=NAV.map(n=>{
    if(n[0]==="sep") return '<div class="sep"></div>';
    return `<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`;
  }).join('');
}
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;

function empList(arr){
  return arr.map(e=>`<div class="emp"><div class="av">${e[2]}</div><div class="n">${e[0]}</div><div class="ct">×${e[1]}</div></div>`).join('');
}
function taskList(arr){
  const lbl={man:"manual",prog:"în lucru",auto:"automatizat"};
  return arr.map(t=>`<div class="task"><span class="st ${t[1]}">${lbl[t[1]]}</span><span>${t[0]}</span></div>`).join('');
}
function autoList(arr){
  return arr.map(a=>`<div class="auto"><span class="b">✓</span><span><b>${a[0]}</b>${a[1]?`<span class="benefit">${a[1]}</span>`:''}</span></div>`).join('');
}

function renderMain(){
  const m=$('#main');
  if(view==="overview"){
    const totalStaff=STORES.reduce((s,x)=>s+x.staff,0);
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Privire de ansamblu</h1><p>Compania pe magazine și departamente — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>4</b><span>magazine (3 fizice + online)</span></div>
        <div class="kpi"><b>103 700 lei</b><span>vânzări azi (toate)</span></div>
        <div class="kpi"><b>137</b><span>comenzi azi</span></div>
        <div class="kpi"><b>78%</b><span>target lunar atins</span></div>
      </div>
      <div class="wish">
        <h3>🎯 Ce aș automatiza întâi — din perspectiva directorului de vânzări</h3>
        <p class="sub">Dacă aș conduce vânzările aici, astea mi-ar lua cel mai mult timp și le-aș automatiza primele:</p>
        <ol>${WISH.map(w=>`<li>${w[0]} ${w[1]?`<b>${w[1]}</b>`:''}</li>`).join('')}</ol>
      </div>
      <div class="grid">
        <div class="card"><h3>🏬 Magazine <span class="c">${STORES.length}</span></h3>
          ${STORES.map(s=>`<div class="task"><span class="st ${s.ok?'auto':'man'}">${s.ok?'OK':'alertă'}</span><span><b>${s.name}</b> — ${s.city} · ${s.sales}</span></div>`).join('')}
        </div>
        <div class="card"><h3>👥 Echipă <span class="c">${totalStaff} pers.</span></h3>
          ${Object.values(DEPTS).map(d=>`<div class="task"><span class="st prog">${d.employees.reduce((s,e)=>s+e[1],0)}</span><span>${d.ic} ${d.name}</span></div>`).join('')}
        </div>
      </div>
      <p style="color:var(--muted);font-size:12.5px;margin-top:14px">Apasă un departament în stânga ca să vezi angajații, sarcinile curente și ce s-ar automatiza acolo. 👈</p>
    `;
  } else if(view==="stores"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏬</div><div><h1>Magazine</h1><p>Fiecare punct de vânzare separat — date demo</p></div></div>
      <div class="stores">${STORES.map(s=>`
        <div class="store">
          <div class="top"><div class="pin">${s.pin}</div><div><b>${s.name}</b><div class="city">${s.city}</div></div></div>
          <div class="row"><span>Responsabil</span><span><b>${s.manager}</b></span></div>
          <div class="row"><span>Angajați</span><span>${s.staff}</span></div>
          <div class="row"><span>Vânzări azi</span><span><b>${s.sales}</b></span></div>
          <div class="row"><span>Stoc</span><span class="${s.ok?'tag-ok':'tag-warn'}">${s.stock}</span></div>
        </div>`).join('')}</div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce s-ar automatiza la nivel de magazine</h3>
        ${autoList([["Aceeași politică de preț pe TOATE canalele, inclusiv magazinul online","Retail/Fermier/Angro, persistă identic pe site — modificabilă doar de directorul de vânzări"],["Stoc și prețuri sincronizate între magazine și online","un produs epuizat dispare automat din online; un preț schimbat se reflectă instant peste tot"],["Comparație vânzări între magazine, în timp real","vezi care merge și care nu"],["Reaprovizionare per magazin","fiecare magazin primește ce-i trebuie, la timp"]])}
      </div>
    `;
  } else if(view==="agenti"){
    const sorted=[...AGENTS].sort((a,b)=>b.sales-a.sales);
    const totCom=AGENTS.reduce((s,a)=>s+a.com,0);
    const totSales=AGENTS.reduce((s,a)=>s+a.sales,0);
    const medal=["🥇","🥈","🥉"];
    const tcol=p=>p>=100?"#2e7d32":(p>=85?"#ef6c00":"#c62828");
    const fmt=n=>n.toLocaleString("ro-RO");
    m.innerHTML=`
      <div class="h"><div class="ic">🏆</div><div><h1>Agenți — clasament & comisioane</h1><p>Luna curentă · comision 3% din vânzări · date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>${AGENTS.length}</b><span>agenți activi</span></div>
        <div class="kpi"><b>${fmt(totSales)} lei</b><span>vânzări agenți (lună)</span></div>
        <div class="kpi"><b>${fmt(totCom)} lei</b><span>comisioane de plată</span></div>
        <div class="kpi"><b>${sorted[0].name}</b><span>top vânzător 🏆</span></div>
      </div>
      <div class="card"><h3>📈 Clasament <span class="c">după vânzări</span></h3>
        ${sorted.map((a,i)=>`
          <div class="agent">
            <div class="rank ${i<3?'top':''}">${i<3?medal[i]:(i+1)}</div>
            <div class="who2"><b>${a.name}</b><div class="z">${a.zone}</div>
              <div class="bar"><i style="width:${Math.min(a.target,100)}%;background:${tcol(a.target)}"></i></div>
            </div>
            <div class="nums"><span class="s">${fmt(a.sales)} lei</span> · <span class="pct" style="color:${tcol(a.target)}">${a.target}%</span><span class="com">+${fmt(a.com)} lei comision</span></div>
          </div>`).join('')}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm aici <span class="c">AI</span></h3>
        ${autoList([["Comisioane calculate automat","din vânzările confirmate — fără Excel, fără erori"],["Clasament în timp real","fiecare agent își vede poziția și targetul"],["Alerte agenți sub target","intervii din timp, nu la final de lună"],["Obiective și bonusuri urmărite automat","transparent pentru echipă și pentru tine"]])}
      </div>
    `;
  } else {
    const d=DEPTS[view];
    m.innerHTML=`
      <div class="h"><div class="ic">${d.ic}</div><div><h1>${d.name}</h1><p>${d.sub} — date demo</p></div></div>
      <div class="grid">
        <div class="card"><h3>👥 Angajați <span class="c">${d.employees.reduce((s,e)=>s+e[1],0)} pers.</span></h3>${empList(d.employees)}</div>
        <div class="card"><h3>📋 Sarcini curente</h3>${taskList(d.tasks)}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm în ${d.name} <span class="c">AI</span></h3>${autoList(d.autos)}</div>
    `;
  }
}
