<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-casa × GO CRM — Panou General (demo Director General / CEO)</title>
<!--
  DEMO INTERN pentru DIRECTORUL GENERAL (CEO) — Sistemul de automatizare GO CRM
  pentru A-casa. Redus intenționat la ce urmărește de fapt un director general
  la un dezvoltator imobiliar: BANI (lichiditate, cash-flow) + ȘANTIER (stadiu
  vs. grafic, buget vs. real) + RADAR DE RISC pe PRAGURI (nu activitate brută).
  Detaliile operaționale (lead-uri, grilă, facturi individuale) rămân la
  nivelul fiecărui departament (vezi panoul de management pe departamente).
  Date DEMO — se completează cu cele reale A-casa. Concept confidențial,
  proprietatea GO CRM (Ghiletchi Consulting).
-->
<style>
  :root{
    --brand:#243b6b;--brand-d:#182a4e;--brand-l:#eef1f8;--gold:#c9a24b;--bg:#eef1f7;--card:#fff;
    --ink:#1e2430;--muted:#6b7280;--line:#e4e7ee;--amber:#ef6c00;--blue:#1565c0;--green:#2e7d32;--red:#c62828;
    --shadow:0 8px 24px rgba(24,42,78,.10);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:36px;height:36px;color:#fff;flex:0 0 36px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .demo-badge{background:var(--gold);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}

  .shell{display:grid;grid-template-columns:210px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--brand-l)} .nav button.on{background:var(--brand);color:#fff}
  .nav .mi{font-size:18px;flex:0 0 20px;text-align:center}
  .nav .note{padding:10px 12px 4px;font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);margin-top:6px}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--brand-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0} .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:20px;color:var(--brand-d);display:block} .kpi span{font-size:12px;color:var(--muted)}
  .kpi .up{color:var(--green);font-weight:700;font-size:12px}
  .kpi .down{color:var(--red);font-weight:700;font-size:12px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--brand-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .split{padding:8px 0}
  .split .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .split .lab b{font-weight:700}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:999px;background:var(--brand)}
  .bar.gold i{background:var(--gold)}
  .bar.warn i{background:var(--amber)}
  .bar.risk i{background:var(--red)}

  .row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4}
  .row:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.ok{background:#e8f5e9;color:var(--green)} .st.warn{background:#fff3e0;color:var(--amber)} .st.risk{background:#fdecea;color:var(--red)}
  .row .grow{flex:1} .row .val{font-weight:700;color:var(--ink);font-size:12.5px}
  .dept-tag{font-size:10px;font-weight:700;color:var(--brand-d);background:var(--brand-l);padding:1px 7px;border-radius:999px;flex:0 0 auto}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45}
  .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .wish{background:linear-gradient(135deg,var(--brand-d),var(--brand));color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .wish h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .wish p.sub{margin:0 0 12px;font-size:12.5px;opacity:.9}
  .wish ol,.wish ul{margin:0;padding-left:20px} .wish li{padding:5px 0;font-size:13.5px;line-height:1.45}
  .wish li b{background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px}
  .wish .quote{font-style:italic;font-size:13px;opacity:.95;border-left:3px solid var(--gold);padding-left:10px;margin-top:12px}

  .cf-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .cf-row:first-of-type{border-top:0}
  .cf-row .mo{width:78px;font-size:12.5px;font-weight:700;flex:0 0 78px}
  .cf-row .track{flex:1;height:20px;background:var(--line);border-radius:6px;overflow:hidden;position:relative}
  .cf-row .track i{display:block;height:100%;border-radius:6px}
  .cf-row .val{width:100px;text-align:right;font-weight:700;font-size:12.5px;flex:0 0 100px}
  .cf-row.neg .val{color:var(--red)}
  .cf-row .tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;flex:0 0 auto;margin-left:6px}
  .tag.real{background:#e8f5e9;color:var(--green)} .tag.proj{background:#eef1f8;color:var(--brand-d)}

  .delroom{display:grid;grid-template-columns:110px 1fr 1fr;gap:10px;padding:10px 0;border-top:1px solid var(--line);font-size:12.5px;align-items:start}
  .delroom:first-of-type{border-top:0}
  .delroom b{color:var(--brand-d)}
  @media(max-width:680px){.delroom{grid-template-columns:1fr}}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
    <path d="M9 23 L24 11 L39 23"/><path d="M13 21 V37 H35 V21"/><path d="M21 37 V28 H27 V37"/>
  </svg>
  <div class="brand"><b>A-casa</b><span>Panou general · GO CRM</span></div>
  <div class="role">👤 Director General (CEO) <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ============================================================
   DATE DEMO — se completează cu cele reale A-casa (în €)
   Filosofie: directorul general vede BANI + ȘANTIER + RISC pe
   PRAGURI. Detaliul operațional (lead-uri, facturi individuale,
   agenți) rămâne în panoul fiecărui departament.
   ============================================================ */
const CASH = {
  soldAzi: 412000,
  scadente14z: 268000,
  incasatIeri: 34200,
  cheltuitIeri: 41000,
  cashflowLuna: 286000,
  restante: 62400
};

const CASHFLOW_PROGNOZA = [
  {luna:"Iulie",      val: 286000, tip:"real"},
  {luna:"August",     val: 190000, tip:"proiectat"},
  {luna:"Septembrie", val: -40000, tip:"proiectat"}
];

const RESTANTE_PROIECT = [
  {proiect:"Botanica Park", suma:38200, zile:34},
  {proiect:"Centru Premium", suma:24200, zile:41}
];

const BLOCURI = [
  {n:"Telecentru · Bloc A",      pct:88, plan:610000, cheltuit:598000, termen:"la zi"},
  {n:"Botanica Park · Bloc B",   pct:62, plan:540000, cheltuit:556000, termen:"la zi"},
  {n:"Botanica Park · Bloc C",   pct:47, plan:480000, cheltuit:471000, termen:"la zi"},
  {n:"Centru Premium · Bloc 1",  pct:34, plan:420000, cheltuit:456000, termen:"întârziere 14 zile"}
];

const RISK = [
  {level:"risk", dept:"Tehnic",        text:"Centru Premium · Bloc 1 — întârziere 14 zile (prag: 7 zile)", val:"14 zile"},
  {level:"risk", dept:"Tehnic",        text:"Centru Premium · Bloc 1 — buget depășit (prag: 5%)", val:"+8,6%"},
  {level:"risk", dept:"Contabilitate", text:"4 rate restante peste 30 de zile (prag: 30 zile)", val:"62 400 €"},
  {level:"risk", dept:"Bani",          text:"Prognoză cash-flow septembrie — sold proiectat negativ", val:"−40 000 €"},
  {level:"warn", dept:"Vânzări",       text:"3 rezervări expiră în 48h fără contract (prag: 48h)", val:"stoc blocat"},
  {level:"ok",   dept:"Bani",          text:"Cash-flow pozitiv luna aceasta", val:"+286 000 €"}
];

const DELEGARE = [
  {dept:"Tehnic",        prag:"abatere buget peste 5% sau întârziere peste 7 zile", act:"raport automat în 24h, cu cauza — nu la ședința lunară"},
  {dept:"Vânzări",       prag:"ritm de vânzare sub target pe un bloc", act:"alertă + soluție propusă de directorul de vânzări"},
  {dept:"Contabilitate", prag:"restanță client peste 30 de zile", act:"semnal imediat, nu la închiderea lunii"},
  {dept:"Juridic",       prag:"contract cu penalitate sau clauză neobișnuită", act:"trece prin aprobarea directorului înainte de semnare"}
];

/* ============================================================
   RENDARE
   ============================================================ */
const NAV=[
  ["cockpit","📊","Cockpit"],
  ["bani","💵","Bani & cash-flow"],
  ["santier","🏗️","Șantier"],
  ["risc","⚠️","Radar de risc"]
];
let view="cockpit";
const $=s=>document.querySelector(s);
const fmt=n=>Math.round(n).toLocaleString("ro-RO");
const fmtSigned=n=>(n>=0?"+":"−")+fmt(Math.abs(n))+" €";

function renderNav(){
  $('#nav').innerHTML=NAV.map(n=>`<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`).join('')
    +`<p class="note">Vânzări, Contabilitate, Marketing/PR și Tehnic au fiecare panoul lor operațional. Aici vede directorul doar ce-i cere lui decizia.</p>`;
}
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;

function riskCount(level){ return RISK.filter(r=>r.level===level).length; }
function riskRows(arr){
  const lbl={ok:"OK",warn:"atenție",risk:"risc"};
  return arr.map(r=>`<div class="row"><span class="st ${r.level}">${lbl[r.level]}</span><span class="dept-tag">${r.dept}</span><span class="grow">${r.text}</span><span class="val">${r.val}</span></div>`).join('');
}
function autoList(arr){ return arr.map(a=>`<div class="auto"><span class="b">✓</span><span><b>${a[0]}</b>${a[1]?`<span class="benefit">${a[1]}</span>`:''}</span></div>`).join(''); }
function cashflowRows(arr){
  const max=Math.max(...arr.map(x=>Math.abs(x.val)));
  return arr.map(x=>{
    const neg=x.val<0;
    const w=Math.round(Math.abs(x.val)/max*100);
    const color=neg?'var(--red)':'var(--brand)';
    return `<div class="cf-row${neg?' neg':''}"><span class="mo">${x.luna}</span><div class="track"><i style="width:${w}%;background:${color}"></i></div><span class="val">${fmtSigned(x.val)}</span><span class="tag ${x.tip==='real'?'real':'proj'}">${x.tip==='real'?'real':'proiectat'}</span></div>`;
  }).join('');
}
function blocRows(){
  return BLOCURI.map(b=>{
    const abatere=((b.cheltuit-b.plan)/b.plan*100);
    const over=abatere>5;
    const lateFlag=b.termen!=="la zi";
    return `<div class="row"><span class="st ${over||lateFlag?'risk':'ok'}">${over||lateFlag?'atenție':'OK'}</span><span class="grow"><b>${b.n}</b><br><span style="color:var(--muted);font-size:11.5px">${fmt(b.cheltuit)} € cheltuit din ${fmt(b.plan)} € planificat · ${b.termen}</span></span><span class="val" style="color:${over?'var(--red)':'var(--ink)'}">${abatere>=0?'+':''}${abatere.toFixed(1)}%</span></div>`;
  }).join('');
}

function renderMain(){
  const m=$('#main');
  if(view==="cockpit"){
    const alerte=riskCount('risk'), atentie=riskCount('warn');
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Cockpit</h1><p>Ce contează azi, în 2 minute — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>${fmt(CASH.soldAzi)} €</b><span>sold de cont azi</span></div>
        <div class="kpi"><b>${fmt(CASH.scadente14z)} €</b><span>plăți scadente (14 zile)</span></div>
        <div class="kpi"><b class="${CASH.cashflowLuna>=0?'up':'down'}">${fmtSigned(CASH.cashflowLuna)}</b><span>cash-flow (luna)</span></div>
        <div class="kpi"><b>${alerte}</b><span>alerte de risc active</span></div>
      </div>
      <div class="wish">
        <h3>🎯 Ce urmăresc în primul rând — ca director general</h3>
        <p class="sub">Nu tot ce mișcă în companie — doar ce-mi cere mie decizia:</p>
        <ol>
          <li>Supraviețuiesc financiar în lunile următoare? <b>am bani de șantier?</b></li>
          <li>Care proiect îmi va exploda bugetul — <b>cât mai devreme văd abaterea</b>?</li>
          <li>Ritmul de vânzare ține pasul cu ritmul de cheltuială pe șantier?</li>
          <li>Ce decizie mă așteaptă pe mine azi, nu pe altcineva?</li>
        </ol>
        <p class="quote">„Nu vreau să mă întrebi — vreau să știu singur, de la sistem, exact când pragul meu e depășit."</p>
      </div>
      <div class="grid">
        <div class="card"><h3>💵 Bani <span class="c">rezumat</span></h3>
          <div class="row"><span class="grow">Încasat ieri</span><span class="val" style="color:var(--green)">+${fmt(CASH.incasatIeri)} €</span></div>
          <div class="row"><span class="grow">Cheltuit ieri</span><span class="val" style="color:var(--red)">−${fmt(CASH.cheltuitIeri)} €</span></div>
          <div class="row"><span class="grow">Restanțe totale</span><span class="val">${fmt(CASH.restante)} €</span></div>
        </div>
        <div class="card"><h3>🏗️ Șantier <span class="c">rezumat</span></h3>
          ${BLOCURI.slice(0,2).map(b=>`<div class="split"><div class="lab"><span>${b.n}</span><b>${b.pct}%</b></div><div class="bar${b.termen!=="la zi"?' warn':''}"><i style="width:${b.pct}%"></i></div></div>`).join('')}
          <p style="color:var(--muted);font-size:11.5px;margin:6px 0 0">2 din ${BLOCURI.length} blocuri — vezi tot în „Șantier".</p>
        </div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚠️ Radar de risc <span class="c">${alerte} risc · ${atentie} atenție</span></h3>
        ${riskRows(RISK.filter(r=>r.level!=='ok').slice(0,4))}
        <div class="auto" style="border-top:1px solid var(--line);margin-top:8px;padding-top:12px"><span class="b" style="cursor:pointer" onclick="go('risc')">→</span><span>Vezi tot radarul și principiul de delegare <b style="cursor:pointer;color:var(--brand-d)" onclick="go('risc')">în tab-ul „Radar de risc"</b></span></div>
      </div>
    `;
  } else if(view==="bani"){
    m.innerHTML=`
      <div class="h"><div class="ic">💵</div><div><h1>Bani & cash-flow</h1><p>Lichiditate, nu profit contabil — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>${fmt(CASH.soldAzi)} €</b><span>sold de cont azi</span></div>
        <div class="kpi"><b>${fmt(CASH.scadente14z)} €</b><span>plăți scadente (14 zile)</span></div>
        <div class="kpi"><b class="${CASH.cashflowLuna>=0?'up':'down'}">${fmtSigned(CASH.cashflowLuna)}</b><span>cash-flow (luna)</span></div>
        <div class="kpi"><b>${fmt(CASH.restante)} €</b><span>restanțe de la clienți</span></div>
      </div>
      <div class="card"><h3>📈 Prognoză cash-flow <span class="c">3 luni, actualizată automat</span></h3>
        ${cashflowRows(CASHFLOW_PROGNOZA)}
        <p style="color:var(--red);font-size:12px;margin:10px 0 0"><b>⚠️ Septembrie proiectat negativ</b> — semnal din timp, cât mai e loc de reacție (grăbești încasări, negociezi cu banca, amâni o cheltuială).</p>
      </div>
      <div class="grid" style="margin-top:16px">
        <div class="card"><h3>⚠️ Restanțe pe proiect</h3>
          ${RESTANTE_PROIECT.map(r=>`<div class="row"><span class="grow">${r.proiect}</span><span class="val">${fmt(r.suma)} € · ${r.zile} zile</span></div>`).join('')}
        </div>
        <div class="card"><h3>⚙️ Ce alimentează acest ecran <span class="c">Contabilitate</span></h3>
          ${autoList([["Extrasul bancar citit automat","plata se potrivește singură cu rata din grafic"],["Restanța semnalată din prima zi","nu la închiderea lunii"],["Prognoza de cash-flow","din ritmul real de vânzări și cheltuieli"]])}
        </div>
      </div>
    `;
  } else if(view==="santier"){
    const mediePct=Math.round(BLOCURI.reduce((s,b)=>s+b.pct,0)/BLOCURI.length);
    const intarziate=BLOCURI.filter(b=>b.termen!=="la zi").length;
    const abatereMedie=(BLOCURI.reduce((s,b)=>s+((b.cheltuit-b.plan)/b.plan*100),0)/BLOCURI.length);
    m.innerHTML=`
      <div class="h"><div class="ic">🏗️</div><div><h1>Șantier</h1><p>Stadiu real vs. grafic, buget vs. real — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>${BLOCURI.length}</b><span>blocuri active</span></div>
        <div class="kpi"><b>${mediePct}%</b><span>avansare medie</span></div>
        <div class="kpi"><b>${intarziate}</b><span>blocuri în urma graficului</span></div>
        <div class="kpi"><b class="${abatereMedie>5?'down':'up'}">${abatereMedie>=0?'+':''}${abatereMedie.toFixed(1)}%</b><span>abatere buget medie</span></div>
      </div>
      <div class="card"><h3>🏗️ Avansare pe bloc</h3>
        ${BLOCURI.map(b=>`<div class="split"><div class="lab"><span>${b.n}</span><b>${b.pct}%</b></div><div class="bar${b.termen!=="la zi"?' warn':''}"><i style="width:${b.pct}%"></i></div></div>`).join('')}
      </div>
      <div class="card" style="margin-top:16px"><h3>💰 Deviz — planificat vs. cheltuit</h3>
        ${blocRows()}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce alimentează acest ecran <span class="c">Departament tehnic</span></h3>
        ${autoList([["Stadiul bifat din teren de diriginte","direct din raportul pe care oricum îl face"],["Deviz cheltuit vs. planificat, pe poziții","abaterea semnalată devreme, nu la final"],["Alertă de întârziere față de grafic",""]])}
      </div>
    `;
  } else {
    m.innerHTML=`
      <div class="h"><div class="ic">⚠️</div><div><h1>Radar de risc</h1><p>Doar praguri depășite — nu activitate brută — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b class="down">${riskCount('risk')}</b><span>alerte critice</span></div>
        <div class="kpi"><b style="color:var(--amber)">${riskCount('warn')}</b><span>alerte de atenție</span></div>
        <div class="kpi"><b class="up">${riskCount('ok')}</b><span>indicatori în regulă</span></div>
        <div class="kpi"><b>4</b><span>departamente conectate</span></div>
      </div>
      <div class="card"><h3>⚠️ Toate alertele active <span class="c">timp real</span></h3>
        ${riskRows(RISK)}
      </div>
      <div class="wish" style="margin-top:16px">
        <h3>🤝 Principiul de delegare</h3>
        <p class="sub">Fiecare responsabil are un prag definit. Sub prag, decide singur — nu mă întreabă. Peste prag, sistemul mă anunță automat, cu context.</p>
        ${DELEGARE.map(d=>`<div class="delroom"><b>${d.dept}</b><span>prag: ${d.prag}</span><span>${d.act}</span></div>`).join('')}
        <p class="quote">„Dacă nu mă anunți și aflu eu, e problemă de încredere, nu doar de proces."</p>
      </div>
    `;
  }
