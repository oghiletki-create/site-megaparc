<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-casa × GO CRM — Panou General (demo Director General / CEO)</title>
<!--
  DEMO INTERN pentru DIRECTORUL GENERAL (CEO) — GO CRM pentru A-casa.
  Vedere executivă pe tot dezvoltatorul: finanțe & încasări, vânzări pe
  proiecte, construcție/șantier, stoc de apartamente, echipă, plus deciziile AI.
  Date DEMO — se completează cu cele reale A-casa. Concept confidențial,
  proprietatea GO CRM (Ghiletchi Consulting).
-->
<style>
  :root{
    --brand:#243b6b;--brand-d:#182a4e;--brand-l:#eef1f8;--gold:#c9a24b;--bg:#eef1f7;--card:#fff;
    --ink:#1e2430;--muted:#6b7280;--line:#e4e7ee;--amber:#ef6c00;--blue:#1565c0;--green:#2e7d32;--red:#c62828;
    --shadow:0 8px 24px rgba(24,42,78,.10);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:36px;height:36px;color:#fff;flex:0 0 36px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .demo-badge{background:var(--gold);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}

  .shell{display:grid;grid-template-columns:230px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--brand-l)} .nav button.on{background:var(--brand);color:#fff}
  .nav .mi{font-size:17px;flex:0 0 20px;text-align:center}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--brand-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0} .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:20px;color:var(--brand-d);display:block} .kpi span{font-size:12px;color:var(--muted)}
  .kpi .up{color:var(--green);font-weight:700;font-size:12px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--brand-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .split{padding:8px 0}
  .split .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .split .lab b{font-weight:700}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:999px;background:var(--brand)}
  .bar.gold i{background:var(--gold)}

  .row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4}
  .row:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.ok{background:#e8f5e9;color:var(--green)} .st.warn{background:#fff3e0;color:var(--amber)} .st.risk{background:#fdecea;color:var(--red)}
  .row .grow{flex:1} .row .val{font-weight:700;color:var(--ink);font-size:12.5px}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45}
  .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .wish{background:linear-gradient(135deg,var(--brand-d),var(--brand));color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .wish h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .wish p.sub{margin:0 0 12px;font-size:12.5px;opacity:.9}
  .wish ol{margin:0;padding-left:20px} .wish li{padding:5px 0;font-size:13.5px;line-height:1.45}
  .wish li b{background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
    <path d="M9 23 L24 11 L39 23"/><path d="M13 21 V37 H35 V21"/><path d="M21 37 V28 H27 V37"/>
  </svg>
  <div class="brand"><b>A-casa</b><span>Panou general · GO CRM</span></div>
  <div class="role">👤 Director General (CEO) <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ===== DATE DEMO — se completează cu cele reale A-casa (în €) ===== */
const PROJECTS=[
  {n:"Botanica Park · Bloc B",v:"9 apart. / lună",sold:"58% vândut"},
  {n:"Botanica Park · Bloc C",v:"5 apart. / lună",sold:"41% vândut"},
  {n:"Centru Premium · Bloc 1",v:"4 apart. / lună",sold:"33% vândut"},
  {n:"Telecentru · Bloc A",v:"7 apart. / lună",sold:"88% vândut"}
];
const LINES=[["Botanica Park",44],["Centru Premium",33],["Telecentru",23]];
const SOURCES=[["Reclame online (Meta / Google)",46],["Recomandări & direct",30],["Portaluri imobiliare (999.md / makler)",24]];
const RISK=[
  ["risk","4 rate restante peste 30 de zile","62 400 €"],
  ["warn","Bloc 1 (Centru) — 2 săpt. în urma graficului","termen predare"],
  ["warn","3 rezervări expiră în 48h fără contract","stoc blocat"],
  ["ok","Cash-flow pozitiv luna aceasta","+286 000 €"]
];
const DEPTS=[["Vânzări",11],["Marketing",4],["Construcție / șantier",9],["Juridic & contracte",3],["Finanțe & încasări",4],["Post-vânzare",2],["Conducere",2]];

const WISH=[
  ["Tablou de bord consolidat în timp real","— toate proiectele, vânzările, încasările și construcția pe un ecran"],
  ["Absorbția pe proiect și prognoză de cash-flow","— știu din ce bani și în ce ritm construiesc"],
  ["Radar de rate restante","— cine, cât, de câte zile — din prima zi"],
  ["Buget vs. real pe fiecare bloc","— văd abaterea înainte să devină problemă"],
  ["Raport executiv automat, zilnic, în limbaj natural",""],
  ["Scenarii „what-if” pentru decizii","— preț, ritm de vânzare, lansare de bloc nou"]
];

const NAV=[
  ["overview","📊","Privire de ansamblu"],
  ["finante","💵","Finanțe & încasări"],
  ["vanzari","🏢","Vânzări & proiecte"],
  ["constructie","🏗️","Construcție"],
  ["stoc","🗂️","Stoc apartamente"],
  ["echipa","👥","Echipă"],
  ["ai","🤖","Decizii AI"]
];
let view="overview";
const $=s=>document.querySelector(s);
function renderNav(){ $('#nav').innerHTML=NAV.map(n=>`<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`).join(''); }
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;

function splits(arr,gold){ return arr.map(x=>`<div class="split"><div class="lab"><span>${x[0]}</span><b>${x[1]}%</b></div><div class="bar${gold?' gold':''}"><i style="width:${x[1]}%"></i></div></div>`).join(''); }
function risks(arr){ const lbl={ok:"OK",warn:"atenție",risk:"risc"}; return arr.map(r=>`<div class="row"><span class="st ${r[0]}">${lbl[r[0]]}</span><span class="grow">${r[1]}</span><span class="val">${r[2]}</span></div>`).join(''); }
function autoList(arr){ return arr.map(a=>`<div class="auto"><span class="b">✓</span><span><b>${a[0]}</b>${a[1]?`<span class="benefit">${a[1]}</span>`:''}</span></div>`).join(''); }

function renderMain(){
  const m=$('#main');
  if(view==="overview"){
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Privire de ansamblu</h1><p>Dezvoltatorul la zi — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>21 apart.</b><span>vândute (luna)</span></div>
        <div class="kpi"><b>1,86 mln €</b><span>încasări (luna)</span></div>
        <div class="kpi"><b>58%</b><span>din stoc vândut</span></div>
        <div class="kpi"><b class="up">+19%</b><span>vs. anul trecut</span></div>
      </div>
      <div class="wish">
        <h3>🎯 Ce aș automatiza întâi — ca director general</h3>
        <p class="sub">Lucrurile pe care le-aș vrea pe un singur ecran, ca să conduc pe date, nu pe rapoarte întârziate:</p>
        <ol>${WISH.map(w=>`<li>${w[0]} ${w[1]?`<b>${w[1].replace(/^— /,'')}</b>`:''}</li>`).join('')}</ol>
      </div>
      <div class="grid">
        <div class="card"><h3>🏢 Vânzări pe proiect</h3>${splits(LINES)}</div>
        <div class="card"><h3>📣 Surse de lead</h3>${splits(SOURCES,true)}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚠️ Radar de risc <span class="c">timp real</span></h3>${risks(RISK)}</div>
    `;
  } else if(view==="finante"){
    m.innerHTML=`
      <div class="h"><div class="ic">💵</div><div><h1>Finanțe & încasări</h1><p>Cash-flow și graficul de rate — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>14,2 mln €</b><span>contractat (an, YTD)</span></div>
        <div class="kpi"><b>9,7 mln €</b><span>încasat (YTD)</span></div>
        <div class="kpi"><b class="up">+286 000 €</b><span>cash-flow (luna)</span></div>
        <div class="kpi"><b>62 400 €</b><span>rate restante</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>📈 Încasat vs. grafic (luna)</h3>${splits([["Încasat la timp",83],["Restant / întârziat",17]])}</div>
        <div class="card"><h3>⚠️ Rate restante</h3>${risks([["risk","Peste 30 de zile","62 400 €"],["warn","Scadente săptămâna aceasta","148 000 €"],["ok","Încasat luna aceasta","1,86 mln €"]])}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm în finanțe <span class="c">AI</span></h3>
        ${autoList([["Confirmarea automată a ratelor din grafic","plata se potrivește singură cu rata corectă"],["Radar de restanțe în timp real","cine datorează, cât, de câte zile — din prima zi"],["Prognoză de cash-flow pe proiect","construiești din bani previzibili"],["Raport financiar executiv automat","fără să aștepți închiderea lunii"]])}
      </div>
    `;
  } else if(view==="vanzari"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏢</div><div><h1>Vânzări & proiecte</h1><p>Consolidat pe complexe și blocuri — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>21</b><span>apart. vândute (luna)</span></div>
        <div class="kpi"><b>38</b><span>rezervări active</span></div>
        <div class="kpi"><b>4</b><span>blocuri în vânzare</span></div>
        <div class="kpi"><b class="up">+19%</b><span>vs. anul trecut</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>📣 Surse de lead</h3>${splits(SOURCES,true)}</div>
        <div class="card"><h3>🏢 Pe proiecte</h3>${PROJECTS.map(p=>`<div class="row"><span class="grow">${p.n}</span><span class="val">${p.v}</span></div>`).join('')}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Tablou consolidat: proiecte + grilă, în timp real",""],["Absorbție și prognoză de vânzări pe bloc",""],["Aceeași politică de preț peste tot, inclusiv pe site","modificabilă doar de directorul de vânzări"],["Alertă rezervări care expiră fără contract",""]])}
      </div>
    `;
  } else if(view==="constructie"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏗️</div><div><h1>Construcție</h1><p>Stadiu, buget și termen pe blocuri — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>4</b><span>blocuri active</span></div>
        <div class="kpi"><b>61%</b><span>avansare medie</span></div>
        <div class="kpi"><b>1</b><span>bloc în urma graficului</span></div>
        <div class="kpi"><b>96%</b><span>buget respectat (mediu)</span></div>
      </div>
      <div class="card"><h3>🏗️ Avansare pe bloc</h3>
        ${splits([["Telecentru · Bloc A — finisaje",88],["Botanica · Bloc B — structură + închideri",62],["Botanica · Bloc C — structură",47],["Centru · Bloc 1 — fundație + structură",34]])}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Stadiu pe bloc și pe etapă, în timp real","fundație → structură → finisaje → predare"],["Buget planificat vs. cheltuit, cu alerte de abatere",""],["Alerte de întârziere față de termenul de predare",""],["Legătura construcție ↔ vânzări ↔ încasări","construiești în ritmul banilor care intră"]])}
      </div>
    `;
  } else if(view==="stoc"){
    m.innerHTML=`
      <div class="h"><div class="ic">🗂️</div><div><h1>Stoc apartamente</h1><p>Grila consolidată (șahmatca) — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>412</b><span>apartamente total</span></div>
        <div class="kpi"><b>173</b><span>disponibile</span></div>
        <div class="kpi"><b>38</b><span>rezervate</span></div>
        <div class="kpi"><b>201</b><span>vândute</span></div>
      </div>
      <div class="card"><h3>🗂️ Structura stocului</h3>${splits([["Vândute",49],["Disponibile",42],["Rezervate",9]],true)}</div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Grilă vie cu statut unic","disponibil / rezervat / vândut — fără dublă rezervare"],["Sincronizare grilă ↔ site","vândutul dispare, prețul nou apare instant"],["Profitabilitate pe tip de apartament și pe bloc",""],["Alertă apartamente „greu vandabile”","semnal pentru preț sau campanie"]])}
      </div>
    `;
  } else if(view==="echipa"){
    const tot=DEPTS.reduce((s,d)=>s+d[1],0);
    m.innerHTML=`
      <div class="h"><div class="ic">👥</div><div><h1>Echipă</h1><p>${tot} angajați pe departamente — date demo</p></div></div>
      <div class="card"><h3>👥 Angajați pe departamente <span class="c">${tot}</span></h3>
        ${DEPTS.map(d=>`<div class="row"><span class="grow">${d[0]}</span><span class="val">${d[1]}</span></div>`).join('')}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Productivitate pe echipă și pe agent",""],["Comisioane calculate automat din contracte",""],["Rapoarte de performanță, fără Excel",""]])}
      </div>
    `;
  } else {
    m.innerHTML=`
      <div class="h"><div class="ic">🤖</div><div><h1>Decizii AI</h1><p>Ce îți dă sistemul, ca director general</p></div></div>
      <div class="card"><h3>⚙️ Automatizări pentru conducere</h3>
        ${autoList([
          ["Tablou de bord consolidat în timp real","toate proiectele, vânzările, încasările și construcția într-un loc"],
          ["Absorbție pe proiect și prognoză de cash-flow","din ce bani și în ce ritm construiești"],
          ["Radar de rate restante","cine datorează, cât, de câte zile — din prima zi"],
          ["Buget vs. real pe fiecare bloc","abaterea, înainte să devină problemă"],
          ["Raport executiv automat, zilnic, în limbaj natural","fără rapoarte manuale"],
          ["Scenarii „what-if” pentru decizii","preț, ritm de vânzare, lansare de bloc nou"]
        ])}
      </div>
      <div class="card" style="margin-top:16px"><h3>🛡️ Principiu</h3>
        <p style="font-size:13.5px;line-height:1.5;margin:0">AI-ul <b>pregătește și propune</b> — deciziile rămân la conducere. Prețul, contractul și discountul rămân sub control uman. Construim peste sistemele existente (ex. 1C, site), nu le înlocuim.</p>
      </div>
    `;
  }
}
$('#legal').textContent="© 2026 · GO CRM (Ghiletchi Consulting) · Demo confidențial, realizat la comandă. Date ilustrative — se completează cu cele reale A-casa. Concept, design și implementare = proprietatea dezvoltatorului; reproducerea fără acord interzisă.";
renderNav(); renderMain();
</script>
</body>
</html>
