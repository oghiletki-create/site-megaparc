<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birovits — Panou Director Vânzări (demo)</title>
<!--
  DEMO INTERN pentru DIRECTORUL DE VÂNZĂRI — Birovits (birotică & papetărie).
  Compania pe magazine și departamente (angajați, sarcini, automatizări),
  plus agenți B2B (clasament + comisioane). Date DEMO. Concept confidențial.
-->
<style>
  :root{
    --green:#1565c0;--green-d:#0d47a1;--green-l:#e3f2fd;--bg:#eef1f6;--card:#fff;
    --ink:#1f2733;--muted:#6b7280;--line:#e3e7ee;--amber:#ef6c00;--blue:#1565c0;--accent:#f9a825;--pos:#2e7d32;
    --shadow:0 8px 24px rgba(13,71,161,.10);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:38px;height:38px;flex:0 0 38px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .demo-badge{background:var(--accent);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}

  .shell{display:grid;grid-template-columns:230px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--green-l)} .nav button.on{background:var(--green);color:#fff}
  .nav .mi{font-size:17px;flex:0 0 20px;text-align:center} .nav .sep{height:1px;background:var(--line);margin:6px 8px}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0} .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:20px;color:var(--green-d);display:block} .kpi span{font-size:12px;color:var(--muted)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 11px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--green-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .emp{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px} .emp:first-of-type{border-top:0}
  .emp .av{width:30px;height:30px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:grid;place-items:center;font-size:12px;font-weight:700;flex:0 0 30px}
  .emp .n{flex:1} .emp .ct{font-size:11px;color:var(--muted)}

  .task{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4} .task:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.man{background:#fff3e0;color:var(--amber)} .st.prog{background:#e3f2fd;color:var(--blue)} .st.auto{background:#e8f5e9;color:var(--pos)}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45} .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .stores{display:grid;grid-template-columns:repeat(2,1fr);gap:14px} @media(max-width:680px){.stores{grid-template-columns:1fr}}
  .store{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
  .store .top{display:flex;align-items:center;gap:10px} .store .pin{width:34px;height:34px;border-radius:9px;background:var(--green-l);display:grid;place-items:center;font-size:18px}
  .store b{font-size:14.5px} .store .city{font-size:11.5px;color:var(--muted)}
  .store .row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-top:1px solid var(--line);margin-top:8px} .store .row:first-of-type{margin-top:10px}
  .tag-ok{color:var(--pos);font-weight:700}.tag-warn{color:var(--amber);font-weight:700}

  .agent{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)} .agent:first-of-type{border-top:0}
  .rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:14px;background:var(--green-l);color:var(--green-d);flex:0 0 30px} .rank.top{background:var(--accent);color:#3a2c00}
  .agent .who2{flex:1;min-width:0} .agent .who2 b{font-size:13.5px} .agent .who2 .z{font-size:11px;color:var(--muted)}
  .agent .bar{height:6px;background:var(--line);border-radius:999px;margin-top:5px;overflow:hidden;max-width:170px} .agent .bar i{display:block;height:100%;border-radius:999px}
  .agent .nums{text-align:right;flex:0 0 auto;font-size:12px;line-height:1.5} .agent .nums .s{font-weight:700} .agent .nums .com{color:var(--green-d);font-weight:800;display:block} .pct{font-weight:700}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" aria-hidden="true"><rect width="48" height="48" rx="12" fill="#fff"/><text x="24" y="34" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="30" fill="#0d47a1">B</text></svg>
  <div class="brand"><b>Birovits</b><span>Panou de management</span></div>
  <div class="role">👤 Director Vânzări <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ===== DATE DEMO — se completează cu cele reale Birovits ===== */
const STORES=[
  {pin:"🏬",name:"Magazin Central",city:"Chișinău (sediu + depozit)",manager:"V. Rusu",staff:16,sales:"38 500 lei",stock:"OK",ok:true},
  {pin:"🏪",name:"Magazin Botanica",city:"Chișinău",manager:"A. Ciobanu",staff:8,sales:"21 200 lei",stock:"OK",ok:true},
  {pin:"🏪",name:"Magazin Râșcani",city:"Chișinău",manager:"I. Moraru",staff:7,sales:"17 900 lei",stock:"3 articole sub prag",ok:false},
  {pin:"🛒",name:"Online birovits.md",city:"Livrare națională",manager:"Echipă e-commerce",staff:6,sales:"24 600 lei",stock:"OK",ok:true}
];
const AGENTS=[
  {name:"A. Cebotari",zone:"Corporate · Chișinău",sales:268000,target:118,com:8040},
  {name:"N. Lungu",zone:"Instituții publice",sales:241500,target:107,com:7245},
  {name:"V. Țurcanu",zone:"Corporate · Nord",sales:205800,target:96,com:6174},
  {name:"E. Rusu",zone:"Retail key-account",sales:178300,target:87,com:5349},
  {name:"D. Moraru",zone:"Online / B2B",sales:152600,target:78,com:4578},
  {name:"S. Bivol",zone:"Corporate · Sud",sales:131400,target:70,com:3942}
];
const DEPTS={
  vanzari:{ic:"💼",name:"Vânzări (B2B & retail)",sub:"companii, instituții, magazine, online",
    employees:[["Director vânzări",1,"DV"],["Agenți B2B",6,"AG"],["Operatori comenzi",4,"OP"],["Vânzători magazin",22,"VZ"]],
    tasks:[["Oferte B2B de întocmit azi: 18","man"],["Licitații/tendere instituții în lucru: 3","prog"],["Comenzi de procesat: 64","prog"],["Target lunar: 82% atins","prog"]],
    autos:[["Generare oferte B2B + dosare pentru licitații","din catalog, cu prețul pe client; gata în minute"],
      ["Captură comenzi omnicanal","telefon, email, site — într-un singur loc"],
      ["Comenzi recurente corporate","consumabilele se reaprovizionează automat la clienții fideli"],
      ["CRM viu pe fiecare client","istoric, contracte, sold"],
      ["Prognoză de vânzări pe sezon","vârful de rechizite școlare și comenzile corporate"],
      ["Comisioane agenți calculate automat","fără Excel"]]},
  achizitii:{ic:"📦",name:"Achiziții & import",sub:"distribuitor exclusiv pentru 16 branduri",
    employees:[["Șef achiziții",1,"ȘA"],["Specialiști import",3,"IM"],["Operator aprovizionare",2,"AP"]],
    tasks:[["Importuri în tranzit: 5","prog"],["Articole sub prag de stoc: 18","man"],["Facturi furnizori de introdus: 14","man"]],
    autos:[["Reaprovizionare predictivă pe sezon","stoc pregătit înainte de vârful școlar"],
      ["Urmărire termene import + curs valutar",""],
      ["Comparare furnizori","preț, termen, fiabilitate"],
      ["Citire automată a facturilor și documentelor vamale",""]]},
  depozit:{ic:"🚚",name:"Depozit & logistică",sub:"recepție, stoc, livrări",
    employees:[["Șef depozit",1,"ȘD"],["Gestionari",5,"GD"],["Curieri / șoferi",6,"CR"]],
    tasks:[["Livrări programate azi: 40","prog"],["Recepție marfă: 3 transporturi","prog"],["Inventar pe zone","man"]],
    autos:[["Optimizare rute de livrare",""],["Planificare livrări pe zone","grupare automată a comenzilor"],
      ["Tracking comandă pentru client",""],["Gestiune stoc cu scanare","stoc în timp real, pe 4 puncte"]]},
  contabilitate:{ic:"💰",name:"Contabilitate",sub:"facturi, încasări B2B, salarii",
    employees:[["Contabil-șef",1,"CȘ"],["Contabili",4,"CB"]],
    tasks:[["Facturi de emis: 30","man"],["Încasări B2B de reconciliat","man"],["Închidere lunară","prog"]],
    autos:[["Confirmare automată a achitărilor pe facturi/oferte",""],["Reconciliere bancară","încasări ↔ facturi"],
      ["Procesare facturi furnizori",""],["Rapoarte de creanțe B2B","cine datorează, cât, de când"]]},
  marketing:{ic:"📣",name:"Marketing",sub:"campanii, online, catalog",
    employees:[["Marketing manager",1,"MM"],["Social media",1,"SM"],["Content / catalog",2,"CT"]],
    tasks:[["Campanie back-to-school de pregătit","man"],["Postări social media","prog"],["Promoții de configurat","man"]],
    autos:[["Campanii sezoniere automate","rechizite școlare, corporate, sărbători"],
      ["Segmentare clienți B2B vs retail",""],["Conținut + SEO pe catalogul de 10.000+ produse",""],
      ["Recuperare coș abandonat (online)",""]]},
  rexuvit:{ic:"🎁",name:"Producție promoțională (Rexuvit)",sub:"cadouri de afaceri, personalizare cu logo",
    employees:[["Coordonator",1,"CO"],["Designeri",2,"DS"],["Operatori personalizare",5,"PR"]],
    tasks:[["Proiecte în lucru: 34","prog"],["Machete de aprobat","man"],["Comenzi de personalizare","prog"]],
    autos:[["Configurator de produs + ofertă instant","clientul alege produsul și personalizarea, primește prețul"],
      ["Urmărirea proiectelor","de la machetă la livrare"],["Cross-sell promoționale către clienții B2B",""],
      ["Profitabilitate pe proiect",""]]}
};

const NAV=[
  ["overview","📊","Privire de ansamblu"],
  ["stores","🏬","Magazine"],
  ["agenti","🏆","Agenți (clasament)"],
  ["sep"],
  ["vanzari","💼","Vânzări"],
  ["achizitii","📦","Achiziții & import"],
  ["depozit","🚚","Depozit & logistică"],
  ["contabilitate","💰","Contabilitate"],
  ["marketing","📣","Marketing"],
  ["rexuvit","🎁","Rexuvit (promoțional)"]
];
const WISH=[
  ["Oferte B2B și dosare de licitație generate automat","— eu doar aprob"],
  ["Comenzi recurente corporate reaprovizionate automat","— consumabilele clienților fideli"],
  ["Toate comenzile (telefon/email/site) într-un singur ecran",""],
  ["Prognoză de cerere pe sezon (rechizite școlare, corporate)",""],
  ["Confirmarea automată a achitărilor pe facturi","— fără telefoane la contabilitate"],
  ["Clasament agenți + comisioane calculate automat",""]
];
let view="overview";
const $=s=>document.querySelector(s);
function renderNav(){ $('#nav').innerHTML=NAV.map(n=>{ if(n[0]==="sep")return '<div class="sep"></div>'; return `<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`; }).join(''); }
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;
function empList(a){ return a.map(e=>`<div class="emp"><div class="av">${e[2]}</div><div class="n">${e[0]}</div><div class="ct">×${e[1]}</div></div>`).join(''); }
function taskList(a){ const l={man:"manual",prog:"în lucru",auto:"automatizat"}; return a.map(t=>`<div class="task"><span class="st ${t[1]}">${l[t[1]]}</span><span>${t[0]}</span></div>`).join(''); }
function autoList(a){ return a.map(x=>`<div class="auto"><span class="b">✓</span><span><b>${x[0]}</b>${x[1]?`<span class="benefit">${x[1]}</span>`:''}</span></div>`).join(''); }

function renderMain(){
  const m=$('#main');
  if(view==="overview"){
    const totalStaff=STORES.reduce((s,x)=>s+x.staff,0);
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Privire de ansamblu</h1><p>Compania pe magazine și departamente — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>4</b><span>magazine (3 + online)</span></div>
        <div class="kpi"><b>102 200 lei</b><span>vânzări azi (toate)</span></div>
        <div class="kpi"><b>52%</b><span>din vânzări = B2B</span></div>
        <div class="kpi"><b>82%</b><span>target lunar atins</span></div>
      </div>
      <div style="background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px">
        <h3 style="margin:0 0 4px;font-size:16px">🎯 Ce aș automatiza întâi — ca director de vânzări</h3>
        <p style="margin:0 0 12px;font-size:12.5px;opacity:.9">Lucrurile care îmi iau cel mai mult timp și le-aș automatiza primele:</p>
        <ol style="margin:0;padding-left:20px">${WISH.map(w=>`<li style="padding:5px 0;font-size:13.5px">${w[0]} ${w[1]?`<b style="background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px">${w[1].replace(/^— /,'')}</b>`:''}</li>`).join('')}</ol>
      </div>
      <div class="grid">
        <div class="card"><h3>🏬 Magazine <span class="c">${STORES.length}</span></h3>
          ${STORES.map(s=>`<div class="task"><span class="st ${s.ok?'auto':'man'}">${s.ok?'OK':'alertă'}</span><span><b>${s.name}</b> — ${s.city} · ${s.sales}</span></div>`).join('')}
        </div>
        <div class="card"><h3>👥 Echipă <span class="c">${totalStaff} pers.</span></h3>
          ${Object.values(DEPTS).map(d=>`<div class="task"><span class="st prog">${d.employees.reduce((s,e)=>s+e[1],0)}</span><span>${d.ic} ${d.name}</span></div>`).join('')}
        </div>
      </div>
    `;
  } else if(view==="stores"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏬</div><div><h1>Magazine</h1><p>Fiecare punct de vânzare separat — date demo</p></div></div>
      <div class="stores">${STORES.map(s=>`
        <div class="store"><div class="top"><div class="pin">${s.pin}</div><div><b>${s.name}</b><div class="city">${s.city}</div></div></div>
          <div class="row"><span>Responsabil</span><span><b>${s.manager}</b></span></div>
          <div class="row"><span>Angajați</span><span>${s.staff}</span></div>
          <div class="row"><span>Vânzări azi</span><span><b>${s.sales}</b></span></div>
          <div class="row"><span>Stoc</span><span class="${s.ok?'tag-ok':'tag-warn'}">${s.stock}</span></div>
        </div>`).join('')}</div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce s-ar automatiza la nivel de magazine</h3>
        ${autoList([["Stoc și prețuri sincronizate între cele 4 magazine și online","un produs epuizat dispare automat din online"],["Comparație vânzări între magazine, în timp real",""],["Reaprovizionare per magazin","fiecare primește ce-i trebuie, la timp"],["Aceeași politică de preț pe toate canalele, inclusiv online",""]])}
      </div>`;
  } else if(view==="agenti"){
    const sorted=[...AGENTS].sort((a,b)=>b.sales-a.sales);
    const totCom=AGENTS.reduce((s,a)=>s+a.com,0), totSales=AGENTS.reduce((s,a)=>s+a.sales,0);
    const medal=["🥇","🥈","🥉"], tcol=p=>p>=100?"#2e7d32":(p>=85?"#ef6c00":"#c62828"), fmt=n=>n.toLocaleString("ro-RO");
    m.innerHTML=`
      <div class="h"><div class="ic">🏆</div><div><h1>Agenți — clasament & comisioane</h1><p>Luna curentă · comision 3% din vânzări · date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>${AGENTS.length}</b><span>agenți B2B</span></div>
        <div class="kpi"><b>${fmt(totSales)} lei</b><span>vânzări agenți (lună)</span></div>
        <div class="kpi"><b>${fmt(totCom)} lei</b><span>comisioane de plată</span></div>
        <div class="kpi"><b>${sorted[0].name}</b><span>top vânzător 🏆</span></div>
      </div>
      <div class="card"><h3>📈 Clasament <span class="c">după vânzări</span></h3>
        ${sorted.map((a,i)=>`<div class="agent"><div class="rank ${i<3?'top':''}">${i<3?medal[i]:(i+1)}</div>
          <div class="who2"><b>${a.name}</b><div class="z">${a.zone}</div><div class="bar"><i style="width:${Math.min(a.target,100)}%;background:${tcol(a.target)}"></i></div></div>
          <div class="nums"><span class="s">${fmt(a.sales)} lei</span> · <span class="pct" style="color:${tcol(a.target)}">${a.target}%</span><span class="com">+${fmt(a.com)} lei comision</span></div></div>`).join('')}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm aici <span class="c">AI</span></h3>
        ${autoList([["Comisioane calculate automat","din vânzările confirmate"],["Clasament în timp real",""],["Alerte agenți sub target",""],["Obiective și bonusuri urmărite automat",""]])}
      </div>`;
  } else {
    const d=DEPTS[view];
    m.innerHTML=`
      <div class="h"><div class="ic">${d.ic}</div><div><h1>${d.name}</h1><p>${d.sub} — date demo</p></div></div>
      <div class="grid">
        <div class="card"><h3>👥 Angajați <span class="c">${d.employees.reduce((s,e)=>s+e[1],0)} pers.</span></h3>${empList(d.employees)}</div>
        <div class="card"><h3>📋 Sarcini curente</h3>${taskList(d.tasks)}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm în ${d.name} <span class="c">AI</span></h3>${autoList(d.autos)}</div>`;
  }
}
$('#legal').textContent="© 2026 · Demo confidențial, realizat la comandă. Date ilustrative — se completează cu cele reale Birovits. Concept, design și implementare = proprietatea dezvoltatorului; reproducerea fără acord interzisă.";
renderNav(); renderMain();
</script>
</body>
</html>
