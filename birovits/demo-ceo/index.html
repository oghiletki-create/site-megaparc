<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birovits — Panou General (demo Director General / CEO)</title>
<!--
  DEMO INTERN pentru DIRECTORUL GENERAL (CEO) — Birovits (birotică & papetărie).
  Vedere executivă pe toată compania: finanțe, vânzări & magazine, achiziții/import,
  depozit, divizia promoțională (Rexuvit), echipă, decizii AI.
  Date DEMO — se completează cu cele reale. Concept confidențial, proprietatea dezvoltatorului.
-->
<style>
  :root{
    --green:#1565c0;--green-d:#0d47a1;--green-l:#e3f2fd;--bg:#eef1f6;--card:#fff;
    --ink:#1f2733;--muted:#6b7280;--line:#e3e7ee;--amber:#ef6c00;--blue:#1565c0;--accent:#f9a825;--red:#c62828;--pos:#2e7d32;
    --shadow:0 8px 24px rgba(13,71,161,.10);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .topbar{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .logo{width:38px;height:38px;flex:0 0 38px}
  .brand b{font-size:18px;font-weight:800;display:block;line-height:1}
  .brand span{font-size:11px;opacity:.9;letter-spacing:1px;text-transform:uppercase}
  .role{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .demo-badge{background:var(--accent);color:#3a2c00;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.5px}

  .shell{display:grid;grid-template-columns:230px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px}
  @media(max-width:820px){.shell{grid-template-columns:1fr}}
  .nav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;height:max-content;box-shadow:var(--shadow);position:sticky;top:74px}
  @media(max-width:820px){.nav{position:static;display:flex;flex-wrap:wrap;gap:6px}}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left}
  @media(max-width:820px){.nav button{width:auto}}
  .nav button:hover{background:var(--green-l)} .nav button.on{background:var(--green);color:#fff}
  .nav .mi{font-size:17px;flex:0 0 20px;text-align:center}

  .main{min-width:0}
  .h{display:flex;align-items:center;gap:12px;margin:2px 0 14px}
  .h .ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;font-size:24px;flex:0 0 46px}
  .h h1{font-size:21px;margin:0} .h p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .kpi b{font-size:20px;color:var(--green-d);display:block} .kpi span{font-size:12px;color:var(--muted)}
  .kpi .up{color:var(--pos);font-weight:700;font-size:12px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card h3 .c{font-size:11px;font-weight:700;color:var(--muted);background:var(--green-l);padding:1px 8px;border-radius:999px;margin-left:auto}

  .split{padding:8px 0}
  .split .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px} .split .lab b{font-weight:700}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden} .bar i{display:block;height:100%;border-radius:999px;background:var(--green)}

  .row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4} .row:first-of-type{border-top:0}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto}
  .st.ok{background:#e8f5e9;color:var(--pos)} .st.warn{background:#fff3e0;color:var(--amber)} .st.risk{background:#fdecea;color:var(--red)}
  .row .grow{flex:1} .row .val{font-weight:700;color:var(--ink);font-size:12.5px}

  .auto{display:flex;gap:9px;padding:9px 0;border-top:1px dashed var(--line);font-size:13px;line-height:1.45} .auto:first-of-type{border-top:0}
  .auto .b{flex:0 0 22px;height:22px;border-radius:6px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .auto .benefit{color:var(--muted);font-size:11.5px;display:block;margin-top:1px}

  .wish{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .wish h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px} .wish p.sub{margin:0 0 12px;font-size:12.5px;opacity:.9}
  .wish ol{margin:0;padding-left:20px} .wish li{padding:5px 0;font-size:13.5px;line-height:1.45} .wish li b{background:rgba(255,255,255,.18);padding:0 6px;border-radius:5px}

  .legal{max-width:1180px;margin:8px auto 26px;padding:0 18px;color:var(--muted);font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="topbar">
  <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
    <rect width="48" height="48" rx="12" fill="#fff"/>
    <text x="24" y="34" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="30" fill="#0d47a1">B</text>
  </svg>
  <div class="brand"><b>Birovits</b><span>Panou general</span></div>
  <div class="role">👤 Director General (CEO) <span class="demo-badge">DEMO</span></div>
</div>

<div class="shell">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<p class="legal" id="legal"></p>

<script>
/* ===== DATE DEMO — se completează cu cele reale Birovits ===== */
const LINES=[["Birotică & papetărie",38],["Mobilier metalic & seifuri",22],["IT & accesorii birou",19],["Articole promoționale (Rexuvit)",21]];
const CHAN=[["B2B — companii & instituții",52],["Retail — magazine",30],["Online birovits.md",18]];
const STORES=[
  {n:"Magazin Central · Chișinău",v:"38 500 lei/zi"},{n:"Magazin Botanica",v:"21 200 lei/zi"},
  {n:"Magazin Râșcani",v:"17 900 lei/zi"},{n:"Online birovits.md",v:"24 600 lei/zi"}
];
const RISK=[
  ["risk","Creanțe B2B restante peste 30 de zile","340 000 lei"],
  ["warn","Sezon rechizite școlare (aug.–sept.) de pregătit","stoc + personal"],
  ["warn","18 articole sub prag de stoc","reaprovizionare"],
  ["ok","Flux de numerar pozitiv","+510 000 lei luna aceasta"]
];
const DEPTS=[["Vânzări B2B",14],["Vânzări retail",22],["Achiziții & import",6],["Depozit & logistică",12],["Contabilitate",5],["Marketing",4],["Producție promoțională (Rexuvit)",8],["Conducere",2]];

const WISH=[
  ["Tablou de bord consolidat în timp real","toate cele 4 magazine, online, B2B și depozitul într-un singur ecran"],
  ["Prognoză de cerere pe sezon","anticipezi vârful de rechizite școlare (aug.–sept.) și comenzile corporate"],
  ["Profitabilitate pe linie, pe brand și pe magazin","știi unde câștigi și unde pierzi"],
  ["Alerte automate de risc","creanțe B2B restante, rupturi de stoc, marjă în scădere"],
  ["Raport executiv automat, zilnic, în limbaj natural",""],
  ["Scenarii „what-if” pentru decizii","achiziții de import, prețuri, stoc sezonier — pe date"]
];

const NAV=[
  ["overview","📊","Privire de ansamblu"],
  ["finante","💵","Finanțe"],
  ["vanzari","🏬","Vânzări & magazine"],
  ["import","📦","Achiziții & import"],
  ["rexuvit","🎁","Promoționale (Rexuvit)"],
  ["echipa","👥","Echipă"],
  ["ai","🤖","Decizii AI"]
];
let view="overview";
const $=s=>document.querySelector(s);
function renderNav(){ $('#nav').innerHTML=NAV.map(n=>`<button class="${view===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="mi">${n[1]}</span>${n[2]}</button>`).join(''); }
function go(v){ view=v; renderNav(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
window.go=go;
function splits(arr){ return arr.map(x=>`<div class="split"><div class="lab"><span>${x[0]}</span><b>${x[1]}%</b></div><div class="bar"><i style="width:${x[1]}%"></i></div></div>`).join(''); }
function risks(arr){ const lbl={ok:"OK",warn:"atenție",risk:"risc"}; return arr.map(r=>`<div class="row"><span class="st ${r[0]}">${lbl[r[0]]}</span><span class="grow">${r[1]}</span><span class="val">${r[2]}</span></div>`).join(''); }
function autoList(arr){ return arr.map(a=>`<div class="auto"><span class="b">✓</span><span><b>${a[0]}</b>${a[1]?`<span class="benefit">${a[1]}</span>`:''}</span></div>`).join(''); }

function renderMain(){
  const m=$('#main');
  if(view==="overview"){
    m.innerHTML=`
      <div class="h"><div class="ic">📊</div><div><h1>Privire de ansamblu</h1><p>Compania la zi — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>3,18 mln lei</b><span>cifră de afaceri (luna)</span></div>
        <div class="kpi"><b>31%</b><span>marjă brută</span></div>
        <div class="kpi"><b>368 000 lei</b><span>profit net (luna)</span></div>
        <div class="kpi"><b class="up">+14%</b><span>creștere vs. anul trecut</span></div>
      </div>
      <div class="wish">
        <h3>🎯 Ce aș automatiza întâi — ca director general</h3>
        <p class="sub">Lucrurile pe care le-aș vrea pe un singur ecran, ca să conduc pe date, nu pe rapoarte întârziate:</p>
        <ol>${WISH.map(w=>`<li>${w[0]} ${w[1]?`<b>${w[1]}</b>`:''}</li>`).join('')}</ol>
      </div>
      <div class="grid">
        <div class="card"><h3>🧩 Linii de business</h3>${splits(LINES)}</div>
        <div class="card"><h3>🛒 Canale de vânzare</h3>${splits(CHAN)}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚠️ Radar de risc <span class="c">timp real</span></h3>${risks(RISK)}</div>
    `;
  } else if(view==="finante"){
    m.innerHTML=`
      <div class="h"><div class="ic">💵</div><div><h1>Finanțe</h1><p>Profitabilitate și flux de numerar — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>24,3 mln lei</b><span>cifră de afaceri (an, YTD)</span></div>
        <div class="kpi"><b>2,6 mln lei</b><span>profit net (YTD)</span></div>
        <div class="kpi"><b class="up">+510 000 lei</b><span>flux de numerar (luna)</span></div>
        <div class="kpi"><b>1,24 mln lei</b><span>creanțe B2B de încasat</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>📈 Profitabilitate pe linie</h3>${splits([["Promoționale (Rexuvit) — marjă 42%",42],["Mobilier & seifuri — marjă 30%",30],["Birotică & papetărie — marjă 27%",27],["IT & accesorii — marjă 19%",19]])}</div>
        <div class="card"><h3>⚠️ Creanțe (B2B pe termen)</h3>${risks([["risk","Restante peste 30 de zile","340 000 lei"],["warn","Scadente săptămâna aceasta","410 000 lei"],["ok","Încasat luna aceasta","2,3 mln lei"]])}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm în finanțe <span class="c">AI</span></h3>
        ${autoList([["Confirmarea automată a încasărilor pe facturi/oferte","plata se potrivește singură cu factura"],["Situația creanțelor B2B în timp real","cine datorează, cât, de când"],["Prognoză de flux de numerar pe sezon","anticipezi golurile de lichiditate"],["Raport financiar executiv automat","fără să aștepți închiderea lunii"]])}
      </div>
    `;
  } else if(view==="vanzari"){
    m.innerHTML=`
      <div class="h"><div class="ic">🏬</div><div><h1>Vânzări & magazine</h1><p>Consolidat pe canale și puncte — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>4</b><span>magazine (3 + online)</span></div>
        <div class="kpi"><b>10 000+</b><span>produse în asortiment</span></div>
        <div class="kpi"><b>52%</b><span>din vânzări = B2B</span></div>
        <div class="kpi"><b class="up">+14%</b><span>vs. anul trecut</span></div>
      </div>
      <div class="grid">
        <div class="card"><h3>🛒 Pe canale</h3>${splits(CHAN)}</div>
        <div class="card"><h3>🏬 Pe magazine</h3>${STORES.map(s=>`<div class="row"><span class="grow">${s.n}</span><span class="val">${s.v}</span></div>`).join('')}</div>
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Tablou consolidat: magazine + online + B2B, în timp real",""],["Prognoză de vânzări pe sezon (rechizite școlare, corporate)",""],["Comenzi recurente automate pentru clienții corporate","consumabile reaprovizionate la timp"],["Profitabilitate pe magazin, brand și produs",""]])}
      </div>
    `;
  } else if(view==="import"){
    m.innerHTML=`
      <div class="h"><div class="ic">📦</div><div><h1>Achiziții & import</h1><p>Distribuitor exclusiv pentru branduri internaționale — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>4,2 mln lei</b><span>valoare stoc</span></div>
        <div class="kpi"><b>16</b><span>branduri în distribuție</span></div>
        <div class="kpi"><b>18</b><span>articole sub prag</span></div>
        <div class="kpi"><b>5</b><span>importuri în tranzit</span></div>
      </div>
      <div class="card"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Reaprovizionare predictivă pe sezon","stoc pregătit înainte de vârful școlar"],["Urmărire termene import + curs valutar",""],["Alerte de rupturi de stoc, pe magazin și pe brand",""],["Citire automată a facturilor furnizorilor și a documentelor vamale",""]])}
      </div>
    `;
  } else if(view==="rexuvit"){
    m.innerHTML=`
      <div class="h"><div class="ic">🎁</div><div><h1>Producție promoțională — Rexuvit</h1><p>Cadouri de afaceri, personalizare cu logo — date demo</p></div></div>
      <div class="kpis">
        <div class="kpi"><b>21%</b><span>din cifra de afaceri</span></div>
        <div class="kpi"><b>42%</b><span>marjă (cea mai mare)</span></div>
        <div class="kpi"><b>34</b><span>proiecte în lucru</span></div>
        <div class="kpi"><b class="up">+23%</b><span>vs. anul trecut</span></div>
      </div>
      <div class="card"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Configurator de produs + ofertă instant","clientul alege produsul și personalizarea, primește prețul"],["Urmărirea proiectelor de personalizare","de la machetă la livrare"],["Cross-sell promoționale către clienții B2B existenți",""],["Profitabilitate pe proiect",""]])}
      </div>
    `;
  } else if(view==="echipa"){
    const tot=DEPTS.reduce((s,d)=>s+d[1],0);
    m.innerHTML=`
      <div class="h"><div class="ic">👥</div><div><h1>Echipă</h1><p>${tot} angajați pe departamente — date demo</p></div></div>
      <div class="card"><h3>👥 Angajați pe departamente <span class="c">${tot}</span></h3>
        ${DEPTS.map(d=>`<div class="row"><span class="grow">${d[0]}</span><span class="val">${d[1]}</span></div>`).join('')}
      </div>
      <div class="card" style="margin-top:16px"><h3>⚙️ Ce automatizăm <span class="c">AI</span></h3>
        ${autoList([["Productivitate pe echipă și pe agent",""],["Comisioane calculate automat",""],["Rapoarte de performanță, fără Excel",""]])}
      </div>
    `;
  } else {
    m.innerHTML=`
      <div class="h"><div class="ic">🤖</div><div><h1>Decizii AI</h1><p>Ce îți dă sistemul, ca director general</p></div></div>
      <div class="card"><h3>⚙️ Automatizări pentru conducere</h3>
        ${autoList([
          ["Tablou de bord consolidat în timp real","cele 4 magazine, online, B2B, depozit și finanțe într-un loc"],
          ["Prognoză de cerere pe sezon","vârful de rechizite școlare și comenzile corporate"],
          ["Profitabilitate pe linie, brand, magazin și produs",""],
          ["Alerte automate de risc","creanțe B2B restante, rupturi de stoc, marjă în scădere"],
          ["Raport executiv automat, zilnic, în limbaj natural",""],
          ["Scenarii „what-if” pentru decizii","import, prețuri, stoc sezonier — pe date"]
        ])}
      </div>
      <div class="card" style="margin-top:16px"><h3>🛡️ Principiu</h3>
        <p style="font-size:13.5px;line-height:1.5;margin:0">AI-ul <b>pregătește și propune</b> — deciziile rămân la conducere. Construim peste sistemele existente (ex. 1C / ERP), nu le înlocuim.</p>
      </div>
    `;
  }
}
$('#legal').textContent="© 2026 · Demo confidențial, realizat la comandă. Date ilustrative — se completează cu cele reale Birovits. Concept, design și implementare = proprietatea dezvoltatorului; reproducerea fără acord interzisă.";
renderNav(); renderMain();
</script>
</body>
</html>
