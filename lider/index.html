<title>Oleg Ghiletchi — Lider</title>

<style>
:root{
  --bg:#101319;--bg2:#151922;--card:#1b212c;--ink:#f4f1ea;--mut:#9aa6b4;--mut2:#6f7b8a;
  --gold:#c9a227;--gold-l:#f0d77a;--line:rgba(216,182,74,.18);--line2:rgba(255,255,255,.07);
  --ff:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--fd:'Playfair Display',Georgia,serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:linear-gradient(180deg,#0d1016,#12161e 40%,#101319);color:var(--ink);font-family:var(--ff);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1060px;margin:0 auto;padding:0 22px}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-l);font-weight:700}
h1,h2,h3{font-family:var(--fd);font-weight:700;letter-spacing:-.01em;line-height:1.15}
section{padding:64px 0;border-top:1px solid var(--line2)}
section:first-of-type{border-top:none}
.sec-head{margin-bottom:30px}
.sec-head h2{font-size:clamp(24px,3.4vw,36px);margin:12px 0 14px}
.intro{color:var(--mut);max-width:820px;font-size:clamp(15px,1.7vw,17px)}
.langtg{position:fixed;top:14px;right:14px;z-index:50;display:flex;background:rgba(16,17,21,.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:3px}
.langtg button{border:0;background:transparent;color:#e7e3da;font-family:inherit;font-weight:800;font-size:12px;letter-spacing:.05em;padding:7px 14px;border-radius:999px;cursor:pointer;transition:.25s}
.langtg button.on{background:var(--gold);color:#241c00}
.hero{padding-top:96px;text-align:center}
.hero .name{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:20px}
.hero h1{font-size:clamp(28px,4.6vw,50px);margin:0 auto 22px;max-width:18ch}
.hero h1 em{color:var(--gold-l);font-style:normal}
.hero .intro{margin:0 auto;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;font-size:15.5px;color:#cdd5de}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.chip{font-size:13px;color:#d9e0e8;background:rgba(216,182,74,.08);border:1px solid var(--line);border-radius:10px;padding:12px 14px;line-height:1.45;flex:1 1 260px;min-width:240px;text-align:left}
.chip b{color:var(--gold-l);font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;transition:border-color .35s,transform .35s var(--ease)}
.card:hover{border-color:var(--line);transform:translateY(-3px)}
.card p{font-size:14.5px;color:#cbd3dc}
.card .mk{display:block;width:24px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:12px}
/* stats */
.statgrid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
@media(max-width:820px){.statgrid{grid-template-columns:1fr}}
.fintable{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.fintable th,.fintable td{padding:13px 14px;text-align:right;font-size:14px;border-bottom:1px solid var(--line2)}
.fintable th:first-child,.fintable td:first-child{text-align:left}
.fintable thead th{color:var(--gold-l);font-weight:700;font-size:12px;letter-spacing:.04em;background:rgba(216,182,74,.06)}
.fintable tbody tr:last-child td{border-bottom:none;font-weight:700;color:#fff;background:rgba(216,182,74,.05)}
.factbox{display:flex;flex-direction:column;gap:10px}
.fact{background:linear-gradient(180deg,rgba(216,182,74,.08),rgba(216,182,74,.02));border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:14px;color:#e7edf3}
.share{background:var(--card);border:1px solid rgba(225,120,90,.4);border-radius:12px;padding:14px 16px;margin-top:14px;font-size:13.5px;color:#f0d2c8}
.share b{color:#ffb59a}
.srcline{font-size:11.5px;color:var(--mut2);margin-top:12px}
.struct{margin-top:26px}
.struct h3{font-size:16px;color:var(--gold-l);margin-bottom:12px;font-family:var(--ff);font-weight:700;letter-spacing:.02em}
.struct .row{display:grid;grid-template-columns:170px 1fr;gap:14px;padding:13px 0;border-bottom:1px solid var(--line2);font-size:14px}
@media(max-width:620px){.struct .row{grid-template-columns:1fr;gap:3px}}
.struct .row b{color:#fff}
.struct .row span{color:#c4ccd5}
.timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
@media(max-width:820px){.timeline{grid-template-columns:1fr}}
.phase{background:linear-gradient(180deg,rgba(216,182,74,.07),rgba(216,182,74,.012));border:1px solid var(--line);border-radius:16px;padding:22px}
.phase .ph-k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-l);font-weight:800;margin-bottom:10px}
.phase p{font-size:14px;color:#cdd5de}
.qa{display:flex;flex-direction:column;gap:12px}
.qa .item{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:18px 20px;display:flex;gap:14px}
.qa .item .n{flex:none;width:26px;height:26px;border-radius:50%;background:rgba(216,182,74,.14);border:1px solid var(--line);display:grid;place-items:center;color:var(--gold-l);font-weight:800;font-size:13px}
.qa .item p{font-size:14.5px;color:#cdd5de}
.cta{text-align:center}
.cta .intro{margin:0 auto 22px;text-align:center}
.cta-card{background:linear-gradient(180deg,rgba(216,182,74,.08),rgba(216,182,74,.02));border:1px solid var(--line);border-radius:18px;padding:32px 26px;max-width:680px;margin:0 auto}
.cta-card .line{font-size:15px;color:#d9e0e8;margin:8px 0}
.foot{padding:30px 0 50px;text-align:center;color:var(--mut2);font-size:12px;line-height:1.6}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
</style>
</head>

<script id="data" type="application/json">[{"id":"hero","label":"Hero / poziționare","final":{"ru":{"heading":"Производитель + строитель + система продаж — в одном человеке. Кандидат на роль коммерческого директора / директора по развитию холдинга «Lider»","intro":"На встрече вы сами назвали узкие места — порядок в CRM, KPI, контроль менеджеров, сквозная картина продаж–склад–закупки–дебиторка. Это ровно то, что я каждый день делаю руками в своём бизнесе. При этом я прошёл всю цепочку лично: продавал отделку и считал сметы «под ключ», как строитель доводил объекты от фундамента до монтажа кровли, а потом перевёл собственные компании на CRM и регламенты. Поэтому я говорю на одном языке и с клиентом, и со стройкой, и с производством — и вижу разрывы между продажами, складом и стройкой изнутри, а не из отчёта. Контекст по вам я знаю (собственные бренды Florentina/Lider/Melano, дистрибуция ArcelorMittal, Fakro, Rockwool, Vilpe, Galeco, профнастил и заборы, ~10 филиалов, два юрлица и выход на левый берег через Eurodesign) — на встрече хочу проверить, где гипотезы совпадают с вашей реальностью.","points":["Производитель + строитель + автоматизация. На Construct Resurs продавал отделку и напольные покрытия, считал сметы и координировал монтаж; на Flormincom (ныне A-casa) как строитель вёл объекты «под ключ» — специфицировал и принимал кровлю, знаю, почему прораб заворачивает партию, что спрашивает снабженец до заказа и где заказ теряется между складом и отгрузкой. Это не «продавал кровлю» из резюме — это руки на объекте.","Системность приношу как компетенцию, а не как продукт. GO CRM — доказательство, что я умею строить такие системы; но к вам я иду коммерческим директором на full-time, а не интегратором. Работаю на любой вашей CRM (или выберем вместе), лицензии не продаю, Ghiletchi Consulting в это не вовлекаю — конфликта интересов нет.","Свои компании я систематизировал не чтобы отойти от дел, а чтобы освободить себя для полноценной работы здесь. Первые месяцы — в полях и в CRM ежедневно: Бельцы, Кагул, Сорока, филиалы. Хочу построить вам коммерческий отдел, который держится на системе и данных, а не на героизме одного человека.","Мыслю не только процессом, но и экономикой дистрибуции: маржа по категориям (на металлочерепице деньги делаются на аксессуарах, водостоках, креплениях и на возврате дилера, а не на листе, где вы конкурируете ценой с прямым импортом), оборачиваемость склада по филиалам, дебиторка в днях, attach-rate аксессуаров на каждый заказ кровли. Поэтому рычаги роста вижу конкретные: реактивация уснувших дилеров и прорабов, продажа системы целиком вместо голого листа, единый стандарт продаж по 10 филиалам как база под новые точки и под левый берег.","Первые 90 дней как предложение, а не лозунг: (1) аудит воронки, менеджеров и дебиторки по филиалам; (2) внедрение отчётности и 3–5 KPI, по которым прошу меня судить — конверсия, средний чек, attach-rate аксессуаров, дебиторка в днях, реактивированные B2B-клиенты; (3) первая волна возврата старых дилеров и оживление дилерской сети. Full-time, формат «фикс + бонус за результат» — бонус большой и из цифр, чтобы у меня был свой риск в деле."]},"ro":{"heading":"Producător + constructor + sistem de vânzări — într-un singur om. Candidat pentru rolul de director comercial / director de dezvoltare al holdingului „Lider”","intro":"La întâlnire ați numit chiar dumneavoastră punctele slabe — ordine în CRM, KPI, control al managerilor, imagine de la cap la coadă vânzări–depozit–achiziții–debitoare. Este exact ce fac zilnic cu mâinile în propriul business. Iar drumul l-am parcurs personal: am vândut finisaje și am calculat devize „la cheie”, ca constructor am dus obiecte de la fundație până la montajul acoperișului, apoi mi-am trecut companiile pe CRM și regulamente. De aceea vorbesc aceeași limbă cu clientul, cu șantierul și cu producția — și văd rupturile dintre vânzări, depozit și șantier din interior, nu dintr-un raport. Contextul vostru îl cunosc (branduri proprii Florentina/Lider/Melano, distribuție ArcelorMittal, Fakro, Rockwool, Vilpe, Galeco, profnastil și garduri, ~10 filiale, două firme și acoperire pe malul stâng prin Eurodesign) — la întâlnire vreau să verific unde se potrivesc ipotezele cu realitatea voastră.","points":["Producător + constructor + automatizare. La Construct Resurs am vândut finisaje și pardoseli, am calculat devize și am coordonat montaj; la Flormincom (azi A-casa), ca constructor, am dus obiecte „la cheie” — am specificat și recepționat acoperișuri, știu de ce un prorab respinge un lot, ce întreabă un snabjenec înainte să comande și unde se pierde comanda între depozit și expediție. Nu e „am vândut acoperișuri” de CV — e mâna pe obiect.","Sistematizarea o aduc ca o competență, nu ca un produs. GO CRM e dovada că știu să construiesc astfel de sisteme; dar la voi vin director comercial full-time, nu integrator. Lucrez pe orice CRM aveți (sau îl alegem împreună), nu vă vând licențe și nu implic Ghiletchi Consulting — fără conflict de interese.","Mi-am sistematizat companiile nu ca să mă retrag, ci ca să mă pot dedica integral aici. Primele luni — în teren și în CRM zilnic: Bălți, Cahul, Soroca, filialele. Vreau să vă construiesc un departament comercial care stă pe sistem și pe date, nu pe eroismul unui singur om.","Gândesc nu doar procesul, ci și economia distribuției: marja pe categorie (la metalocherepită banii se fac pe accesorii, sisteme pluviale, fixări și pe revenirea dealerului, nu pe foaia de tablă unde concurați la preț cu importul direct), rotația stocului pe filiale, debitoarea în zile, attach-rate-ul de accesorii pe fiecare comandă de acoperiș. De aceea pârghiile de creștere le văd concrete: reactivarea dealerilor și prorabilor adormiți, vânzarea sistemului complet în loc de tabla simplă, un standard unic de vânzare pe cele 10 filiale ca bază pentru filiale noi și pentru malul stâng.","Primele 90 de zile ca ofertă, nu ca slogan: (1) audit al pâlniei, al managerilor și al debitoarei pe filiale; (2) implementarea raportării și a 3–5 KPI după care vă rog să mă judecați — conversie, cec mediu, attach-rate de accesorii, debitoare în zile, clienți B2B reactivați; (3) primul val de revenire a dealerilor vechi și de reactivare a rețelei de dealeri. Full-time, format „fix + bonus pe rezultat” — bonusul mare și din cifre, ca să am și eu risc propriu în joc."]}}},{"id":"holding","label":"Am studiat holdingul","final":{"ru":{"heading":"Я разобрался, как устроен ваш бизнес","intro":"Перед встречей я смотрел на LIDER не как на «компанию, которой нужны продажи вообще», а как на конкретную операционную машину: производство плюс импорт, сеть филиалов, B2B-канал с дилерами и стройкой, выраженная сезонность кровли. Ниже — не пересказ ваших данных, а то, где я вижу рычаги для денег и где конкретно полезен именно я: человек, который был и поставщиком материалов, и строителем, и собирал CRM/KPI под такие задачи.","points":["Две компании (Esplan-Lux и Eurodesign) под одним брендом, с выходом Eurodesign на левый берег (Бендеры/Тирасполь), — это не просто «две фирмы», а консолидированная отчётность по двум юрлицам и риск разнобоя в ценах между ними. Доступ к рынку Приднестровья через отдельное юрлицо — сильный ход, но именно такая структура требует единой картины по марже и стоку. Это ровно то, что я привык оцифровывать.","Собственные бренды металлочерепицы (Florentina, Lider, Melano) плюс импорт премиум-марок (ArcelorMittal, Fakro, Rockwool и др.) в ассортименте 2000+ позиций — это готовая ценовая лестница good-better-best. Здесь решается главный коммерческий вопрос: что менеджер толкает первым — свой бренд с высокой маржой или импорт с быстрой оборачиваемостью. От дисциплины цен и правильного апсейла тут напрямую зависит маржа, а это поведение менеджеров я умею настраивать через скрипты, KPI и CRM.","11 филиалов (Кишинёв, Бельцы, Сорока, Бричаны, Унгены, Орхей, Комрат, Кагул, Яловены, Хынчешты, Анений Ной) — это не абстрактный «масштаб», а 11 точек, где без единой системы у каждого филиала «своя правда» по остаткам, ценам и дебиторке: один филиал режет цену другому, где-то мёртвый сток, где-то нехватка. На такой сети ручное управление физически уже не тянет — и, по-моему, именно это вы и ощущаете как «нет порядка в CRM и контроле».","Кровля и фасад — категория жёстко сезонная: пик март–октябрь, межсезонье — это сбор дебиторки, предзаказы и программы затарки дилеров к сезону. Дебиторку я выношу отдельной строкой, потому что в B2B стройматериалах долг подрядчиков — риск номер один: стройки встают, кто-то банкротится, а вы по факту необеспеченный кредитор. Лимиты кредита на клиента в CRM и алерты по срокам — первое, что я бы здесь навёл.","Ваша аудитория — не однородный «B2B», а разные каналы с разной экономикой: дилеры, прямые подрядчики, снабженцы, прорабы и объекты. С каждой из этих сторон я работал лично — и как поставщик отделочных материалов, и со стороны стройки «от фундамента до кровли», — поэтому говорю на языке и снабженца, и прораба, и вижу конфликт каналов (продать напрямую подрядчику, которого ведёт ваш дилер?), который мешает расти без каннибализации.","Про возврат старых клиентов: вопрос не в самом возврате, а в причине ухода — цена, наличие на складе или ушедший менеджер, который увёл дилера за собой. Это видно только в данных: кто из клиентов просел или пропал, когда и почему. Моя гипотеза по первым 90 дням — поднять это в CRM, собрать причины оттока и запустить адресную кампанию возврата, а параллельно закрыть контур цена–склад–дебиторка по сети. На встрече хочу свериться, какая из этих болей для вас сейчас самая острая."]},"ro":{"heading":"Am studiat cum funcționează businessul vostru","intro":"Înainte de întâlnire am privit LIDER nu ca pe «o companie care are nevoie de vânzări în general», ci ca pe o mașinărie operațională concretă: producție plus import, rețea de filiale, canal B2B cu dealeri și șantiere, sezonalitate pronunțată a acoperișurilor. Mai jos nu este o recitare a datelor voastre, ci locurile unde văd pârghii pentru bani și unde sunt util eu anume: un om care a fost și furnizor de materiale, și constructor, și a construit CRM/KPI exact pentru astfel de sarcini.","points":["Două firme (Esplan-Lux și Eurodesign) sub un singur brand, cu Eurodesign acoperind malul stâng (Bender/Tiraspol), nu înseamnă doar «două firme», ci raportare consolidată pe două entități și risc de necorelare a prețurilor între ele. Accesul la piața din Transnistria printr-o entitate separată este o mișcare bună, dar tocmai o astfel de structură cere o imagine unitară pe marjă și stoc. Exact asta sunt obișnuit să transform în cifre.","Brandurile proprii de țiglă metalică (Florentina, Lider, Melano) plus importul de mărci premium (ArcelorMittal, Fakro, Rockwool ș.a.) într-un asortiment de 2000+ poziții formează o scară de preț gata făcută good-better-best. Aici se decide întrebarea comercială principală: ce împinge managerul primul — brandul propriu cu marjă mare sau importul cu rotație rapidă. De disciplina prețurilor și de un upsell corect depinde direct marja, iar acest comportament al managerilor știu să-l reglez prin scripturi, KPI și CRM.","11 filiale (Chișinău, Bălți, Soroca, Briceni, Ungheni, Orhei, Comrat, Cahul, Ialoveni, Hîncești, Anenii Noi) nu sunt o «amploare» abstractă, ci 11 puncte unde, fără un sistem unitar, fiecare filială are «adevărul ei» despre stocuri, prețuri și debitoare: o filială taie prețul alteia, undeva stoc mort, altundeva rupere de stoc. Pe o astfel de rețea, conducerea manuală fizic nu mai face față — și, după mine, exact asta simțiți drept «lipsă de ordine în CRM și control».","Acoperișul și fațada sunt o categorie brutal de sezonieră: vârf martie–octombrie, iar off-season înseamnă colectarea debitoarei, comenzi anticipate și programe de stocare a dealerilor înainte de sezon. Debitoarea o pun pe o linie separată, pentru că în materiale de construcții B2B creanța către antreprenori este riscul numărul unu: șantierele se blochează, unii dau faliment, iar voi sunteți practic creditor negarantat. Limite de credit pe client în CRM și alerte de scadență sunt primul lucru pe care l-aș pune în ordine aici.","Audiența voastră nu este un «B2B» omogen, ci canale diferite cu economii diferite: dealeri, antreprenori direcți, agenți de aprovizionare (снабженцы), prorabi și obiecte/șantiere. Cu fiecare dintre aceste părți am lucrat personal — și ca furnizor de materiale de finisaj, și din partea șantierului «de la fundație la acoperiș» — de aceea vorbesc limba și a aprovizionatorului, și a prorabului, și văd conflictul de canal (să vinzi direct unui antreprenor pe care îl deservește dealerul tău?), care frânează creșterea fără canibalizare.","Despre revenirea clienților vechi: întrebarea nu e revenirea în sine, ci cauza plecării — prețul, disponibilitatea pe stoc sau un manager plecat care a luat dealerul cu el. Asta se vede doar în date: care clienți au scăzut sau au dispărut, când și de ce. Ipoteza mea pentru primele 90 de zile — să ridic asta în CRM, să strâng cauzele churn-ului și să pornesc o campanie țintită de revenire, iar în paralel să închid lanțul preț–stoc–debitoare pe rețea. La întâlnire vreau să verific care dintre aceste dureri este acum cea mai acută pentru voi."]}}},{"id":"diagnoza","label":"Unde văd creșterea (oportunități)","final":{"ru":{"heading":"Где, по моим гипотезам, ещё лежит рост — и что я хочу проверить с вашими цифрами","intro":"Компания уже забирает много: лидерство #1, прибыль ×3,8 за два года, долг 0,06, сбор дебиторки за 8 дней. Это лучшая стартовая позиция, какую можно пожелать. Ниже — не выводы и не «где вы недорабатываете», а рабочие гипотезы под проверку. Часть резервов обычно не видна изнутри просто потому, что все заняты текучкой — свежий взгляд снаружи иногда их подсвечивает. Приоритеты расставим вместе, по вашим данным и вашему видению.","points":["Сначала — честный замер доли, потом цель по ней. Доля 29,84% (2024) против 31,12% (2023) посчитана по статкатегории «fabricarea altor articole din metal» — это производственный показатель по выпуску металлоизделий, а не доля в продажах кровли по сегментам и регионам. Коммерческий директор управляет sell-out и дистрибуцией, а не ОКЭД-долей напрямую, поэтому первый шаг — построить собственный замер доли в продажах (металлочерепица / профнастил / водосток / фасад) по регионам. Сам факт, что выручка выросла (372,6 → 401,0 → 435,4 млн), а статдоля просела на ~1,3 п.п., означает только одно: рынок рос быстрее. Почему — это диагностика первых недель, а не готовый вывод. Моя рабочая гипотеза: новый игрок, рост подсегмента, где нас нет (например импортная премиум-черепица), или эффект цен на сталь. На встрече хочу свериться, где именно мы уступаем темп — и только после этого ставить цель по доле.","Аксессуары: не «идея», а измерение. Вы 25 лет в кровле и наверняка уже продаёте водостоки, доборку, крепёж, плёнки, снегозадержание — это не открытие. Мой вопрос диагностический: измеряется ли сегодня, сколько аксессуаров уходит вместе с основным металлом, по каждому менеджеру, и где потолок? Часто значимая часть маржи именно здесь, но вашу структуру я должен увидеть на ваших данных. Что я приношу — это замер по каждому менеджеру, бенчмарк лучших и стандарт комплектации заказа, чтобы сильный результат стал нормой, а не везением. Здесь же — конкретные молдавские драйверы: проектные продажи (объекты против частника), предсезонное затоваривание дилеров и локализация доборки (у вас импорт из Германии, Польши, Кореи — есть что замещать своим производством с лучшей маржой).","Реактивация партнёров — как гипотеза с запросом данных. При обороте 435 млн и базе #1 почти наверняка есть слой дилеров и прорабов, кто покупал и затих — но это я хочу проверить, а не утверждать. На встрече я бы попросил выгрузку по неактивным дилерам за 12–18 месяцев: реактивация существующих партнёров стоит кратно дешевле привлечения новых и опирается на ваш бренд. Здесь важна финансовая честность: ваши 8 дней сбора — отличный показатель, и расширение дилерки через товарный кредит может сознательно удлинить цикл оплаты. Я готов идти на управляемый товарный кредит для проверенных партнёров, держа дебиторку под контролем через лимиты и скоринг — рост дистрибуции и финансовая дисциплина не должны противоречить друг другу.","Единый стандарт работы с заявкой — чтобы рост был воспроизводимым при масштабировании. Не потому, что у вас «хаос» — цифры говорят обратное. А потому, что когда задач становится больше, управляемость должна расти вместе с ними. Один воспроизводимый стандарт работы с заявкой и прозрачные KPI по сети превращают разовые всплески в повторяемый процесс. Систематизацию я приношу как компетенцию — без продажи лицензий, без конфликта интересов.","Что беру на себя деньгами. Я принимаю формат fix+бонус и KPI, поэтому готов не только показать возможности, но и отвечать за них. На встрече предложу конкретные целевые вилки на первые 6 месяцев — по доле в продажах (после собственного замера), по доле аксессуаров в чеке (ориентир +3–5 п.п. как иллюстрация, точная цифра — после первых данных) и по числу реактивированных дилеров за квартал — и привяжу к ним свой бонус. Это переводит разговор из «вот ваши возможности» в «вот за что я отвечаю»."]},"ro":{"heading":"Unde cred că mai e creștere — și ce vreau să verific cu cifrele voastre","intro":"Compania ia deja mult: poziția #1, profit ×3,8 în doi ani, datorii 0,06, colectare debitoare în 8 zile. E cea mai bună poziție de start posibilă. Mai jos nu sunt concluzii și nici „unde nu lucrați destul”, ci ipoteze de lucru, de verificat. O parte din rezerve de obicei nu se văd din interior pur și simplu pentru că toți sunt prinși în operativ — o privire proaspătă din afară uneori le scoate la lumină. Prioritățile le stabilim împreună, după datele și viziunea voastră.","points":["Întâi o măsurare onestă a cotei, apoi obiectivul pe ea. Cota de 29,84% (2024) față de 31,12% (2023) e calculată pe categoria statistică „fabricarea altor articole din metal” — un indicator de producție pe articole din metal, nu cota în vânzările de acoperiș pe segmente și regiuni. Un director comercial gestionează sell-out-ul și distribuția, nu cota pe categoria statistică direct, de aceea primul pas e construirea propriei măsurători a cotei în vânzări (țiglă metalică / tablă cutată / sisteme pluviale / fațadă) pe regiuni. Faptul în sine că veniturile au crescut (372,6 → 401,0 → 435,4 mil), iar cota statistică a scăzut cu ~1,3 p.p., înseamnă un singur lucru: piața a crescut mai repede. De ce — asta e diagnostic pentru primele săptămâni, nu o concluzie gata. Ipoteza mea de lucru: un jucător nou, creșterea unui subsegment în care nu suntem (de exemplu țiglă premium din import) sau efectul prețurilor la oțel. La întâlnire vreau să mă sincronizez unde anume pierdem ritm — și abia apoi să fixez un obiectiv pe cotă.","Accesoriile: nu o „idee”, ci o măsurare. Sunteți de 25 de ani în acoperiș și cu siguranță vindeți deja sisteme pluviale, elemente de finisaj, fixări, folii, oprire-zăpadă — nu e o descoperire. Întrebarea mea e diagnostică: se măsoară azi câte accesorii pleacă împreună cu metalul de bază, pe fiecare agent, și unde e plafonul? Adesea o parte însemnată din marjă e tocmai aici, dar structura voastră trebuie s-o văd pe datele voastre. Ce aduc eu e măsurarea pe fiecare agent, benchmark-ul celor mai buni și un standard de completare a comenzii, ca rezultatul bun să devină normă, nu noroc. Tot aici — driverele concrete moldovenești: vânzările pe proiect (obiective vs. client privat), supra-aprovizionarea dealerilor înainte de sezon și localizarea elementelor de finisaj (aveți import din Germania, Polonia, Coreea — e ce înlocui cu producție proprie, la marjă mai bună).","Reactivarea partenerilor — ca ipoteză cu cerere de date. La o cifră de afaceri de 435 mil și o bază #1, aproape sigur există un strat de dealeri și prorabi care au cumpărat și au tăcut — dar asta vreau să verific, nu să afirm. La întâlnire aș cere un export al dealerilor inactivi pe 12–18 luni: reactivarea partenerilor existenți costă de câteva ori mai puțin decât atragerea de noi clienți și se sprijină pe brandul vostru. Aici contează onestitatea financiară: cele 8 zile de colectare sunt un indicator excelent, iar extinderea rețelei de dealeri prin credit comercial poate prelungi conștient ciclul de plată. Sunt gata să merg pe un credit comercial controlat pentru parteneri verificați, ținând debitoarea sub control prin limite și scoring — creșterea distribuției și disciplina financiară nu trebuie să se contrazică.","Un standard unic de lucru cu cererea — ca să fie creșterea reproductibilă la scalare. Nu pentru că ați avea „haos” — cifrele spun contrariul. Ci pentru că, atunci când sarcinile devin mai multe, controlabilitatea trebuie să crească odată cu ele. Un singur standard reproductibil de lucru cu cererea și KPI transparenți pe rețea transformă salturile izolate într-un proces repetabil. Sistematizarea o aduc ca competență — fără vânzare de licențe, fără conflict de interese.","Ce îmi asum cu banii. Accept formatul fix+bonus și KPI, de aceea sunt gata nu doar să arăt oportunitățile, ci să răspund pentru ele. La întâlnire voi propune vilcuri-țintă concrete pe primele 6 luni — pe cota în vânzări (după propria măsurare), pe ponderea accesoriilor în coș (reper +3–5 p.p. ca ilustrare, cifra exactă după primele date) și pe numărul de dealeri reactivați pe trimestru — și îmi voi lega bonusul de ele. Asta mută discuția din „iată oportunitățile voastre” în „iată de ce răspund eu”."]}}},{"id":"avantaj","label":"De ce eu / avantajul unic","final":{"ru":{"heading":"Почему я: продаю стройматериалы, был на стройке и строю системы продаж — в одном человеке","intro":"Коммерческого директора обычно ищут среди тех, кто силён в чём-то одном: или продажи, или стройка, или CRM и контроль. Моя ценность для «Лидер» в том, что я прошёл все три стороны и могу говорить на одном языке с дилером, с прорабом на объекте и с собственником, которому нужны цифры. Производитель здесь — вы: черепица Florentina, Lider, Melano, профиль на линии. Моя роль — мост между вашим производством, дилером и стройкой, плюс система продаж, которой, как я понял из разговора, пока не хватает. Скажу честно сразу по трём вещам, которые вас наверняка волнуют: я иду full-time и первые месяцы готов работать руками — на встречах, в переговорах, в филиалах; свой продукт GO CRM я вам не продаю — приношу опыт, как такие системы строятся, а порядок навожу в том, что у вас уже есть; и мои бизнесы построены так, что не требуют меня каждый день — именно поэтому я могу быть полностью ваш. Ниже — три опоры и план на первые 90 дней.","points":["ПРОДАЖИ СТРОЙМАТЕРИАЛОВ — знаю клиента и его возражение (Construct Resurs). Я продавал напольные и отделочные материалы дилерам, прорабам и магазинам: консультация, сметы «под ключ», координация монтажа. Я не приравниваю это к вашему циклу — черепица на рулоне, раскрой, кредит-лимиты у дилеров и тяжёлая логистика устроены иначе, и в эту специфику мне нужно быстро войти. Но тип клиента, его логику закупки и язык маржи и сроков (а не каталога) я знаю изнутри. Конкретный механизм, который я приношу под дебиторку — вашу боль №1: кредит-лимит на дилера, скоринг и авто-стоп отгрузки при просрочке, а не разговоры постфактум.","БЫЛ ПО ДРУГУЮ СТОРОНУ ПРИЛАВКА — покупал кровлю как заказчик (Flormincom / A-casa). Я координировал проекты и продавал дизайн-проекты с исполнением «под ключ», прошёл объект от фундамента до отделки. Я не выдаю себя за кровельщика и не буду перечислять вам бренды с вашего же сайта как «опыт». Сильнее другое: я был тем застройщиком, который выбирает поставщика кровли под проект — знаю, как он сравнивает, где торгуется, почему уходит к конкуренту на цене. Это позволяет заходить к строительной компании как «свой» по логике объекта, а не как продавец «по прайсу» — и быстро разбираться в технике там, где её не хватает.","СИСТЕМЫ ПРОДАЖ И УПРАВЛЕНИЕ ЛЮДЬМИ (Megaparc, Ghiletchi Consulting). Свои бизнесы я построил на автоматизации: CRM, боты, делегирование. Смысл не в том, что они «работают без меня» — а в том, что результат не висит на одном человеке. Сегодня у меня в автоматизированном контуре десятки клиентов и поток заявок, который ведут не я, а процесс и небольшая делегированная команда. Это ровно ваша задача на ~10 филиалов: воронка по филиалам, план/факт по менеджеру, видимая дебиторка для собственника. KPI ввожу не через штраф, а через прозрачность сначала — измеряем, показываем, потом мотивируем; так старые менеджеры не саботируют, а втягиваются. Систему строю в том, что у вас уже есть (1С / Bitrix / что используете) — она остаётся вашей и на ваших людях.","ПЕРВЫЕ 90 ДНЕЙ — конкретно. Недели 1–2: слушаю менеджеров и собственника, провожу аудит цепочки продажа→склад→закупки→логистика→отгрузки→дебиторка на 2–3 филиалах и собираю список «ушедших» дилеров с причиной ухода. Месяц 1: руками в активных продажах + возврат первых 2–3 старых клиентов как доказательство процесса, не героизма. Месяцы 2–3: воронка и план/факт по менеджерам, еженедельный ритм отчётности для собственника, KPI-пилот на одной филиале перед раскатом. Формат честно: full-time, готов на испытательный срок, фикс + бонус за результат, начинаю с рук на продажах. В конце испытательного решаем вместе — по цифрам."]},"ro":{"heading":"De ce eu: vând materiale de construcții, am fost pe șantier și construiesc sisteme de vânzări — într-o singură persoană","intro":"Un director comercial e căutat de obicei printre cei tari într-un singur lucru: ori vânzări, ori șantier, ori CRM și control. Valoarea mea pentru «Lider» e că le-am parcurs pe toate trei și pot vorbi aceeași limbă cu dealerul, cu prorabul de pe obiect și cu proprietarul care vrea cifre. Producătorul aici sunteți voi: țigla Florentina, Lider, Melano, profilul pe linie. Rolul meu e podul între producția voastră, dealer și șantier, plus sistemul de vânzări care, din câte am înțeles din discuție, încă lipsește. Vă spun cinstit din start trei lucruri care sigur vă preocupă: vin full-time și primele luni lucrez cu mâinile — la întâlniri, în negocieri, în filiale; produsul meu GO CRM nu vi-l vând — aduc experiența de a construi astfel de sisteme, iar ordinea o fac în ce aveți deja; iar afacerile mele sunt construite să nu mă ceară zilnic — exact de aceea pot fi complet al vostru. Mai jos sunt trei piloni și un plan pe primele 90 de zile.","points":["VÂNZĂRI DE MATERIALE DE CONSTRUCȚII — cunosc clientul și obiecția lui (Construct Resurs). Am vândut pardoseli și materiale de finisaj către dealeri, prorabi și magazine: consultanță, devize «la cheie», coordonare montaj. Nu echivalez asta cu ciclul vostru — țigla pe rulou, croirea, limitele de credit la dealeri și logistica grea funcționează altfel, iar în această specificitate trebuie să intru rapid. Dar tipul de client, logica lui de achiziție și limbajul marjei și al termenelor (nu al catalogului) le cunosc din interior. Mecanism concret pe care îl aduc pentru debitoare — durerea voastră nr. 1: limită de credit pe dealer, scoring și stop-livrare automat la depășire, nu discuții post-factum.","AM FOST DE CEALALTĂ PARTE A TEJGHELEI — am cumpărat acoperiș ca beneficiar (Flormincom / A-casa). Am coordonat proiecte și am vândut proiecte de design cu execuție «la cheie», am parcurs obiectul de la fundație la finisaj. Nu mă dau drept montator de acoperișuri și nu vă voi înșira branduri de pe propriul vostru site drept «experiență». Mai puternic e altceva: am fost chiar acel dezvoltator care alege furnizorul de acoperiș pentru un proiect — știu cum compară, unde se tocmește, de ce pleacă la concurent pe preț. Asta îmi permite să intru la o firmă de construcții ca «de-al lor» pe logica obiectului, nu ca vânzător «pe preț» — și să prind repede partea tehnică acolo unde lipsește.","SISTEME DE VÂNZĂRI ȘI MANAGEMENT DE OAMENI (Megaparc, Ghiletchi Consulting). Afacerile mele le-am construit pe automatizare: CRM, boți, delegare. Sensul nu e că «merg fără mine» — ci că rezultatul nu atârnă de un singur om. Azi am în conturul automatizat zeci de clienți și un flux de cereri pe care nu îl duc eu, ci procesul și o echipă mică delegată. E exact sarcina voastră pe ~10 filiale: pâlnie pe filiale, plan/realizat pe manager, debitoare vizibilă pentru proprietar. KPI nu îl introduc prin penalizare, ci prin transparență mai întâi — măsurăm, arătăm, apoi motivăm; așa managerii vechi nu sabotează, ci se prind în joc. Sistemul îl construiesc în ce aveți deja (1C / Bitrix / ce folosiți) — rămâne al vostru și pe oamenii voștri.","PRIMELE 90 DE ZILE — concret. Săptămânile 1–2: ascult managerii și proprietarul, fac audit al lanțului vânzări→depozit→achiziții→logistică→expediții→debitoare pe 2–3 filiale și strâng lista dealerilor «plecați» cu motivul plecării. Luna 1: cu mâinile în vânzări active + revenirea primilor 2–3 clienți vechi ca dovadă a procesului, nu a eroismului. Lunile 2–3: pâlnie și plan/realizat pe manageri, ritm săptămânal de raportare pentru proprietar, KPI-pilot pe o filială înainte de roll-out. Format cinstit: full-time, accept perioadă de probă, fix + bonus pe rezultat, încep cu mâinile pe vânzări. La finalul probei decidem împreună — pe cifre."]}}},{"id":"plan","label":"Plan 30 / 60 / 90 zile","final":{"ru":{"heading":"План 30 / 60 / 90 дней","intro":"Честно: оборотов, маржи и ваших текущих KPI я ещё не видел, поэтому конкретные цели зафиксирую с вами после первых 2-3 недель в полях. Логика простая — сначала выйти к дилерам и стройкам и продать самому, попутно увидев, где теряются заказы и деньги; затем на пилоте выстроить систему; и только потом тиражировать на филиалы, два юрлица и собственные бренды. Цифры ниже — это порядок величин для разговора, а не обещания: калибруем по вашим данным.","points":["Дни 1-30 — продаю и диагностирую одновременно (не аудит ради аудита). С первой недели — в поля: личные встречи и реальные сделки с ключевыми дилерами и стройкомпаниями. Я двадцать лет говорю на одном языке и с прорабом, и со снабженцем, и со стройкой — поэтому диагностирую, продавая, а не только наблюдая. Глубоко погружаюсь в 2-3 опорных филиала (Кишинёв как флагман + один проблемный региональный), остальные смотрю обзорно по отчётности. Не обещаю перевернуть ~10 филиалов и 2000+ позиций за месяц — это было бы несерьёзно. Быстрые победы, измеримые уже в первый месяц: лично реактивировать 5-10 крупных спящих дилеров с реальным заказом и подсветить одну явную утечку маржи (неконтролируемые скидки). CRM в этот месяц я НЕ ломаю — я его понимаю: смотрю, как реально работают менеджеры и где теряются заказы между отделами.","Дебиторка и денежный цикл — отдельная тема, а не строка в списке. Для дистрибьютора стройматериалов замороженные у дилеров деньги — боль №1, и она завязана на сезон. В первые недели разбираю структуру просрочки, в дни 31-60 ввожу лимиты кредита на дилера, сроки и стоп-лист, а бонус менеджера привязываю к ПОСТУПЛЕНИЮ денег, а не только к отгрузке — чтобы рост продаж не превращался в зависшие на стройках деньги. Ориентир для обсуждения: заметную часть просроченной дебиторки взять под контроль за 90 дней.","Производство ↔ продажи ↔ склад ↔ сезон — там, где я как раз и незаменим. Вы ПРОИЗВОДИТЕЛЬ, а не только дистрибьютор, а кровля — жёстко сезонный бизнес (пик весна-лето). Синхронизирую прогноз спроса по группам с планом производства собственной черепицы и профнастила и со стоком стали ArcelorMittal: чтобы в пик не терять продажи из-за отсутствия товара и не замораживать капитал в межсезонье. По собственным брендам (Florentina, Lider, Melano) не утверждаю вслепую, что они маржинальнее импорта — это гипотеза: сверю реальную маржу по вашим данным и, ЕСЛИ она выше, выстрою осознанный сдвиг микса в их сторону.","Дни 31-60 — система на пилоте, а не реформа сверху на 250 человек. Работаю С действующими менеджерами, а не НАД ними: вовлекаю их в новые правила, чтобы они были их, а не моими — и сразу вижу, кто тянет, а кто саботирует. На опорных филиалах перестраиваю воронку, статусы сделок и прозрачные KPI, регламент коммерческого отдела и план продаж с мотивацией фикс + бонус за результат. Собственный опыт автоматизации (GO CRM, Megaparc) переношу на ваши процессы инструментами, которые уже построил (KPI, боты отчётности) — не покупая внешнее внедрение и не навязывая новую систему через ночь. Сделки продолжаю вести лично, чтобы регламент строился на реальной практике, а не на теории.","Дни 61-90 — тиражирование того, что доказало себя на пилоте. Раскатываю рабочую модель на остальные филиалы и оба юрлица. Левый берег (Бендеры/Тирасполь через Eurodesign) веду как ОТДЕЛЬНЫЙ кейс со своими рисками — другая юрисдикция, таможенный/налоговый режим и риск возврата денег — а не как copy-paste модели. Запускаю осознанный push собственных брендов (если маржа подтвердилась) и готовлю типовой регламент запуска нового филиала как готовый продукт — с расчётом точки безубыточности и моей ролью на старте. К этому моменту план продаж на следующие 60-90 дней — уже в цифрах на накопленных данных CRM, и я готов привязать собственный бонус к согласованным с вами KPI (оборот, реактивация дилеров, контроль дебиторки, маржа собственных брендов)."]},"ro":{"heading":"Plan 30 / 60 / 90 zile","intro":"Sincer: cifrele de afaceri, marja și KPI-urile voastre actuale nu le-am văzut încă, așa că obiectivele concrete le fixez cu voi după primele 2-3 săptămâni pe teren. Logica e simplă — întâi ies la dealeri și pe șantiere și vând eu însumi, văzând pe parcurs unde se pierd comenzile și banii; apoi, pe un pilot, construiesc sistemul; și abia după aceea replic pe filiale, cele două firme și brandurile proprii. Cifrele de mai jos sunt ordine de mărime pentru discuție, nu promisiuni: le calibrăm pe datele voastre.","points":["Zilele 1-30 — vând și diagnostichez în același timp (nu audit de dragul auditului). Din prima săptămână, pe teren: întâlniri și tranzacții reale cu dealeri și companii de construcții cheie. Vorbesc de douăzeci de ani aceeași limbă și cu prorabul, și cu snabjentul, și cu producția — așa că diagnostichez vânzând, nu doar privind. Mă cufund în profunzime în 2-3 filiale-reper (Chișinău ca flagman + una problematică din regiune), restul le văd doar de ansamblu prin raportare. Nu promit să răstorn ~10 filiale și 2000+ poziții într-o lună — ar fi neserios. Victorii rapide, măsurabile chiar în prima lună: reactivez personal 5-10 dealeri mari adormiți cu o comandă reală și identific o scurgere clară de marjă (discounturi necontrolate). CRM-ul în această lună NU îl rup — îl înțeleg: observ cum lucrează de fapt managerii și unde se pierd comenzile între departamente.","Debitoarea și ciclul de cash — temă proprie, nu un rând într-o listă. Pentru un distribuitor de materiale, banii blocați la dealeri sunt durerea nr. 1 și sunt legați de sezon. În primele săptămâni descompun structura restanțelor, în zilele 31-60 introduc limite de credit pe dealer, scadențe și stop-listă, iar bonusul managerului îl leg de ÎNCASARE, nu doar de livrare — ca creșterea vânzărilor să nu se transforme în bani blocați pe șantiere. Ordin de mărime pentru discuție: o parte semnificativă din debitoarea restantă adusă sub control în 90 de zile.","Producție ↔ vânzări ↔ stoc ↔ sezon — exact acolo unde sunt de neînlocuit. Sunteți PRODUCĂTOR, nu doar distribuitor, iar acoperișul e un business brutal sezonier (vârf primăvară-vară). Sincronizez prognoza cererii pe grupe cu planul de producție al țiglei și profnastilului proprii și cu stocul de tablă ArcelorMittal: ca în vârf să nu pierdem vânzări din lipsă de marfă și să nu blocăm capital în extrasezon. Despre brandurile proprii (Florentina, Lider, Melano) nu afirm orbește că sunt mai marginale decât importul — e o ipoteză: verific marja reală pe datele voastre și, DACĂ e mai mare, construiesc un shift conștient de mix spre ele.","Zilele 31-60 — sistem pe pilot, nu reformă de sus peste 250 de oameni. Lucrez CU managerii existenți, nu PESTE ei: îi implic în noile reguli ca să fie ale lor, nu ale mele — și văd imediat cine trage și cine frânează. Pe filialele-reper reconstruiesc pâlnia, statusurile tranzacțiilor și KPI transparenți, regulamentul departamentului comercial și planul de vânzări cu motivare fix + bonus pe rezultat. Experiența mea de automatizare (GO CRM, Megaparc) o transfer pe procesele voastre cu instrumentele pe care le-am construit deja (KPI, boți de raportare) — fără să cumpăr o implementare externă și fără să impun un sistem nou peste noapte. Continui să port tranzacții personal, ca regulamentul să se construiască pe practică reală, nu pe teorie.","Zilele 61-90 — replicarea a ceea ce s-a dovedit pe pilot. Extind modelul funcțional pe restul filialelor și ambele firme. Malul stâng (Bender/Tiraspol prin Eurodesign) îl tratez ca un DOSAR separat, cu riscuri proprii — altă jurisdicție, alt regim vamal/fiscal și risc de încasare — nu ca un copy-paste al modelului. Lansez un push conștient al brandurilor proprii (dacă marja s-a confirmat) și pregătesc un regulament-tip de lansare a unei filiale noi ca produs gata făcut — cu calculul pragului de rentabilitate și rolul meu la start. La acest moment, planul de vânzări pentru următoarele 60-90 zile e deja în cifre, pe datele acumulate în CRM, și sunt gata să-mi leg propriul bonus de KPI-urile agreate cu voi (cifră de afaceri, reactivare dealeri, control al debitoarei, marja brandurilor proprii)."]}}},{"id":"raspunsuri","label":"Răspunsuri la întrebările cheie","final":{"ru":{"heading":"Ответы на ключевые вопросы","intro":"Александр, чтобы на встрече сразу зайти в главное, коротко отвечу на ключевые вопросы — роль, занятость, деньги, KPI и проверка — и покажу, как вижу первые 90 дней. Точные цифры и границы сверим лично, по вашим задачам.","points":["Роль. Мне интересна коммерческая функция холдинга «Lider»: система B2B-продаж по двум фирмам (Esplan-Lux и Eurodesign), дисциплина в воронке, дилерах и дебиторке, с прицелом на развитие ассортимента и сети. Финальный титул и границы давайте определим на встрече — по тому, где вам реально больно. Вы за 20 лет построили производство, 10 филиалов и два бренда; я прихожу не ломать, а достроить систему продаж и контроля поверх того, что уже работает.","Мой козырь — связка, которой редко обладает наёмный коммерсант. Я сам был прорабом, прошёл объект от фундамента до кровли, и продавал отделку застройщику. Я говорю на одном языке и с вашим клиентом-застройщиком, и со стройкой, и с производством — понимаю, почему сделка срывается на смете и монтаже, а не только на цене. На старте готов работать руками: выезжать в поля с менеджерами 2-3 филиалов, чтобы заработать доверие результатом, а не сидеть над командой с проверкой.","Что я вижу в кровельном B2B (как возможности, не как критику). Сезонность: пик весна-осень, провал зимой — зиму нужно загружать фасадом, заборами, водостоками и накоплением заявок к сезону. Маржа: разница стратегии между своими брендами (Florentina/Lider/Melano — объём и дилеры) и официальным импортом (ArcelorMittal/Fakro/Rockwool). Дебиторка у застройщиков, которые платят по сдаче объекта. Спящие клиенты: сначала разбор в CRM, почему ушли — цена, срок, долг, конкурент, — реактивируем только там, где есть реальный повод вернуться. Левый берег через Eurodesign — отдельный канал.","Занятость. Холдинг для меня — основной фокус, full-time, пн-пт, наравне с любым штатным сотрудником. Megaparc и Ghiletchi Consulting работают на автоматизации и операционных командах — это не план «Б», а доказательство, что я умею строить системы продаж, которые идут без меня. Именно это я хочу построить для «Lider» и готов зафиксировать как обязательство.","CRM и конфликт интересов — закрываю сразу. Свою CRM я вам не продаю и не навязываю. Работаю в ВАШЕЙ учётной системе и настраиваю отчётность, KPI и контроль на том, что у вас уже есть — без месяцев стройки и новых ИТ-затрат. Экспертизу приношу, абонемент на свой софт — нет.","Деньги. Готов на фикс в рынке для управленческой роли + бонус, где бОльшая часть моего дохода привязана к результату, который вы увидите: рост маржи на дилерском канале, новые B2B-продажи, снижение просроченной дебиторки — то, на что я реально влияю, а не общая цифра, которую тянут и другие отделы. Стартовую вилку и цели сверим на встрече.","Проверка и первые 90 дней. Предлагаю испытательный срок 2-3 месяца с целями, согласованными вместе. 30 дней — в поля, разбор воронки, дилеров и спящих клиентов. 60 — KPI, план-факт и реактивация. 90 — первые измеримые цифры по возврату клиентов и дебиторке. Не увидите конкретного результата — ваше право не продолжать. Тест предлагаю сам."]},"ro":{"heading":"Răspunsuri la întrebările cheie","intro":"Alexandr, ca să intrăm direct în subiectul important la întâlnire, răspund scurt la întrebările-cheie — rolul, disponibilitatea, banii, KPI și proba — și arăt cum văd primele 90 de zile. Cifrele exacte și limitele le sincronizăm personal, pe nevoile dvs.","points":["Rolul. Mă interesează funcția comercială a holdingului „Lider”: sistemul de vânzări B2B pe cele două firme (Esplan-Lux și Eurodesign), disciplina în pâlnie, dealeri și debitoare, cu prevedere spre dezvoltarea asortimentului și a rețelei. Titlul final și limitele să le stabilim la întâlnire — după unde vă doare cu adevărat. Ați construit în 20 de ani producția, 10 filiale și două branduri; nu vin să stric, ci să termin de construit sistemul de vânzări și control peste ce funcționează deja.","Atuul meu e o combinație rară la un comercial angajat. Am fost eu însumi prorab, am parcurs obiectul de la fundație la acoperiș și am vândut finisaje către constructor. Vorbesc aceeași limbă cu clientul-constructor, cu șantierul și cu producția — înțeleg de ce pică o vânzare la nivel de deviz și montaj, nu doar la preț. La start sunt dispus să lucrez cu mâinile: ieșiri pe teren cu managerii de la 2-3 filiale, ca să câștig credibilitate prin rezultat, nu să stau peste echipă cu inspecția.","Ce văd în B2B-ul de acoperișuri (ca oportunități, nu ca reproș). Sezonalitatea: vârf primăvară-toamnă, vale iarna — iarna o încărcăm cu fațade, garduri, sisteme pluviale și acumulare de cereri pentru sezon. Marja: diferența de strategie între brandurile proprii (Florentina/Lider/Melano — volum și dealeri) și importul oficial (ArcelorMittal/Fakro/Rockwool). Debitoarea la constructorii care plătesc la predarea obiectului. Clienții adormiți: întâi o analiză în CRM de ce au plecat — preț, termen, datorie, concurent — reactivăm doar unde există un motiv real să revină. Malul stâng prin Eurodesign — canal separat.","Disponibilitate. Holdingul e focusul meu principal, full-time, luni-vineri, la fel ca orice angajat. Megaparc și Ghiletchi Consulting merg pe automatizare și echipe operaționale — nu sunt un plan „B”, ci dovada că știu să construiesc sisteme de vânzări care funcționează fără mine. Exact asta vreau să construiesc pentru „Lider” și sunt gata să o fixez ca angajament.","CRM-ul și conflictul de interese — îl închid din start. Nu vă vând și nu vă impun CRM-ul meu. Lucrez în sistemul DVS. de evidență și configurez raportarea, KPI și controlul pe ce aveți deja — fără luni de construcție și fără costuri IT noi. Aduc expertiza, nu un abonament la software-ul meu.","Banii. Sunt gata pe un fix în linie cu piața pentru o funcție de conducere + bonus, unde cea mai mare parte a venitului meu e legată de rezultatul pe care îl veți vedea: creșterea marjei pe canalul dealeri, vânzări B2B noi, reducerea debitoarei restante — ce pot influența real, nu cifra totală pe care o trag și alte departamente. Intervalul de start și obiectivele le sincronizăm la întâlnire.","Proba și primele 90 de zile. Propun o perioadă de probă de 2-3 luni cu obiective convenite împreună. 30 de zile — pe teren, analiza pâlniei, a dealerilor și a clienților adormiți. 60 — KPI, plan-realizat și reactivare. 90 — primele cifre măsurabile la revenirea clienților și debitoare. Dacă nu vedeți rezultat concret, e dreptul dvs. să nu continuați. Testul îl propun eu."]}}},{"id":"victorii","label":"Primele victorii rapide propuse","final":{"ru":{"heading":"Первые быстрые победы (первые 90 дней)","intro":"Я прихожу не \"осваиваться\", а быстро приносить пользу — но сначала на ваших данных, потом с цифрами. Если я правильно читаю отчётность: вы растёте (435,4 млн MDL в 2024, +8,59%, чистая прибыль ×3,8 за два года — это сильно), но доля рынка сдвинулась с 31,12% до 29,84%, то есть рынок рос быстрее вас. Если так — задача №1 на год понятна: расти выше рынка и вернуть относительную долю. Ниже — шаги без капзатрат, на уже существующей сети и ассортименте. Все конкретные цели я ставлю не вслепую: первые 2-3 недели — диагностика на ваших данных, дальше публично беру измеримые KPI.","points":["Сначала диагностика, потом обещания. За первые 2-3 недели снимаю базовую картину на ваших данных: текущая воронка и каналы, маржинальность по группам, состояние клиентской базы (активные/спящие дилеры), реальный attach-rate. Я уважаю 25 лет и прибыльность компании — не прихожу \"наводить порядок\", прихожу понять, что уже работает, и усилить точки роста. После ревизии беру конкретные KPI в формате fix+бонус.","Реактивация \"спящих\" дилеров — но честно про данные. Поднимаем дилеров, которые покупали год назад и замолчали, ранжируем по бывшему обороту и системно прорабатываем с персональным предложением. Важная оговорка: если история живёт в полноценной CRM — реактивируем оттуда; если она в 1С/учёте — первый шаг консолидировать её в единый вид. Ориентир (уточню после ревизии базы) — вернуть заметную часть спящей базы в активные закупки. Это прямой вклад в возврат относительной доли у быстрее растущих конкурентов.","Допродажа сопутствующих SKU — как гипотеза, которую проверим. По данным БНС ваш профиль — \"fabricarea altor articole din metal\", где вы #1. Если ключевая группа — кровельные/фасадные системы, я бы внедрил правило комплектности заказа: к листу/металлочерепице — доборные планки (конёк, ендова, торцевые, карнизные), кровельные саморезы с EPDM-шайбой, водосток, снегозадержатели, уплотнители, гидро-/пароизоляция. Если основной продукт другой (заборы, профнастил, иные металлоизделия) — логика та же: допродажа сопутствующих позиций к каждому заказу. Хочу уточнить продуктовый микс на встрече, чтобы настроить это точно. Эффект — рост среднего чека и валовой маржи на заказ без привлечения новых клиентов.","Разделяю два рычага: завод и торговля. ESPLAN-LUX как производитель (#1, доля против конкурентов) — это объёмы, загрузка производства, премиальные профили, проектные/B2B-контракты, экспорт. Торговая часть группы (более широкий ассортимент, дистрибуция) — это реактивация, attach-rate, микс. Группа \"Lider\", насколько вижу, — альянс брендов с разной структурой собственности, поэтому единые KPI \"по всей сети\" наивно навязывать — хочу разобраться в структуре на встрече и применять инструменты адресно.","Мой реальный козырь — контракторский канал и \"оболочка здания\". Я сам производитель отделочных материалов (Construct Resurs) и строитель (A-casa, Flormincom). Это канал спроса, которого нет у обычного кандидата: продажи строительным фирмам и кровельным бригадам, связка кровля + фасад + отделка по всей оболочке здания. Это работает прямо на возврат доли — через объёмы и проектные контракты, а не только через розницу.","Систематизация как компетенция, а не как продукт. Методологию CRM/воронок/дашбордов ставлю на вашей текущей системе — без навязывания инструментов, без конфликта интересов. Результат: руководство видит сеть в цифрах в реальном времени (конверсия, средний чек, attach-rate, реактивация), а не из отчётов постфактум. По марже: за 90 дней реалистично двигать валовую маржу на заказ за счёт сдвига микса в свою продукцию против перепродажи; ROS — это направление на 12 месяцев, а не победа за квартал."]},"ro":{"heading":"Primele victorii rapide (primele 90 de zile)","intro":"Nu vin sa \"ma acomodez\", ci sa aduc valoare rapid — dar intai pe datele voastre, apoi cu cifre. Daca citesc corect raportarea: cresteti (435,4 mil MDL in 2024, +8,59%, profit net ×3,8 in doi ani — e puternic), dar cota de piata s-a deplasat de la 31,12% la 29,84%, adica piata a crescut mai repede decat voi. Daca e asa — obiectivul #1 pe an e clar: sa cresteti peste piata si sa recuperati cota relativa. Mai jos — pasi fara investitii de capital, pe reteaua si sortimentul deja existente. Tintele concrete nu le stabilesc orbeste: primele 2-3 saptamani — diagnostic pe datele voastre, apoi imi asum public KPI masurabili.","points":["Intai diagnostic, apoi promisiuni. In primele 2-3 saptamani fac o radiografie pe datele voastre: palnia si canalele actuale, marjinalitatea pe grupe, starea bazei de clienti (dealeri activi/adormiti), attach-rate-ul real. Respect cei 25 de ani si profitabilitatea companiei — nu vin sa \"fac ordine\", vin sa inteleg ce functioneaza deja si sa intaresc punctele de crestere. Dupa revizie imi asum KPI concreti, in format fix+bonus.","Reactivarea dealerilor \"adormiti\" — dar onest despre date. Scoatem dealerii care cumparau acum un an si au tacut, ii ierarhizam dupa rulajul anterior si ii lucram sistematic, cu oferta personalizata. O precizare importanta: daca istoricul e intr-un CRM real — reactivam de acolo; daca e in 1C/contabilitate, primul pas e consolidarea lui intr-o vedere unica. Reper (il precizez dupa revizia bazei) — readucerea unei parti notabile din baza adormita la achizitii active. E contributie directa la recuperarea cotei relative de la concurentii care cresc mai repede.","Vanzarea de SKU-uri asociate — ca ipoteza, pe care o verificam. Conform BNS, profilul vostru e \"fabricarea altor articole din metal\", unde sunteti #1. Daca grupa-cheie sunt sistemele de acoperis/fatada, as introduce regula de completitudine a comenzii: la tabla/tigla metalica — planki de completare (coama, dolie, frontale, streasina), suruburi de acoperis cu saiba EPDM, jgheaburi, parazapezi, garnituri, hidro-/bariera de vapori. Daca produsul principal e altul (garduri, tabla cutata, alte articole din metal) — logica e aceeasi: vanzarea pozitiilor asociate la fiecare comanda. Vreau sa clarific mixul de produse la intalnire, ca sa il calibrez exact. Efectul — creste cosul mediu si marja bruta pe comanda fara clienti noi.","Separ doua parghii: fabrica si comertul. ESPLAN-LUX ca producator (#1, cota fata de concurenti) — inseamna volume, incarcarea productiei, profile premium, contracte de proiect/B2B, export. Partea comerciala a grupului (sortiment mai larg, distributie) — inseamna reactivare, attach-rate, mix. Grupul \"Lider\", din cate vad, e o alianta de branduri cu structuri de proprietate diferite, deci a impune KPI unici \"pe toata reteaua\" ar fi naiv — vreau sa inteleg structura la intalnire si sa aplic instrumentele tintit.","Atuul meu real — canalul de constructori si \"anvelopa cladirii\". Sunt eu insumi producator de materiale de finisaj (Construct Resurs) si constructor (A-casa, Flormincom). E un canal de cerere pe care un candidat obisnuit nu il are: vanzari catre firme de constructii si echipe de acoperis, pachet acoperis + fatada + finisaj pe toata anvelopa cladirii. Lucreaza direct la recuperarea cotei — prin volume si contracte de proiect, nu doar prin retail.","Sistematizarea ca si competenta, nu ca produs. Metodologia de CRM/palnii/dashboard-uri o instalez pe sistemul vostru actual — fara a impune instrumente, fara conflict de interese. Rezultat: conducerea vede reteaua in cifre in timp real (conversie, cos mediu, attach-rate, reactivare), nu din rapoarte post-factum. La marja: in 90 de zile e realist sa miscam marja bruta pe comanda prin mutarea mixului spre productia proprie fata de revanzare; ROS este o directie pe 12 luni, nu o victorie pe trimestru."]}}},{"id":"cta","label":"Închidere / pas următor","final":{"ru":{"heading":"К нашей встрече: как я вижу первые шаги","intro":"К нашей встрече я подготовился предметно — не как кандидат, который ищет место, а как человек, который уже изучил «Лидер»: два юрлица (Esplan-Lux и Eurodesign с выходом на левый берег), собственные марки черепицы Florentina, Lider, Melano с лучшей маржой, портфель ArcelorMittal/Fakro/Rockwool и сеть из ~10 филиалов. Это и есть та сцена, на которой я хочу работать. Ниже — мой угол атаки, чтобы на встрече мы сверяли конкретику, а не знакомились заново.","points":["Мой угол, которого нет у обычного коммерческого кандидата: я говорю на одном языке с клиентом, с прорабом на объекте и с производством — прошёл путь и как продавец стройматериалов, и как строитель «под ключ», и как предприниматель, выстроивший бизнес на CRM и автоматизации. То есть приношу ровно ту систему контроля воронки и KPI, которой вам не хватает, и при этом понимаю стройку и сезонность кровли изнутри.","Зона, за которую я реально отвечаю как директор по развитию/коммерции: B2B-направление (дилеры и стройка), возврат «спящих» клиентов и дисциплина продаж в CRM. Закупки, логистику и дебиторку не «забираю под контроль» с первого дня — это смежные зоны, где я выстраиваю взаимодействие, а не ломаю то, что уже работает.","Сначала слушаю, потом меняю: первые 2–3 недели — это филиалы, РОПы, реальные потоки и аудит воронки и базы неактивных клиентов за последние 12–18 месяцев. Моя задача — усилить ваших руководителей филиалов и РОПов, а не напугать их «реформами».","Гипотезы KPI на 90 дней — как пример того, КАК я мыслю в цифрах (точные значения уточним под ваши реалии): реактивация N «спящих» B2B-дилеров за квартал; единая воронка в CRM по всем филиалам с дисциплиной заполнения и видимым дашбордом для руководства; сокращение просроченной дебиторки по дилерам и скорость «запрос → коммерческое предложение». Отдельный фокус — рост доли собственных марок (Florentina/Lider/Melano) в продажах.","Предлагаю агенду встречи в 4 блока: (1) точная зона ответственности и роль; (2) KPI на 90 дней; (3) формат и условия — full-time, испытательный период, фикс + бонус за результат; (4) первые шаги и пробные 30–60–90 дней, чтобы вы могли безопасно проверить меня результатом в полях. Горизонт 12 месяцев я тоже держу в голове: системная B2B-машина по филиалам, возвращённые дилеры и управляемая дебиторка.","По срокам конкретно: готов выйти в течение 2 недель после договорённости и в первый же месяц показать результат в полях. — Олег Гилецки. Скажите, какой день вам удобен, — подстроюсь."]},"ro":{"heading":"Pentru întâlnirea noastră: cum văd primii pași","intro":"Pentru întâlnirea noastră m-am pregătit la concret — nu ca un candidat care caută un loc, ci ca un om care a studiat deja «Lider»: două entități juridice (Esplan-Lux și Eurodesign, cu acoperire pe malul stâng), mărcile proprii de țiglă Florentina, Lider, Melano cu marja cea mai bună, portofoliul ArcelorMittal/Fakro/Rockwool și rețeaua de ~10 filiale. Aceasta este scena pe care vreau să lucrez. Mai jos e ordinea mea de atac, ca la întâlnire să sincronizăm concretul, nu să ne cunoaștem din nou.","points":["Unghiul meu, pe care un candidat comercial obișnuit nu îl are: vorbesc aceeași limbă cu clientul, cu prorabul de pe șantier și cu producția — am parcurs drumul și ca vânzător de materiale de construcții, și ca constructor «la cheie», și ca antreprenor care și-a clădit afacerea pe CRM și automatizare. Adică aduc exact sistemul de control al pâlniei și de KPI care vă lipsește, înțelegând în același timp șantierul și sezonalitatea acoperișurilor din interior.","Zona de care răspund realist ca director de dezvoltare/comercial: direcția B2B (dealeri și șantiere), revenirea clienților «adormiți» și disciplina vânzărilor în CRM. Achizițiile, logistica și debitoarea nu le «preiau sub control» din prima zi — sunt zone conexe, unde construiesc interfața și colaborarea, nu sparg ce funcționează deja.","Întâi ascult, apoi schimb: primele 2–3 săptămâni înseamnă filialele, ROP-ii, fluxurile reale și un audit al pâlniei și al bazei de clienți inactivi din ultimele 12–18 luni. Scopul meu e să vă întăresc directorii de filiale și ROP-ii, nu să-i sperii cu «reforme».","Ipoteze de KPI pentru 90 de zile — ca exemplu al modului în care gândesc în cifre (valorile exacte le calibrăm pe realitățile dumneavoastră): reactivarea a N dealeri B2B «adormiți» pe trimestru; o pâlnie unică în CRM pe toate filialele, cu disciplină de completare și un dashboard vizibil pentru management; reducerea debitoarei restante pe dealeri și viteza «cerere → ofertă». Un focus separat — creșterea ponderii mărcilor proprii (Florentina/Lider/Melano) în vânzări.","Vă propun o agendă a întâlnirii în 4 blocuri: (1) zona exactă de responsabilitate și rolul; (2) KPI pe 90 de zile; (3) formatul și condițiile — full-time, perioadă de probă, fix + bonus pe rezultat; (4) primii pași și o probă de 30–60–90 de zile, ca să mă puteți verifica în siguranță prin rezultat în teren. Țin în minte și orizontul de 12 luni: o mașină B2B sistematizată pe filiale, dealeri readuși și o debitoare ținută sub control.","La termene, concret: pot începe în maximum 2 săptămâni de la acord și pot arăta rezultat în teren chiar din prima lună. — Oleg Ghiletchi. Spuneți-mi ce zi vă convine și mă aliniez."]}}},{"id":"cifre","label":"Cifrele care contează","final":{"ru":{"heading":"Цифры, которые имеют значение","intro":"Я внимательно изучил публичные показатели ESPLAN-LUX (НБС, через data2b.md) — не чтобы пересказать вам ваши же цифры, которые вы знаете лучше меня, а чтобы прийти на встречу с гипотезами, а не с пустыми руками.","points":["Картина сильная и редкая: вы — №1 в категории НБС «производство прочих металлоизделий» с долей 29,84% — почти вдвое больше доли ближайшего конкурента (ROOFART ~16,6%), а чистая прибыль выросла в 3,8 раза за два года. Отдельно отмечу то, что обычно проходит мимо: ROE почти 25% при долговой нагрузке всего 0,06 — это редкое сочетание. Высокий ROE обычно подпирается заёмным плечом; у вас он держится на собственной рентабельности. Значит, есть и запас прочности, и неиспользованная ёмкость для инвестиций в рост.","Один сигнал я бы вынес на встречу как первый вопрос, а не как диагноз: за год доля по НБС сместилась с 31,12% до 29,84% при росте выручки +8,59%. Сразу оговорюсь — это статистическая категория НБС, а не ваш операционный рынок (кровля, фасады, водостоки), и одна дельта за один год — это не тренд. Поэтому для меня вопрос звучит так: это сознательный выбор в пользу маржи (и тогда ROS 12% его подтверждает), приход нового игрока, ценовая инфляция на металл — или мы где-то недоработали по сегменту/региону? Ответ определяет, защищаем мы долю или продолжаем оптимизировать прибыль. Я хочу услышать вашу версию, прежде чем строить план.","Финансовая прочность даёт вам редкую роскошь выбора: долг 0,06, сбор дебиторки за 8 дней (это, наоборот, нужно беречь), реинвестируемая прибыль. Компания может вложиться в коммерческую систему сейчас — не за счёт заёмных денег и не в ущерб устойчивости. И здесь моя роль производителя становится практичной: импорт сырья и комплектующих из шести стран (Германия, Польша, Чехия, Корея, Франция, Румыния) — это и рычаг маржи, и зона риска по срокам. Как производитель отделочных материалов я знаю обе стороны прилавка: где дистрибьютор тормозит и где теряется наценка. Рост доли упирается не только в продажи, но и в предсказуемость поставок.","Если бы я отвечал за коммерческий блок, приоритеты расставил бы так: не «разворачивать» то, что и без меня даёт ×3,8 прибыли, а добавить системную коммерческую машину поверх сильного фундамента. Конкретные рычаги, которые я вижу для производителя металлоизделий: (1) attach-rate аксессуаров и комплектующих к основному профилю — самая высокомаржинальная допвыручка; (2) управляемая дилерская и региональная сеть; (3) экспорт — раз логистика на шесть стран уже выстроена на входе, её можно использовать и на выходе; (4) синергия с торговым направлением группы (EURODESIGN) через кросс-продажи — рост за счёт глубины корзины, а не отъёма доли у конкурентов. Сначала остановить возможную эрозию, а на этом фундаменте — управляемый рост быстрее категории."]},"ro":{"heading":"Cifrele care contează","intro":"Am studiat atent indicatorii publici ai ESPLAN-LUX (BNS, prin data2b.md) — nu ca să vă repet cifrele pe care le cunoașteți mai bine decât mine, ci ca să vin la întâlnire cu ipoteze, nu cu mâinile goale.","points":["Tabloul e puternic și rar: sunteți #1 în categoria BNS „fabricarea altor articole din metal”, cu o cotă de 29,84% — aproape dublă față de cota următorului competitor (ROOFART ~16,6%) — iar profitul net a crescut de 3,8 ori în doi ani. Remarc separat ceea ce de obicei trece neobservat: ROE de aproape 25% la o datorie de doar 0,06 e o combinație rară. Un ROE ridicat se sprijină de regulă pe levier financiar; la voi se ține pe rentabilitatea proprie. Asta înseamnă și rezervă de stabilitate, și capacitate neutilizată pentru investiții în creștere.","Un singur semnal l-aș aduce la întâlnire ca prima întrebare, nu ca diagnostic: într-un an, cota BNS s-a deplasat de la 31,12% la 29,84% în condițiile unei creșteri a veniturilor de +8,59%. Țin să precizez — e o categorie statistică BNS, nu piața voastră operațională (acoperișuri, fațade, jgheaburi), iar o singură variație pe un singur an nu e un trend. De aceea întrebarea, pentru mine, sună așa: e o alegere conștientă în favoarea marjei (și atunci ROS de 12% o confirmă), intrarea unui jucător nou, inflația prețului la metal — sau am scăpat ceva pe un segment/o regiune? Răspunsul decide dacă apărăm cota sau continuăm să optimizăm profitul. Vreau să aud versiunea voastră înainte de a construi un plan.","Soliditatea financiară vă oferă luxul rar de a alege: datorii de 0,06, colectarea debitoarei în 8 zile (asta, dimpotrivă, trebuie păstrată), profit reinvestibil. Compania poate investi în sistemul comercial acum — fără bani împrumutați și fără a sacrifica stabilitatea. Și aici rolul meu de producător devine practic: importul de materie primă și componente din șase țări (Germania, Polonia, Cehia, Coreea, Franța, România) e și pârghie de marjă, și zonă de risc pe termene. Ca producător de materiale de finisaj cunosc ambele părți ale tejghelei: unde frânează distribuitorul și unde se pierde adaosul. Creșterea cotei nu depinde doar de vânzări, ci și de predictibilitatea aprovizionării.","Dacă aș răspunde de blocul comercial, prioritățile le-aș așeza așa: nu „a întoarce” ceea ce și fără mine aduce un profit ×3,8, ci a adăuga o mașină comercială sistemică peste un fundament puternic. Pârghiile concrete pe care le văd pentru un producător de articole din metal: (1) attach-rate-ul accesoriilor și componentelor la profilul principal — cel mai marjos venit suplimentar; (2) o rețea de dealeri și o distribuție regională gestionată; (3) exportul — odată ce logistica pe șase țări e deja construită la intrare, poate fi folosită și la ieșire; (4) sinergia cu direcția de comerț a grupului (EURODESIGN) prin vânzări încrucișate — creștere prin adâncimea coșului, nu prin luarea cotei de la competitori. Mai întâi oprim o eventuală eroziune, iar pe acest fundament — o creștere controlată, mai rapidă decât categoria."]}}}]</script>

13+ ani. Chișinău, Bălți, Cahul."],["Brand „LIDER”","Brand-umbrelă / alianță pe ~10 filiale. La întâlnire merită clarificat perimetrul de responsabilitate."]]},"structNote":{"ru":"Группа закрывает всю цепочку: оборудование для стройки → материалы → кровля и фасад. Один и тот же B2B-клиент (застройщик, подрядчик, прораб) покупает всё это. Отсюда главный рычаг роста — кросс-продажи по единой базе, рост за счёт глубины корзины, а не отъёма доли у конкурентов.","ro":"Grupul acoperă tot lanțul: echipament pentru construcție → materiale → acoperiș și fațadă. Același client B2B (constructor, antreprenor, prorab) le cumpără pe toate. De aici pârghia principală de creștere — cross-sell pe o bază unică, creștere prin adâncimea coșului, nu prin luarea cotei de la concurenți."}}</script>
<script>
var SECTIONS=JSON.parse(document.getElementById('data').textContent);
var STATS=JSON.parse(document.getElementById('stats').textContent);
var EB={"hero":{"ru":"Кандидатура · конфиденциально","ro":"Candidatură · confidențial"},"holding":{"ru":"Я изучил холдинг","ro":"Am studiat holdingul"},"cifre":{"ru":"Цифры, которые я изучил","ro":"Cifrele pe care le-am studiat"},"diagnoza":{"ru":"Где я вижу рост","ro":"Unde văd creșterea"},"avantaj":{"ru":"Почему я","ro":"De ce eu"},"plan":{"ru":"План 30 / 60 / 90 дней","ro":"Plan 30 / 60 / 90 zile"},"raspunsuri":{"ru":"Ответы на ваши вопросы","ro":"Răspunsuri la întrebările voastre"},"victorii":{"ru":"Первые быстрые победы","ro":"Primele victorii rapide"},"cta":{"ru":"Следующий шаг","ro":"Pasul următor"}};
var FOOT={ru:'Конфиденциальный материал к личной встрече. Финансовые данные — Нацбюро статистики (data2b.md), прочее — открытые источники. © Oleg Ghiletchi.',ro:'Material confidențial pentru întâlnire. Datele financiare — Biroul Național de Statistică (data2b.md), restul — surse publice. © Oleg Ghiletchi.'};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function byId(id){return SECTIONS.find(function(s){return s.id===id;});}
function statsHtml(lang){
  var th=STATS.th[lang];
  var h='<div class="statgrid"><div><table class="fintable"><thead><tr><th>'+th.y+'</th><th>'+th.rev+'</th><th>'+th.pr+'</th><th>'+th.emp+'</th></tr></thead><tbody>';
  STATS.rows.forEach(function(r){h+='<tr><td>'+r.y+'</td><td>'+r.rev+'</td><td>'+r.pr+'</td><td>'+r.emp+'</td></tr>';});
  h+='</tbody></table><div class="srcline">'+esc(STATS.src[lang])+'</div></div>';
  h+='<div><div class="factbox">'+STATS.facts[lang].map(function(f){return '<div class="fact">'+esc(f)+'</div>';}).join('')+'</div>';
  var sh=lang==='ru'?('Доля рынка: <b>31,12% (2023) → 29,84% (2024)</b> — продажи растут, но медленнее рынка. Это и есть то, что я разворачиваю.'):('Cotă de piață: <b>31,12% (2023) → 29,84% (2024)</b> — vânzările cresc, dar sub piață. Exact ce inversez.');
  h+='<div class="share">'+sh+'</div></div></div>';
  // structure
  h+='<div class="struct"><h3>'+esc(STATS.structTitle[lang])+'</h3>';
  STATS.struct[lang].forEach(function(r){h+='<div class="row"><b>'+esc(r[0])+'</b><span>'+esc(r[1])+'</span></div>';});
  h+='<div class="share" style="border-color:rgba(216,182,74,.45);color:#ece3cf;margin-top:16px">'+esc(STATS.structNote[lang])+'</div>';
  h+='</div>';
  return h;
}
function render(lang){
  document.documentElement.lang=lang;
  var app=document.getElementById('app');var H='';
  var hero=byId('hero').final[lang];
  H+='<section class="hero wrap reveal"><div class="name">Oleg Ghiletchi · Олег Гилецки</div>';
  H+='<div class="eyebrow">'+esc(EB.hero[lang])+'</div><h1>'+esc(hero.heading)+'</h1>';
  H+='<div class="intro">'+esc(hero.intro)+'</div>';
  H+='<div class="chips">'+hero.points.map(function(p){return '<div class="chip">'+esc(p)+'</div>';}).join('')+'</div></section>';
  function cardSec(id){
    var d=byId(id).final[lang];
    var s='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB[id][lang])+'</div><h2>'+esc(d.heading)+'</h2>';
    if(d.intro)s+='<p class="intro">'+esc(d.intro)+'</p>';
    s+='</div><div class="grid">'+d.points.map(function(p){return '<div class="card"><span class="mk"></span><p>'+esc(p)+'</p></div>';}).join('')+'</div></section>';
    return s;
  }
  H+=cardSec('holding');
  // CIFRE = stats table + structure + council takeaways
  var cf=byId('cifre');
  if(cf){var c=cf.final[lang];
    H+='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB.cifre[lang])+'</div><h2>'+esc(c.heading)+'</h2>';
    if(c.intro)H+='<p class="intro">'+esc(c.intro)+'</p>';
    H+='</div>'+statsHtml(lang);
    H+='<div class="grid" style="margin-top:22px">'+c.points.map(function(p){return '<div class="card"><span class="mk"></span><p>'+esc(p)+'</p></div>';}).join('')+'</div></section>';
  }
  H+=cardSec('diagnoza');
  H+=cardSec('avantaj');
  var pl=byId('plan').final[lang];
  H+='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB.plan[lang])+'</div><h2>'+esc(pl.heading)+'</h2>';
  if(pl.intro)H+='<p class="intro">'+esc(pl.intro)+'</p>';
  H+='</div><div class="timeline">'+pl.points.map(function(p,i){
    var parts=p.split(/s[—–-]s/);var k=parts.length>1?parts.shift():(lang==='ru'?'Этап '+(i+1):'Etapa '+(i+1));
    return '<div class="phase"><div class="ph-k">'+esc(k)+'</div><p>'+esc(parts.join(' — '))+'</p></div>';
  }).join('')+'</div></section>';
  var qa=byId('raspunsuri').final[lang];
  H+='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB.raspunsuri[lang])+'</div><h2>'+esc(qa.heading)+'</h2>';
  if(qa.intro)H+='<p class="intro">'+esc(qa.intro)+'</p>';
  H+='</div><div class="qa">'+qa.points.map(function(p,i){return '<div class="item"><div class="n">'+(i+1)+'</div><p>'+esc(p)+'</p></div>';}).join('')+'</div></section>';
  H+=cardSec('victorii');
  var c2=byId('cta').final[lang];
  H+='<section class="cta wrap reveal"><div class="eyebrow">'+esc(EB.cta[lang])+'</div><h2 style="margin:12px 0 16px">'+esc(c2.heading)+'</h2>';
  if(c2.intro)H+='<p class="intro">'+esc(c2.intro)+'</p>';
  H+='<div class="cta-card">'+c2.points.map(function(p){return '<div class="line">'+esc(p)+'</div>';}).join('')+'</div></section>';
  app.innerHTML=H;
  document.getElementById('foot').textContent=FOOT[lang];
  [].slice.call(document.querySelectorAll('.langtg button')).forEach(function(b){b.classList.toggle('on',b.getAttribute('data-l')===lang);});
  try{localStorage.setItem('oleg_lang',lang);}catch(e){}
  requestAnimationFrame(function(){
    var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.1});
    document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
  });
}
document.querySelectorAll('.langtg button').forEach(function(b){b.addEventListener('click',function(){render(b.getAttribute('data-l'));});});
var saved='ru';try{saved=localStorage.getItem('oleg_lang')||'ru';}catch(e){}
render(saved);
</script>
</body>
</html>
