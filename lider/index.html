<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Oleg Ghiletchi — Lider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#101319;--bg2:#151922;--card:#1b212c;--ink:#f4f1ea;--mut:#9aa6b4;--mut2:#6f7b8a;
  --gold:#c9a227;--gold-l:#f0d77a;--line:rgba(216,182,74,.18);--line2:rgba(255,255,255,.07);
  --ff:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--fd:'Playfair Display',Georgia,serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:linear-gradient(180deg,#0d1016,#12161e 40%,#101319);color:var(--ink);font-family:var(--ff);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1060px;margin:0 auto;padding:0 22px}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-l);font-weight:700}
h1,h2,h3{font-family:var(--fd);font-weight:700;letter-spacing:-.01em;line-height:1.15}
section{padding:64px 0;border-top:1px solid var(--line2)}
section:first-of-type{border-top:none}
.sec-head{margin-bottom:30px}
.sec-head h2{font-size:clamp(24px,3.4vw,36px);margin:12px 0 14px}
.intro{color:var(--mut);max-width:820px;font-size:clamp(15px,1.7vw,17px)}
/* lang toggle */
.langtg{position:fixed;top:14px;right:14px;z-index:50;display:flex;background:rgba(16,17,21,.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:3px}
.langtg button{border:0;background:transparent;color:#e7e3da;font-family:inherit;font-weight:800;font-size:12px;letter-spacing:.05em;padding:7px 14px;border-radius:999px;cursor:pointer;transition:.25s}
.langtg button.on{background:var(--gold);color:#241c00}
/* hero */
.hero{padding-top:96px;text-align:center}
.hero .name{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:20px}
.hero h1{font-size:clamp(28px,4.6vw,50px);margin:0 auto 22px;max-width:18ch}
.hero h1 em{color:var(--gold-l);font-style:normal}
.hero .intro{margin:0 auto;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;font-size:15.5px;color:#cdd5de}
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-start;margin-top:22px}
.chip{font-size:13px;color:#d9e0e8;background:rgba(216,182,74,.08);border:1px solid var(--line);border-radius:10px;padding:12px 14px;line-height:1.45;flex:1 1 260px;min-width:240px}
.chip b{color:var(--gold-l);font-weight:700}
/* generic cards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:20px 22px;transition:border-color .35s,transform .35s var(--ease)}
.card:hover{border-color:var(--line);transform:translateY(-3px)}
.card p{font-size:14.5px;color:#cbd3dc}
.card .mk{display:block;width:24px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:12px}
/* plan timeline */
.timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
@media(max-width:820px){.timeline{grid-template-columns:1fr}}
.phase{background:linear-gradient(180deg,rgba(216,182,74,.07),rgba(216,182,74,.012));border:1px solid var(--line);border-radius:16px;padding:22px}
.phase .ph-k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-l);font-weight:800;margin-bottom:10px}
.phase p{font-size:14px;color:#cdd5de}
/* qa */
.qa{display:flex;flex-direction:column;gap:12px}
.qa .item{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:18px 20px;display:flex;gap:14px}
.qa .item .n{flex:none;width:26px;height:26px;border-radius:50%;background:rgba(216,182,74,.14);border:1px solid var(--line);display:grid;place-items:center;color:var(--gold-l);font-weight:800;font-size:13px}
.qa .item p{font-size:14.5px;color:#cdd5de}
/* cta */
.cta{text-align:center}
.cta .intro{margin:0 auto 22px;text-align:center}
.cta-card{background:linear-gradient(180deg,rgba(216,182,74,.08),rgba(216,182,74,.02));border:1px solid var(--line);border-radius:18px;padding:32px 26px;max-width:680px;margin:0 auto}
.cta-card .line{font-size:15px;color:#d9e0e8;margin:8px 0}
.cta-card .line b{color:var(--gold-l)}
.btn{display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:var(--gold);color:#241c00;font-weight:800;text-decoration:none;padding:13px 22px;border-radius:999px;font-size:14px}
.foot{padding:30px 0 50px;text-align:center;color:var(--mut2);font-size:12px;line-height:1.6}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
</style>
</head>

<script id="data" type="application/json">[{"id":"hero","label":"Hero / poziționare","final":{"ru":{"heading":"Производитель + строитель + система продаж — в одном человеке. Кандидат на роль коммерческого директора / директора по развитию холдинга «Lider»","intro":"На встрече вы сами назвали узкие места — порядок в CRM, KPI, контроль менеджеров, сквозная картина продаж–склад–закупки–дебиторка. Это ровно то, что я каждый день делаю руками в своём бизнесе. При этом я прошёл всю цепочку лично: продавал отделку и считал сметы «под ключ», как строитель доводил объекты от фундамента до монтажа кровли, а потом перевёл собственные компании на CRM и регламенты. Поэтому я говорю на одном языке и с клиентом, и со стройкой, и с производством — и вижу разрывы между продажами, складом и стройкой изнутри, а не из отчёта. Контекст по вам я знаю (собственные бренды Florentina/Lider/Melano, дистрибуция ArcelorMittal, Fakro, Rockwool, Vilpe, Galeco, профнастил и заборы, ~10 филиалов, два юрлица и выход на левый берег через Eurodesign) — на встрече хочу проверить, где гипотезы совпадают с вашей реальностью.","points":["Производитель + строитель + автоматизация. На Construct Resurs продавал отделку и напольные покрытия, считал сметы и координировал монтаж; на Flormincom (ныне A-casa) как строитель вёл объекты «под ключ» — специфицировал и принимал кровлю, знаю, почему прораб заворачивает партию, что спрашивает снабженец до заказа и где заказ теряется между складом и отгрузкой. Это не «продавал кровлю» из резюме — это руки на объекте.","Системность приношу как компетенцию, а не как продукт. GO CRM — доказательство, что я умею строить такие системы; но к вам я иду коммерческим директором на full-time, а не интегратором. Работаю на любой вашей CRM (или выберем вместе), лицензии не продаю, Ghiletchi Consulting в это не вовлекаю — конфликта интересов нет.","Свои компании я систематизировал не чтобы отойти от дел, а чтобы освободить себя для полноценной работы здесь. Первые месяцы — в полях и в CRM ежедневно: Бельцы, Кагул, Сорока, филиалы. Хочу построить вам коммерческий отдел, который держится на системе и данных, а не на героизме одного человека.","Мыслю не только процессом, но и экономикой дистрибуции: маржа по категориям (на металлочерепице деньги делаются на аксессуарах, водостоках, креплениях и на возврате дилера, а не на листе, где вы конкурируете ценой с прямым импортом), оборачиваемость склада по филиалам, дебиторка в днях, attach-rate аксессуаров на каждый заказ кровли. Поэтому рычаги роста вижу конкретные: реактивация уснувших дилеров и прорабов, продажа системы целиком вместо голого листа, единый стандарт продаж по 10 филиалам как база под новые точки и под левый берег.","Первые 90 дней как предложение, а не лозунг: (1) аудит воронки, менеджеров и дебиторки по филиалам; (2) внедрение отчётности и 3–5 KPI, по которым прошу меня судить — конверсия, средний чек, attach-rate аксессуаров, дебиторка в днях, реактивированные B2B-клиенты; (3) первая волна возврата старых дилеров и оживление дилерской сети. Full-time, формат «фикс + бонус за результат» — бонус большой и из цифр, чтобы у меня был свой риск в деле."]},"ro":{"heading":"Producător + constructor + sistem de vânzări — într-un singur om. Candidat pentru rolul de director comercial / director de dezvoltare al holdingului „Lider”","intro":"La întâlnire ați numit chiar dumneavoastră punctele slabe — ordine în CRM, KPI, control al managerilor, imagine de la cap la coadă vânzări–depozit–achiziții–debitoare. Este exact ce fac zilnic cu mâinile în propriul business. Iar drumul l-am parcurs personal: am vândut finisaje și am calculat devize „la cheie”, ca constructor am dus obiecte de la fundație până la montajul acoperișului, apoi mi-am trecut companiile pe CRM și regulamente. De aceea vorbesc aceeași limbă cu clientul, cu șantierul și cu producția — și văd rupturile dintre vânzări, depozit și șantier din interior, nu dintr-un raport. Contextul vostru îl cunosc (branduri proprii Florentina/Lider/Melano, distribuție ArcelorMittal, Fakro, Rockwool, Vilpe, Galeco, profnastil și garduri, ~10 filiale, două firme și acoperire pe malul stâng prin Eurodesign) — la întâlnire vreau să verific unde se potrivesc ipotezele cu realitatea voastră.","points":["Producător + constructor + automatizare. La Construct Resurs am vândut finisaje și pardoseli, am calculat devize și am coordonat montaj; la Flormincom (azi A-casa), ca constructor, am dus obiecte „la cheie” — am specificat și recepționat acoperișuri, știu de ce un prorab respinge un lot, ce întreabă un snabjenec înainte să comande și unde se pierde comanda între depozit și expediție. Nu e „am vândut acoperișuri” de CV — e mâna pe obiect.","Sistematizarea o aduc ca o competență, nu ca un produs. GO CRM e dovada că știu să construiesc astfel de sisteme; dar la voi vin director comercial full-time, nu integrator. Lucrez pe orice CRM aveți (sau îl alegem împreună), nu vă vând licențe și nu implic Ghiletchi Consulting — fără conflict de interese.","Mi-am sistematizat companiile nu ca să mă retrag, ci ca să mă pot dedica integral aici. Primele luni — în teren și în CRM zilnic: Bălți, Cahul, Soroca, filialele. Vreau să vă construiesc un departament comercial care stă pe sistem și pe date, nu pe eroismul unui singur om.","Gândesc nu doar procesul, ci și economia distribuției: marja pe categorie (la metalocherepită banii se fac pe accesorii, sisteme pluviale, fixări și pe revenirea dealerului, nu pe foaia de tablă unde concurați la preț cu importul direct), rotația stocului pe filiale, debitoarea în zile, attach-rate-ul de accesorii pe fiecare comandă de acoperiș. De aceea pârghiile de creștere le văd concrete: reactivarea dealerilor și prorabilor adormiți, vânzarea sistemului complet în loc de tabla simplă, un standard unic de vânzare pe cele 10 filiale ca bază pentru filiale noi și pentru malul stâng.","Primele 90 de zile ca ofertă, nu ca slogan: (1) audit al pâlniei, al managerilor și al debitoarei pe filiale; (2) implementarea raportării și a 3–5 KPI după care vă rog să mă judecați — conversie, cec mediu, attach-rate de accesorii, debitoare în zile, clienți B2B reactivați; (3) primul val de revenire a dealerilor vechi și de reactivare a rețelei de dealeri. Full-time, format „fix + bonus pe rezultat” — bonusul mare și din cifre, ca să am și eu risc propriu în joc."]}}},{"id":"holding","label":"Am studiat holdingul","final":{"ru":{"heading":"Я разобрался, как устроен ваш бизнес","intro":"Перед встречей я смотрел на LIDER не как на «компанию, которой нужны продажи вообще», а как на конкретную операционную машину: производство плюс импорт, сеть филиалов, B2B-канал с дилерами и стройкой, выраженная сезонность кровли. Ниже — не пересказ ваших данных, а то, где я вижу рычаги для денег и где конкретно полезен именно я: человек, который был и поставщиком материалов, и строителем, и собирал CRM/KPI под такие задачи.","points":["Две компании (Esplan-Lux и Eurodesign) под одним брендом, с выходом Eurodesign на левый берег (Бендеры/Тирасполь), — это не просто «две фирмы», а консолидированная отчётность по двум юрлицам и риск разнобоя в ценах между ними. Доступ к рынку Приднестровья через отдельное юрлицо — сильный ход, но именно такая структура требует единой картины по марже и стоку. Это ровно то, что я привык оцифровывать.","Собственные бренды металлочерепицы (Florentina, Lider, Melano) плюс импорт премиум-марок (ArcelorMittal, Fakro, Rockwool и др.) в ассортименте 2000+ позиций — это готовая ценовая лестница good-better-best. Здесь решается главный коммерческий вопрос: что менеджер толкает первым — свой бренд с высокой маржой или импорт с быстрой оборачиваемостью. От дисциплины цен и правильного апсейла тут напрямую зависит маржа, а это поведение менеджеров я умею настраивать через скрипты, KPI и CRM.","11 филиалов (Кишинёв, Бельцы, Сорока, Бричаны, Унгены, Орхей, Комрат, Кагул, Яловены, Хынчешты, Анений Ной) — это не абстрактный «масштаб», а 11 точек, где без единой системы у каждого филиала «своя правда» по остаткам, ценам и дебиторке: один филиал режет цену другому, где-то мёртвый сток, где-то нехватка. На такой сети ручное управление физически уже не тянет — и, по-моему, именно это вы и ощущаете как «нет порядка в CRM и контроле».","Кровля и фасад — категория жёстко сезонная: пик март–октябрь, межсезонье — это сбор дебиторки, предзаказы и программы затарки дилеров к сезону. Дебиторку я выношу отдельной строкой, потому что в B2B стройматериалах долг подрядчиков — риск номер один: стройки встают, кто-то банкротится, а вы по факту необеспеченный кредитор. Лимиты кредита на клиента в CRM и алерты по срокам — первое, что я бы здесь навёл.","Ваша аудитория — не однородный «B2B», а разные каналы с разной экономикой: дилеры, прямые подрядчики, снабженцы, прорабы и объекты. С каждой из этих сторон я работал лично — и как поставщик отделочных материалов, и со стороны стройки «от фундамента до кровли», — поэтому говорю на языке и снабженца, и прораба, и вижу конфликт каналов (продать напрямую подрядчику, которого ведёт ваш дилер?), который мешает расти без каннибализации.","Про возврат старых клиентов: вопрос не в самом возврате, а в причине ухода — цена, наличие на складе или ушедший менеджер, который увёл дилера за собой. Это видно только в данных: кто из клиентов просел или пропал, когда и почему. Моя гипотеза по первым 90 дням — поднять это в CRM, собрать причины оттока и запустить адресную кампанию возврата, а параллельно закрыть контур цена–склад–дебиторка по сети. На встрече хочу свериться, какая из этих болей для вас сейчас самая острая."]},"ro":{"heading":"Am studiat cum funcționează businessul vostru","intro":"Înainte de întâlnire am privit LIDER nu ca pe «o companie care are nevoie de vânzări în general», ci ca pe o mașinărie operațională concretă: producție plus import, rețea de filiale, canal B2B cu dealeri și șantiere, sezonalitate pronunțată a acoperișurilor. Mai jos nu este o recitare a datelor voastre, ci locurile unde văd pârghii pentru bani și unde sunt util eu anume: un om care a fost și furnizor de materiale, și constructor, și a construit CRM/KPI exact pentru astfel de sarcini.","points":["Două firme (Esplan-Lux și Eurodesign) sub un singur brand, cu Eurodesign acoperind malul stâng (Bender/Tiraspol), nu înseamnă doar «două firme», ci raportare consolidată pe două entități și risc de necorelare a prețurilor între ele. Accesul la piața din Transnistria printr-o entitate separată este o mișcare bună, dar tocmai o astfel de structură cere o imagine unitară pe marjă și stoc. Exact asta sunt obișnuit să transform în cifre.","Brandurile proprii de țiglă metalică (Florentina, Lider, Melano) plus importul de mărci premium (ArcelorMittal, Fakro, Rockwool ș.a.) într-un asortiment de 2000+ poziții formează o scară de preț gata făcută good-better-best. Aici se decide întrebarea comercială principală: ce împinge managerul primul — brandul propriu cu marjă mare sau importul cu rotație rapidă. De disciplina prețurilor și de un upsell corect depinde direct marja, iar acest comportament al managerilor știu să-l reglez prin scripturi, KPI și CRM.","11 filiale (Chișinău, Bălți, Soroca, Briceni, Ungheni, Orhei, Comrat, Cahul, Ialoveni, Hîncești, Anenii Noi) nu sunt o «amploare» abstractă, ci 11 puncte unde, fără un sistem unitar, fiecare filială are «adevărul ei» despre stocuri, prețuri și debitoare: o filială taie prețul alteia, undeva stoc mort, altundeva rupere de stoc. Pe o astfel de rețea, conducerea manuală fizic nu mai face față — și, după mine, exact asta simțiți drept «lipsă de ordine în CRM și control».","Acoperișul și fațada sunt o categorie brutal de sezonieră: vârf martie–octombrie, iar off-season înseamnă colectarea debitoarei, comenzi anticipate și programe de stocare a dealerilor înainte de sezon. Debitoarea o pun pe o linie separată, pentru că în materiale de construcții B2B creanța către antreprenori este riscul numărul unu: șantierele se blochează, unii dau faliment, iar voi sunteți practic creditor negarantat. Limite de credit pe client în CRM și alerte de scadență sunt primul lucru pe care l-aș pune în ordine aici.","Audiența voastră nu este un «B2B» omogen, ci canale diferite cu economii diferite: dealeri, antreprenori direcți, agenți de aprovizionare (снабженцы), prorabi și obiecte/șantiere. Cu fiecare dintre aceste părți am lucrat personal — și ca furnizor de materiale de finisaj, și din partea șantierului «de la fundație la acoperiș» — de aceea vorbesc limba și a aprovizionatorului, și a prorabului, și văd conflictul de canal (să vinzi direct unui antreprenor pe care îl deservește dealerul tău?), care frânează creșterea fără canibalizare.","Despre revenirea clienților vechi: întrebarea nu e revenirea în sine, ci cauza plecării — prețul, disponibilitatea pe stoc sau un manager plecat care a luat dealerul cu el. Asta se vede doar în date: care clienți au scăzut sau au dispărut, când și de ce. Ipoteza mea pentru primele 90 de zile — să ridic asta în CRM, să strâng cauzele churn-ului și să pornesc o campanie țintită de revenire, iar în paralel să închid lanțul preț–stoc–debitoare pe rețea. La întâlnire vreau să verific care dintre aceste dureri este acum cea mai acută pentru voi."]}}},{"id":"diagnoza","label":"Ce am observat (oportunități)","final":{"ru":{"heading":"Что я заметил — гипотезы, которые хочу проверить вместе с вами","intro":"Я изучил структуру холдинга: две компании (Esplan-Lux и Eurodesign), бренд-зонтик \"LIDER\", около 10 филиалов, собственные бренды черепицы (Florentina, Lider, Melano) и эксклюзивная дистрибуция ArcelorMittal, Fakro, Rockwool. Это сильный бизнес, выросший за 20 лет. Я смотрю на него и как продавец стройматериалов, и как строитель (сам считал кровлю от фундамента до конька и сдавал объекты под ключ), и как человек, который свои компании Megaparc и Ghiletchi Consulting держит на собственной CRM + ботах + делегировании, без моего ежедневного присутствия. Ниже — не оценка \"что у вас сломано\", а точки роста, которые при таком масштабе обычно дают самый быстрый эффект. Все они — гипотезы, которые я хочу подтвердить вашими цифрами в первые 30 дней, а не выводы, сделанные с сайта.","points":["Возврат старых B2B-клиентов и сезон — это деньги, которые обычно теряются незаметно. У кровли жёсткая сезонность: пик весна-осень, провал зимой. Часть постоянных дилеров, прорабов и снабженцев отваливается не потому, что ушли к конкуренту, а потому что в межсезонье их некому системно вести. Я бы хотел увидеть данные: какая доля базы не покупала последние N месяцев. Реактивация уснувших клиентов — обычно самая дешёвая выручка, а зимний \"простой\" менеджеров логично загрузить именно работой по базе и дилерам. У себя я именно так выстроил повторные касания на боте — тот же принцип готов принести сюда.","Маржа: свои бренды и импорт — это не \"или-или\", а сегментация. У вас редкое преимущество — своё производство (Florentina, Lider, Melano) плюс статус официального дистрибьютора ArcelorMittal/Fakro/Rockwool. Я понимаю, что эти контракты — актив, и каннибализация наказывается поставщиком, поэтому речь не о том, чтобы \"толкать своё\". Речь о механизме: матрица маржи по SKU, бонус менеджера на МИКС (а не на валовый оборот) и технический аргумент замены — где объекту реально выгоднее свой бренд, а где клиент берёт ArcelorMittal/Fakro именно как бренд для перепродажи и гарантию. Как бывший строитель я знаю, почему прораб выбирает конкретную черепицу, — и могу вооружить менеджера этим аргументом за столом с клиентом, не ломая дистрибуцию.","Связка продажи-склад-закупки-логистика-отгрузки — то, что вы сами назвали болью. У производителя на 2000+ позициях и 10 филиалах объект выигрывается или теряется на остатках и отгрузке: металлочерепица режется в размер под скат, доборные элементы и расчёт площади — это половина маржи и половина ошибок, а привезли не тот цвет или длину листа — потеряли и объект, и повторный заказ. Плюс лид-тайм производства своих брендов против недель ожидания по импорту ArcelorMittal. Гипотеза: видимость остатка у менеджера в момент расчёта (чтобы не продавал то, чего нет) и планирование закупки/производства под воронку и сезон. Я прошёл эту цепочку и как поставщик отделки, и как строитель на площадке.","Прозрачность продаж и дебиторка — но как инструмент под деньги выше, а не как самоцель. Я не продаю софт. Скорее всего, 1C/ERP для остатков и документов у вас уже есть — чаще всего не хватает слоя НАД ним: где живёт воронка B2B и активность менеджера. На вопрос \"сколько КП отправил филиал Бельцы на прошлой неделе и сколько стало заказами\" ответ обычно собирают руками. По дебиторке у застройщиков отсрочка дилеру — это инструмент продаж, а не зло: нужны единая для всех филиалов кредитная политика, лимит на клиента и ранние сигналы, а не \"выбивание долгов\". Честно скажу: унификация на 10 филиалов — это в первую очередь работа с руководителями филиалов и привычками людей, а не \"поставить программу\". Я это уже внедрял у себя и понимаю, где сопротивление, поэтому иду руками, а не презентацией."]},"ro":{"heading":"Ce am observat — ipoteze pe care vreau să le verific împreună cu voi","intro":"Am studiat structura holdingului: două firme (Esplan-Lux și Eurodesign), brandul-umbrelă \"LIDER\", circa 10 filiale, branduri proprii de țiglă (Florentina, Lider, Melano) și distribuția exclusivă ArcelorMittal, Fakro, Rockwool. Este un business solid, construit în 20 de ani. Mă uit la el și ca vânzător de materiale de construcții, și ca constructor (am calculat eu însumi acoperișul de la fundație la coamă și am predat obiecte la cheie), și ca om care își ține firmele Megaparc și Ghiletchi Consulting pe CRM propriu + boți + delegare, fără prezența mea zilnică. Mai jos nu este o evaluare \"ce e stricat la voi\", ci puncte de creștere care la o astfel de scară dau de obicei cel mai rapid efect. Toate sunt ipoteze pe care vreau să le confirm cu cifrele voastre în primele 30 de zile, nu concluzii trase de pe site.","points":["Revenirea clienților B2B vechi și sezonul — banii care se pierd de obicei pe nesimțite. Acoperișul are sezonalitate dură: vârf primăvara-toamna, gol iarna. O parte din dealerii, prorabii și snabžencii constanți se pierd nu fiindcă au plecat la concurent, ci fiindcă în extrasezon nu are cine să-i lucreze sistematic. Aș vrea să văd datele: ce procent din bază nu a mai cumpărat în ultimele N luni. Reactivarea clienților adormiți e de regulă cea mai ieftină cifră, iar \"golul\" de iarnă al managerilor e logic să fie încărcat exact cu munca pe bază și dealeri. La mine exact așa am construit re-contactarea pe bot — același principiu sunt gata să-l aduc aici.","Marja: brandurile proprii și importul nu sunt \"sau-sau\", ci segmentare. Aveți un avantaj rar — producție proprie (Florentina, Lider, Melano) plus statut de distribuitor oficial ArcelorMittal/Fakro/Rockwool. Înțeleg că aceste contracte sunt un activ, iar canibalizarea e penalizată de furnizor, deci nu e vorba de a \"împinge ce e al nostru\". E vorba de mecanism: matrice de marjă pe SKU, bonus al managerului pe MIX (nu pe cifra brută) și un argumentar tehnic de substituție — unde obiectului îi e real mai avantajos brandul propriu și unde clientul ia ArcelorMittal/Fakro tocmai ca brand pentru revânzare și garanție. Ca fost constructor știu de ce un prorab alege o anumită țiglă — și pot echipa managerul cu acest argument la masa cu clientul, fără să stric distribuția.","Lanțul vânzări-depozit-achiziții-logistică-expediții — exact ce ați numit voi drept durere. La un producător cu 2000+ poziții și 10 filiale, obiectul se câștigă sau se pierde pe stocuri și expediție: țigla metalică se taie la dimensiune pe pantă, elementele de bordare și calculul suprafeței sunt jumătate din marjă și jumătate din erori, iar dacă ai adus altă culoare sau altă lungime de foaie ai pierdut și obiectul, și comanda repetată. Plus lead-time-ul de producție al brandurilor proprii față de săptămânile de așteptare la importul ArcelorMittal. Ipoteză: vizibilitatea stocului la manager în momentul devizului (ca să nu vândă ce nu e) și planificarea achiziției/producției pe baza pâlniei și a sezonului. Am trecut prin acest lanț și ca furnizor de finisaje, și ca constructor pe șantier.","Transparența vânzărilor și debitoarea — dar ca instrument pentru banii de mai sus, nu ca scop în sine. Nu vând software. Cel mai probabil aveți deja 1C/ERP pentru stocuri și documente — de obicei lipsește stratul de DEASUPRA: unde trăiește pâlnia B2B și activitatea managerului. La întrebarea \"câte oferte a trimis filiala Bălți săptămâna trecută și câte au devenit comenzi\" răspunsul se adună de obicei manual. La debitoare, în construcții, termenul de plată acordat dealerului e instrument de vânzare, nu un rău: e nevoie de o politică de credit unică pe toate filialele, limită pe client și semnale timpurii, nu de \"stors datorii\". Spun cinstit: unificarea pe 10 filiale e în primul rând muncă cu șefii de filiale și cu obiceiurile oamenilor, nu \"instalat un program\". Am implementat asta la mine și știu unde apare rezistența, de aceea vin cu mâinile, nu cu o prezentare."]}}},{"id":"avantaj","label":"De ce eu / avantajul unic","final":{"ru":{"heading":"Почему я: продаю стройматериалы, был на стройке и строю системы продаж — в одном человеке","intro":"Коммерческого директора обычно ищут среди тех, кто силён в чём-то одном: или продажи, или стройка, или CRM и контроль. Моя ценность для «Лидер» в том, что я прошёл все три стороны и могу говорить на одном языке с дилером, с прорабом на объекте и с собственником, которому нужны цифры. Производитель здесь — вы: черепица Florentina, Lider, Melano, профиль на линии. Моя роль — мост между вашим производством, дилером и стройкой, плюс система продаж, которой, как я понял из разговора, пока не хватает. Скажу честно сразу по трём вещам, которые вас наверняка волнуют: я иду full-time и первые месяцы готов работать руками — на встречах, в переговорах, в филиалах; свой продукт GO CRM я вам не продаю — приношу опыт, как такие системы строятся, а порядок навожу в том, что у вас уже есть; и мои бизнесы построены так, что не требуют меня каждый день — именно поэтому я могу быть полностью ваш. Ниже — три опоры и план на первые 90 дней.","points":["ПРОДАЖИ СТРОЙМАТЕРИАЛОВ — знаю клиента и его возражение (Construct Resurs). Я продавал напольные и отделочные материалы дилерам, прорабам и магазинам: консультация, сметы «под ключ», координация монтажа. Я не приравниваю это к вашему циклу — черепица на рулоне, раскрой, кредит-лимиты у дилеров и тяжёлая логистика устроены иначе, и в эту специфику мне нужно быстро войти. Но тип клиента, его логику закупки и язык маржи и сроков (а не каталога) я знаю изнутри. Конкретный механизм, который я приношу под дебиторку — вашу боль №1: кредит-лимит на дилера, скоринг и авто-стоп отгрузки при просрочке, а не разговоры постфактум.","БЫЛ ПО ДРУГУЮ СТОРОНУ ПРИЛАВКА — покупал кровлю как заказчик (Flormincom / A-casa). Я координировал проекты и продавал дизайн-проекты с исполнением «под ключ», прошёл объект от фундамента до отделки. Я не выдаю себя за кровельщика и не буду перечислять вам бренды с вашего же сайта как «опыт». Сильнее другое: я был тем застройщиком, который выбирает поставщика кровли под проект — знаю, как он сравнивает, где торгуется, почему уходит к конкуренту на цене. Это позволяет заходить к строительной компании как «свой» по логике объекта, а не как продавец «по прайсу» — и быстро разбираться в технике там, где её не хватает.","СИСТЕМЫ ПРОДАЖ И УПРАВЛЕНИЕ ЛЮДЬМИ (Megaparc, Ghiletchi Consulting). Свои бизнесы я построил на автоматизации: CRM, боты, делегирование. Смысл не в том, что они «работают без меня» — а в том, что результат не висит на одном человеке. Сегодня у меня в автоматизированном контуре десятки клиентов и поток заявок, который ведут не я, а процесс и небольшая делегированная команда. Это ровно ваша задача на ~10 филиалов: воронка по филиалам, план/факт по менеджеру, видимая дебиторка для собственника. KPI ввожу не через штраф, а через прозрачность сначала — измеряем, показываем, потом мотивируем; так старые менеджеры не саботируют, а втягиваются. Систему строю в том, что у вас уже есть (1С / Bitrix / что используете) — она остаётся вашей и на ваших людях.","ПЕРВЫЕ 90 ДНЕЙ — конкретно. Недели 1–2: слушаю менеджеров и собственника, провожу аудит цепочки продажа→склад→закупки→логистика→отгрузки→дебиторка на 2–3 филиалах и собираю список «ушедших» дилеров с причиной ухода. Месяц 1: руками в активных продажах + возврат первых 2–3 старых клиентов как доказательство процесса, не героизма. Месяцы 2–3: воронка и план/факт по менеджерам, еженедельный ритм отчётности для собственника, KPI-пилот на одной филиале перед раскатом. Формат честно: full-time, готов на испытательный срок, фикс + бонус за результат, начинаю с рук на продажах. В конце испытательного решаем вместе — по цифрам."]},"ro":{"heading":"De ce eu: vând materiale de construcții, am fost pe șantier și construiesc sisteme de vânzări — într-o singură persoană","intro":"Un director comercial e căutat de obicei printre cei tari într-un singur lucru: ori vânzări, ori șantier, ori CRM și control. Valoarea mea pentru «Lider» e că le-am parcurs pe toate trei și pot vorbi aceeași limbă cu dealerul, cu prorabul de pe obiect și cu proprietarul care vrea cifre. Producătorul aici sunteți voi: țigla Florentina, Lider, Melano, profilul pe linie. Rolul meu e podul între producția voastră, dealer și șantier, plus sistemul de vânzări care, din câte am înțeles din discuție, încă lipsește. Vă spun cinstit din start trei lucruri care sigur vă preocupă: vin full-time și primele luni lucrez cu mâinile — la întâlniri, în negocieri, în filiale; produsul meu GO CRM nu vi-l vând — aduc experiența de a construi astfel de sisteme, iar ordinea o fac în ce aveți deja; iar afacerile mele sunt construite să nu mă ceară zilnic — exact de aceea pot fi complet al vostru. Mai jos sunt trei piloni și un plan pe primele 90 de zile.","points":["VÂNZĂRI DE MATERIALE DE CONSTRUCȚII — cunosc clientul și obiecția lui (Construct Resurs). Am vândut pardoseli și materiale de finisaj către dealeri, prorabi și magazine: consultanță, devize «la cheie», coordonare montaj. Nu echivalez asta cu ciclul vostru — țigla pe rulou, croirea, limitele de credit la dealeri și logistica grea funcționează altfel, iar în această specificitate trebuie să intru rapid. Dar tipul de client, logica lui de achiziție și limbajul marjei și al termenelor (nu al catalogului) le cunosc din interior. Mecanism concret pe care îl aduc pentru debitoare — durerea voastră nr. 1: limită de credit pe dealer, scoring și stop-livrare automat la depășire, nu discuții post-factum.","AM FOST DE CEALALTĂ PARTE A TEJGHELEI — am cumpărat acoperiș ca beneficiar (Flormincom / A-casa). Am coordonat proiecte și am vândut proiecte de design cu execuție «la cheie», am parcurs obiectul de la fundație la finisaj. Nu mă dau drept montator de acoperișuri și nu vă voi înșira branduri de pe propriul vostru site drept «experiență». Mai puternic e altceva: am fost chiar acel dezvoltator care alege furnizorul de acoperiș pentru un proiect — știu cum compară, unde se tocmește, de ce pleacă la concurent pe preț. Asta îmi permite să intru la o firmă de construcții ca «de-al lor» pe logica obiectului, nu ca vânzător «pe preț» — și să prind repede partea tehnică acolo unde lipsește.","SISTEME DE VÂNZĂRI ȘI MANAGEMENT DE OAMENI (Megaparc, Ghiletchi Consulting). Afacerile mele le-am construit pe automatizare: CRM, boți, delegare. Sensul nu e că «merg fără mine» — ci că rezultatul nu atârnă de un singur om. Azi am în conturul automatizat zeci de clienți și un flux de cereri pe care nu îl duc eu, ci procesul și o echipă mică delegată. E exact sarcina voastră pe ~10 filiale: pâlnie pe filiale, plan/realizat pe manager, debitoare vizibilă pentru proprietar. KPI nu îl introduc prin penalizare, ci prin transparență mai întâi — măsurăm, arătăm, apoi motivăm; așa managerii vechi nu sabotează, ci se prind în joc. Sistemul îl construiesc în ce aveți deja (1C / Bitrix / ce folosiți) — rămâne al vostru și pe oamenii voștri.","PRIMELE 90 DE ZILE — concret. Săptămânile 1–2: ascult managerii și proprietarul, fac audit al lanțului vânzări→depozit→achiziții→logistică→expediții→debitoare pe 2–3 filiale și strâng lista dealerilor «plecați» cu motivul plecării. Luna 1: cu mâinile în vânzări active + revenirea primilor 2–3 clienți vechi ca dovadă a procesului, nu a eroismului. Lunile 2–3: pâlnie și plan/realizat pe manageri, ritm săptămânal de raportare pentru proprietar, KPI-pilot pe o filială înainte de roll-out. Format cinstit: full-time, accept perioadă de probă, fix + bonus pe rezultat, încep cu mâinile pe vânzări. La finalul probei decidem împreună — pe cifre."]}}},{"id":"plan","label":"Plan 30 / 60 / 90 zile","final":{"ru":{"heading":"План 30 / 60 / 90 дней","intro":"Честно: оборотов, маржи и ваших текущих KPI я ещё не видел, поэтому конкретные цели зафиксирую с вами после первых 2-3 недель в полях. Логика простая — сначала выйти к дилерам и стройкам и продать самому, попутно увидев, где теряются заказы и деньги; затем на пилоте выстроить систему; и только потом тиражировать на филиалы, два юрлица и собственные бренды. Цифры ниже — это порядок величин для разговора, а не обещания: калибруем по вашим данным.","points":["Дни 1-30 — продаю и диагностирую одновременно (не аудит ради аудита). С первой недели — в поля: личные встречи и реальные сделки с ключевыми дилерами и стройкомпаниями. Я двадцать лет говорю на одном языке и с прорабом, и со снабженцем, и со стройкой — поэтому диагностирую, продавая, а не только наблюдая. Глубоко погружаюсь в 2-3 опорных филиала (Кишинёв как флагман + один проблемный региональный), остальные смотрю обзорно по отчётности. Не обещаю перевернуть ~10 филиалов и 2000+ позиций за месяц — это было бы несерьёзно. Быстрые победы, измеримые уже в первый месяц: лично реактивировать 5-10 крупных спящих дилеров с реальным заказом и подсветить одну явную утечку маржи (неконтролируемые скидки). CRM в этот месяц я НЕ ломаю — я его понимаю: смотрю, как реально работают менеджеры и где теряются заказы между отделами.","Дебиторка и денежный цикл — отдельная тема, а не строка в списке. Для дистрибьютора стройматериалов замороженные у дилеров деньги — боль №1, и она завязана на сезон. В первые недели разбираю структуру просрочки, в дни 31-60 ввожу лимиты кредита на дилера, сроки и стоп-лист, а бонус менеджера привязываю к ПОСТУПЛЕНИЮ денег, а не только к отгрузке — чтобы рост продаж не превращался в зависшие на стройках деньги. Ориентир для обсуждения: заметную часть просроченной дебиторки взять под контроль за 90 дней.","Производство ↔ продажи ↔ склад ↔ сезон — там, где я как раз и незаменим. Вы ПРОИЗВОДИТЕЛЬ, а не только дистрибьютор, а кровля — жёстко сезонный бизнес (пик весна-лето). Синхронизирую прогноз спроса по группам с планом производства собственной черепицы и профнастила и со стоком стали ArcelorMittal: чтобы в пик не терять продажи из-за отсутствия товара и не замораживать капитал в межсезонье. По собственным брендам (Florentina, Lider, Melano) не утверждаю вслепую, что они маржинальнее импорта — это гипотеза: сверю реальную маржу по вашим данным и, ЕСЛИ она выше, выстрою осознанный сдвиг микса в их сторону.","Дни 31-60 — система на пилоте, а не реформа сверху на 250 человек. Работаю С действующими менеджерами, а не НАД ними: вовлекаю их в новые правила, чтобы они были их, а не моими — и сразу вижу, кто тянет, а кто саботирует. На опорных филиалах перестраиваю воронку, статусы сделок и прозрачные KPI, регламент коммерческого отдела и план продаж с мотивацией фикс + бонус за результат. Собственный опыт автоматизации (GO CRM, Megaparc) переношу на ваши процессы инструментами, которые уже построил (KPI, боты отчётности) — не покупая внешнее внедрение и не навязывая новую систему через ночь. Сделки продолжаю вести лично, чтобы регламент строился на реальной практике, а не на теории.","Дни 61-90 — тиражирование того, что доказало себя на пилоте. Раскатываю рабочую модель на остальные филиалы и оба юрлица. Левый берег (Бендеры/Тирасполь через Eurodesign) веду как ОТДЕЛЬНЫЙ кейс со своими рисками — другая юрисдикция, таможенный/налоговый режим и риск возврата денег — а не как copy-paste модели. Запускаю осознанный push собственных брендов (если маржа подтвердилась) и готовлю типовой регламент запуска нового филиала как готовый продукт — с расчётом точки безубыточности и моей ролью на старте. К этому моменту план продаж на следующие 60-90 дней — уже в цифрах на накопленных данных CRM, и я готов привязать собственный бонус к согласованным с вами KPI (оборот, реактивация дилеров, контроль дебиторки, маржа собственных брендов)."]},"ro":{"heading":"Plan 30 / 60 / 90 zile","intro":"Sincer: cifrele de afaceri, marja și KPI-urile voastre actuale nu le-am văzut încă, așa că obiectivele concrete le fixez cu voi după primele 2-3 săptămâni pe teren. Logica e simplă — întâi ies la dealeri și pe șantiere și vând eu însumi, văzând pe parcurs unde se pierd comenzile și banii; apoi, pe un pilot, construiesc sistemul; și abia după aceea replic pe filiale, cele două firme și brandurile proprii. Cifrele de mai jos sunt ordine de mărime pentru discuție, nu promisiuni: le calibrăm pe datele voastre.","points":["Zilele 1-30 — vând și diagnostichez în același timp (nu audit de dragul auditului). Din prima săptămână, pe teren: întâlniri și tranzacții reale cu dealeri și companii de construcții cheie. Vorbesc de douăzeci de ani aceeași limbă și cu prorabul, și cu snabjentul, și cu producția — așa că diagnostichez vânzând, nu doar privind. Mă cufund în profunzime în 2-3 filiale-reper (Chișinău ca flagman + una problematică din regiune), restul le văd doar de ansamblu prin raportare. Nu promit să răstorn ~10 filiale și 2000+ poziții într-o lună — ar fi neserios. Victorii rapide, măsurabile chiar în prima lună: reactivez personal 5-10 dealeri mari adormiți cu o comandă reală și identific o scurgere clară de marjă (discounturi necontrolate). CRM-ul în această lună NU îl rup — îl înțeleg: observ cum lucrează de fapt managerii și unde se pierd comenzile între departamente.","Debitoarea și ciclul de cash — temă proprie, nu un rând într-o listă. Pentru un distribuitor de materiale, banii blocați la dealeri sunt durerea nr. 1 și sunt legați de sezon. În primele săptămâni descompun structura restanțelor, în zilele 31-60 introduc limite de credit pe dealer, scadențe și stop-listă, iar bonusul managerului îl leg de ÎNCASARE, nu doar de livrare — ca creșterea vânzărilor să nu se transforme în bani blocați pe șantiere. Ordin de mărime pentru discuție: o parte semnificativă din debitoarea restantă adusă sub control în 90 de zile.","Producție ↔ vânzări ↔ stoc ↔ sezon — exact acolo unde sunt de neînlocuit. Sunteți PRODUCĂTOR, nu doar distribuitor, iar acoperișul e un business brutal sezonier (vârf primăvară-vară). Sincronizez prognoza cererii pe grupe cu planul de producție al țiglei și profnastilului proprii și cu stocul de tablă ArcelorMittal: ca în vârf să nu pierdem vânzări din lipsă de marfă și să nu blocăm capital în extrasezon. Despre brandurile proprii (Florentina, Lider, Melano) nu afirm orbește că sunt mai marginale decât importul — e o ipoteză: verific marja reală pe datele voastre și, DACĂ e mai mare, construiesc un shift conștient de mix spre ele.","Zilele 31-60 — sistem pe pilot, nu reformă de sus peste 250 de oameni. Lucrez CU managerii existenți, nu PESTE ei: îi implic în noile reguli ca să fie ale lor, nu ale mele — și văd imediat cine trage și cine frânează. Pe filialele-reper reconstruiesc pâlnia, statusurile tranzacțiilor și KPI transparenți, regulamentul departamentului comercial și planul de vânzări cu motivare fix + bonus pe rezultat. Experiența mea de automatizare (GO CRM, Megaparc) o transfer pe procesele voastre cu instrumentele pe care le-am construit deja (KPI, boți de raportare) — fără să cumpăr o implementare externă și fără să impun un sistem nou peste noapte. Continui să port tranzacții personal, ca regulamentul să se construiască pe practică reală, nu pe teorie.","Zilele 61-90 — replicarea a ceea ce s-a dovedit pe pilot. Extind modelul funcțional pe restul filialelor și ambele firme. Malul stâng (Bender/Tiraspol prin Eurodesign) îl tratez ca un DOSAR separat, cu riscuri proprii — altă jurisdicție, alt regim vamal/fiscal și risc de încasare — nu ca un copy-paste al modelului. Lansez un push conștient al brandurilor proprii (dacă marja s-a confirmat) și pregătesc un regulament-tip de lansare a unei filiale noi ca produs gata făcut — cu calculul pragului de rentabilitate și rolul meu la start. La acest moment, planul de vânzări pentru următoarele 60-90 zile e deja în cifre, pe datele acumulate în CRM, și sunt gata să-mi leg propriul bonus de KPI-urile agreate cu voi (cifră de afaceri, reactivare dealeri, control al debitoarei, marja brandurilor proprii)."]}}},{"id":"raspunsuri","label":"Răspunsuri la întrebările cheie","final":{"ru":{"heading":"Ответы на ключевые вопросы","intro":"Александр, чтобы на встрече сразу зайти в главное, коротко отвечу на ключевые вопросы — роль, занятость, деньги, KPI и проверка — и покажу, как вижу первые 90 дней. Точные цифры и границы сверим лично, по вашим задачам.","points":["Роль. Мне интересна коммерческая функция холдинга «Lider»: система B2B-продаж по двум фирмам (Esplan-Lux и Eurodesign), дисциплина в воронке, дилерах и дебиторке, с прицелом на развитие ассортимента и сети. Финальный титул и границы давайте определим на встрече — по тому, где вам реально больно. Вы за 20 лет построили производство, 10 филиалов и два бренда; я прихожу не ломать, а достроить систему продаж и контроля поверх того, что уже работает.","Мой козырь — связка, которой редко обладает наёмный коммерсант. Я сам был прорабом, прошёл объект от фундамента до кровли, и продавал отделку застройщику. Я говорю на одном языке и с вашим клиентом-застройщиком, и со стройкой, и с производством — понимаю, почему сделка срывается на смете и монтаже, а не только на цене. На старте готов работать руками: выезжать в поля с менеджерами 2-3 филиалов, чтобы заработать доверие результатом, а не сидеть над командой с проверкой.","Что я вижу в кровельном B2B (как возможности, не как критику). Сезонность: пик весна-осень, провал зимой — зиму нужно загружать фасадом, заборами, водостоками и накоплением заявок к сезону. Маржа: разница стратегии между своими брендами (Florentina/Lider/Melano — объём и дилеры) и официальным импортом (ArcelorMittal/Fakro/Rockwool). Дебиторка у застройщиков, которые платят по сдаче объекта. Спящие клиенты: сначала разбор в CRM, почему ушли — цена, срок, долг, конкурент, — реактивируем только там, где есть реальный повод вернуться. Левый берег через Eurodesign — отдельный канал.","Занятость. Холдинг для меня — основной фокус, full-time, пн-пт, наравне с любым штатным сотрудником. Megaparc и Ghiletchi Consulting работают на автоматизации и операционных командах — это не план «Б», а доказательство, что я умею строить системы продаж, которые идут без меня. Именно это я хочу построить для «Lider» и готов зафиксировать как обязательство.","CRM и конфликт интересов — закрываю сразу. Свою CRM я вам не продаю и не навязываю. Работаю в ВАШЕЙ учётной системе и настраиваю отчётность, KPI и контроль на том, что у вас уже есть — без месяцев стройки и новых ИТ-затрат. Экспертизу приношу, абонемент на свой софт — нет.","Деньги. Готов на фикс в рынке для управленческой роли + бонус, где бОльшая часть моего дохода привязана к результату, который вы увидите: рост маржи на дилерском канале, новые B2B-продажи, снижение просроченной дебиторки — то, на что я реально влияю, а не общая цифра, которую тянут и другие отделы. Стартовую вилку и цели сверим на встрече.","Проверка и первые 90 дней. Предлагаю испытательный срок 2-3 месяца с целями, согласованными вместе. 30 дней — в поля, разбор воронки, дилеров и спящих клиентов. 60 — KPI, план-факт и реактивация. 90 — первые измеримые цифры по возврату клиентов и дебиторке. Не увидите конкретного результата — ваше право не продолжать. Тест предлагаю сам."]},"ro":{"heading":"Răspunsuri la întrebările cheie","intro":"Alexandr, ca să intrăm direct în subiectul important la întâlnire, răspund scurt la întrebările-cheie — rolul, disponibilitatea, banii, KPI și proba — și arăt cum văd primele 90 de zile. Cifrele exacte și limitele le sincronizăm personal, pe nevoile dvs.","points":["Rolul. Mă interesează funcția comercială a holdingului „Lider”: sistemul de vânzări B2B pe cele două firme (Esplan-Lux și Eurodesign), disciplina în pâlnie, dealeri și debitoare, cu prevedere spre dezvoltarea asortimentului și a rețelei. Titlul final și limitele să le stabilim la întâlnire — după unde vă doare cu adevărat. Ați construit în 20 de ani producția, 10 filiale și două branduri; nu vin să stric, ci să termin de construit sistemul de vânzări și control peste ce funcționează deja.","Atuul meu e o combinație rară la un comercial angajat. Am fost eu însumi prorab, am parcurs obiectul de la fundație la acoperiș și am vândut finisaje către constructor. Vorbesc aceeași limbă cu clientul-constructor, cu șantierul și cu producția — înțeleg de ce pică o vânzare la nivel de deviz și montaj, nu doar la preț. La start sunt dispus să lucrez cu mâinile: ieșiri pe teren cu managerii de la 2-3 filiale, ca să câștig credibilitate prin rezultat, nu să stau peste echipă cu inspecția.","Ce văd în B2B-ul de acoperișuri (ca oportunități, nu ca reproș). Sezonalitatea: vârf primăvară-toamnă, vale iarna — iarna o încărcăm cu fațade, garduri, sisteme pluviale și acumulare de cereri pentru sezon. Marja: diferența de strategie între brandurile proprii (Florentina/Lider/Melano — volum și dealeri) și importul oficial (ArcelorMittal/Fakro/Rockwool). Debitoarea la constructorii care plătesc la predarea obiectului. Clienții adormiți: întâi o analiză în CRM de ce au plecat — preț, termen, datorie, concurent — reactivăm doar unde există un motiv real să revină. Malul stâng prin Eurodesign — canal separat.","Disponibilitate. Holdingul e focusul meu principal, full-time, luni-vineri, la fel ca orice angajat. Megaparc și Ghiletchi Consulting merg pe automatizare și echipe operaționale — nu sunt un plan „B”, ci dovada că știu să construiesc sisteme de vânzări care funcționează fără mine. Exact asta vreau să construiesc pentru „Lider” și sunt gata să o fixez ca angajament.","CRM-ul și conflictul de interese — îl închid din start. Nu vă vând și nu vă impun CRM-ul meu. Lucrez în sistemul DVS. de evidență și configurez raportarea, KPI și controlul pe ce aveți deja — fără luni de construcție și fără costuri IT noi. Aduc expertiza, nu un abonament la software-ul meu.","Banii. Sunt gata pe un fix în linie cu piața pentru o funcție de conducere + bonus, unde cea mai mare parte a venitului meu e legată de rezultatul pe care îl veți vedea: creșterea marjei pe canalul dealeri, vânzări B2B noi, reducerea debitoarei restante — ce pot influența real, nu cifra totală pe care o trag și alte departamente. Intervalul de start și obiectivele le sincronizăm la întâlnire.","Proba și primele 90 de zile. Propun o perioadă de probă de 2-3 luni cu obiective convenite împreună. 30 de zile — pe teren, analiza pâlniei, a dealerilor și a clienților adormiți. 60 — KPI, plan-realizat și reactivare. 90 — primele cifre măsurabile la revenirea clienților și debitoare. Dacă nu vedeți rezultat concret, e dreptul dvs. să nu continuați. Testul îl propun eu."]}}},{"id":"victorii","label":"Primele victorii rapide propuse","final":{"ru":{"heading":"Первые быстрые победы (Quick Wins) — рабочие гипотезы на первые 60–90 дней","intro":"Сразу оговорюсь, чтобы не было ощущения, что я пришёл со стороны всё про вас знать: ниже — гипотезы, а не готовый вердикт. Точные шаги, цифры и приоритеты мы утвердим вместе после того, как я увижу вашу базу, отчётность, реальные сделки и поговорю с руководителями филиалов и с производством. Поэтому первые ~2 недели для меня — это не действия, а тихий аудит: сесть с РОПами, посмотреть, как на самом деле ведутся сделки, понять ваши контракты с ArcelorMittal/Fakro/Rockwool и сезон. И ещё одно важное: я готов первые месяцы работать руками — сам ездить по филиалам, сам сидеть на встречах с дилерами и прорабами, а не управлять из кабинета. Я опираюсь на уже существующие активы холдинга «Lider»: базу клиентов за 20+ лет, 10 филиалов, две компании (Esplan-Lux и Eurodesign, включая левый берег) и собственные бренды черепицы (Florentina, Lider, Melano). Логика последовательности продуманная: сначала победы, которые приносят деньги и НЕ ломают команду, цены и контракты, — и только когда я заработаю доверие, берёмся за более чувствительное. Сезон тоже учитываем: в пик (весна–осень) приоритет — активные продажи и дебиторка, в межсезонье — система, KPI и подготовка реактивации к следующему пику.","intro_note":"","points":["Фаза 1 (дни ~15–45), деньги без риска для команды — реактивация «спящих» B2B-клиентов, но сначала ПОЧЕМУ они ушли. Поднимаем по филиалам тех, кто покупал и пропал, и первым делом выясняем причину ухода: цена, логистика, сервис, ушли к конкуренту или просто закрылись — без этого обзвон наивен. При этом отделяем повторяемого B2B-клиента (дилер-перепродавец, стройкомпания, прораб, который строит постоянно) от разового клиента, сделавшего себе один дом: реактивируем в первую очередь повторяемых, для разовых — реферальные рекомендации. Замер: причины ухода по сегментам, число поднятых контактов, доля вернувшихся к покупке, сумма повторных отгрузок. Цель ставим совместно с вами после baseline, а не из головы.","Фаза 1 (дни ~15–45), второй безопасный источник денег — наведение порядка в дебиторке по филиалам. Сводим в единую картину: кто должен, сколько, сколько дней просрочки, по какому филиалу и менеджеру. Вводим простой регламент (лимиты, напоминания, и только при критической просрочке — пауза в отгрузке). Но по крупным и историческим клиентам работаю плечом к плечу с вами: финансовая дисциплина не должна стоить вам отношений, которые строились 15–20 лет. Замер: сумма просроченной дебиторки и её динамика, число «зависших» клиентов. Это напрямую освобождает оборотные деньги — быстрый эффект для собственника, и при этом не трогает цены и контракты.","Фаза 2 (дни ~45–90), после доверия — порядок и единые KPI в CRM, но через пилот на 1–2 филиалах, а не приказом сверху на всех 10. Сначала образец: единый стандарт ведения сделки (этапы, обязательные поля, причина отказа) и базовый набор KPI (звонки/встречи, конверсия из заявки в отгрузку, средний чек, дебиторка), вовлекаем руководителей пилотных филиалов, обучаем — и только потом тиражируем. Я заранее закладываю сопротивление: у вас 250+ человек и сильные директора на местах, поэтому мне нужна ваша видимая поддержка стандарта. И чтобы не было недопонимания: я НЕ прихожу продавать вам GO CRM. Свою систему я упоминаю только как доказательство, что строил такие вещи руками; внутри холдинга работаем на том инструменте, что у вас уже есть или что вам выгодно — донастрою, не ломая.","Фаза 2 (дни ~45–90), мой уникальный участок — связка производство–склад–продажи. Это та боль, которую вы сами назвали, и именно здесь работает моё сочетание «производитель + строитель + автоматизация». Сводим коммерческое предложение с реальными остатками склада и планом производства собственных брендов (Florentina, Lider, Melano), чтобы менеджеры не продавали то, чего нет, и не залёживалось то, что уже произвели. Дальше — цепочка продажи–склад–закупки–логистика–экспедиция. Замер: доля заказов «из наличия», скорость отгрузки, неликвиды по собственным брендам. Это и порядок, и деньги одновременно.","Рост, а не только порядок (параллельно, с прицелом на сезон) — пилот развития B2B-канала + аналитика маржи как инструмент, а не «корректировка прайса». По росту: на 1–2 филиалах пробуем активацию дилеров-перепродавцов и работу с застройщиками/стройкомпаниями и объектами, плюс отдельно смотрю левый берег (Eurodesign, Бендеры/Тирасполь) как самостоятельную возможность и фасадное направление (Rockwool/Isover/Fakro) как доп. чек к кровле; профнастил рассматриваю как генератор объёма и новых клиентов. По марже: я НЕ предлагаю менять цены с ходу. Сначала даю вам прозрачную картину маржи по группам/филиалам/брендам с учётом волатильности цены стали (coil ArcelorMittal), а решения по прайсу принимаем вместе. И главное — на встрече я хочу понять ваши минимальные объёмы и эксклюзивы по ArcelorMittal/Fakro/Rockwool: цель не каннибализировать ваш официальный импорт, а найти, где собственные бренды усиливают и марж​у, и лояльность дилеров.","Готовность отвечать за результат и пара вопросов к вам. Я принимаю формат «фикс + бонус на результат» и KPI — пороги, по которым меня можно судить, ставим совместно после того, как увидим baseline. И чтобы говорить на одном языке уже на встрече, мне важно услышать от вас: какие 3 цифры вы лично смотрите каждую неделю? Какие филиалы вас сейчас радуют, а какие беспокоят? И когда вы видите мой старт — в пик сезона или в межсезонье?"]},"ro":{"heading":"Primele victorii rapide (Quick Wins) — ipoteze de lucru pentru primele 60–90 de zile","intro":"Spun din start, ca să nu pară că vin din afară să vă învăț: mai jos sunt ipoteze, nu un verdict gata făcut. Pașii exacți, cifrele și prioritățile le validăm împreună după ce văd baza voastră, raportarea, vânzările reale și după ce vorbesc cu șefii de filiale și cu producția. De aceea primele ~2 săptămâni nu înseamnă acțiuni, ci un audit tăcut: stau cu șefii de vânzări, văd cum se duc de fapt vânzările, înțeleg contractele voastre cu ArcelorMittal/Fakro/Rockwool și sezonul. Și încă ceva important: sunt dispus ca în primele luni să lucrez cu mâinile — să merg eu pe filiale, să stau eu la întâlnirile cu dealeri și prorabi, nu să conduc din birou. Mă sprijin pe activele care există deja la holdingul „Lider”: baza de clienți de peste 20 de ani, cele 10 filiale, cele două companii (Esplan-Lux și Eurodesign, inclusiv malul stâng) și brandurile proprii de țiglă (Florentina, Lider, Melano). Logica secvenței e gândită: întâi victoriile care aduc bani și NU strică echipa, prețurile sau contractele — și abia după ce câștig încredere, atingem ce e mai sensibil. Țin cont și de sezon: în vârf (primăvară–toamnă) prioritatea e vânzarea activă și debitoarea, în extrasezon construim sistemul, KPI și pregătim reactivarea pentru următorul vârf.","intro_note":"","points":["Faza 1 (zilele ~15–45), bani fără risc pentru echipă — reactivarea clienților B2B „adormiți”, dar întâi DE CE au plecat. Ridicăm pe filiale cine a cumpărat și a dispărut și, înainte de orice, aflăm cauza plecării: preț, logistică, serviciu, au plecat la concurent sau pur și simplu s-au închis — fără asta, apelurile sunt naive. Totodată separăm clientul B2B repetitiv (dealer revânzător, firmă de construcții, prorab care construiește constant) de clientul one-shot care și-a făcut o singură casă: reactivăm întâi pe cei repetitivi, iar pentru one-shot mergem pe recomandări/referral. Măsurăm: cauzele plecării pe segmente, numărul de contacte readuse, ponderea celor reveniți, suma livrărilor repetate. Ținta o stabilim împreună cu dumneavoastră după baseline, nu din burtă.","Faza 1 (zilele ~15–45), a doua sursă sigură de bani — ordine în debitoare pe filiale. Aducem totul într-o imagine unică: cine datorează, cât, câte zile de întârziere, pe ce filială și manager. Introducem un regulament simplu (limite, memento-uri și, doar la întârziere critică, pauză de livrare). Dar pe clienții mari și istorici lucrez cot la cot cu dumneavoastră: disciplina financiară nu trebuie să coste relațiile clădite în 15–20 de ani. Măsurăm: suma debitoarei restante și dinamica ei, numărul de clienți „blocați”. Eliberează direct bani din circulant — efect rapid pentru proprietar, fără să atingă prețurile sau contractele.","Faza 2 (zilele ~45–90), după ce există încredere — ordine și KPI unitari în CRM, dar printr-un pilot pe 1–2 filiale, nu prin ordin de sus pe toate cele 10. Întâi un model: standard unic de lucru pe vânzare (etape, câmpuri obligatorii, motivul refuzului) și un set de bază de KPI (apeluri/întâlniri, conversie din cerere în livrare, cec mediu, debitoare), implicăm șefii filialelor-pilot, instruim — și abia apoi tiražăm. Anticipez rezistența: aveți 250+ oameni și directori puternici pe teren, deci am nevoie de susținerea dumneavoastră vizibilă pentru standard. Și ca să fie clar: NU vin să vă vând GO CRM. Sistemul meu îl pomenesc doar ca dovadă că am construit astfel de lucruri cu mâinile; în interiorul holdingului lucrăm pe instrumentul pe care îl aveți deja sau care vă convine — îl reglez fin, fără să-l stric.","Faza 2 (zilele ~45–90), zona mea unică — legătura producție–depozit–vânzări. E durerea pe care ați numit-o chiar dumneavoastră și exact aici lucrează combinația mea „producător + constructor + automatizare”. Aliniem oferta comercială cu stocul real de pe depozit și cu planul de producție al brandurilor proprii (Florentina, Lider, Melano), ca să nu se vândă ce nu există și să nu zacă ce s-a produs deja. Mai departe — lanțul vânzări–depozit–achiziții–logistică–expediții. Măsurăm: ponderea comenzilor „din stoc”, viteza de livrare, nelichidele pe brandurile proprii. E și ordine, și bani în același timp.","Creștere, nu doar ordine (în paralel, cu ochiul pe sezon) — pilot de dezvoltare a canalului B2B + analiză de marjă ca instrument, nu „corecție de preț”. La creștere: pe 1–2 filiale testăm activarea dealerilor revânzători și lucrul cu dezvoltatori/firme de construcții și obiecte, plus privesc separat malul stâng (Eurodesign, Bender/Tiraspol) ca oportunitate de sine stătătoare și direcția fațade (Rockwool/Isover/Fakro) ca adaos la acoperiș; profnastilul îl văd ca generator de volum și de clienți noi. La marjă: NU propun să schimb prețurile din mers. Întâi vă dau o imagine transparentă a marjei pe grupe/filiale/branduri, ținând cont de volatilitatea prețului oțelului (coil ArcelorMittal), iar deciziile de preț le luăm împreună. Și esențial — la întâlnire vreau să înțeleg volumele minime și exclusivitățile pe ArcelorMittal/Fakro/Rockwool: scopul nu e să canibalizez importul vostru oficial, ci să găsesc unde brandurile proprii întăresc și marja, și fidelitatea dealerilor.","Disponibilitate la responsabilitate și câteva întrebări pentru dumneavoastră. Accept formatul „fix + bonus pe rezultat” și KPI — pragurile pe care pot fi judecat le stabilim împreună după ce vedem baseline-ul. Și ca să vorbim aceeași limbă chiar de la întâlnire, îmi e important să aud de la dumneavoastră: care sunt cele 3 cifre pe care le urmăriți personal în fiecare săptămână? Ce filiale vă bucură acum și care vă îngrijorează? Și cum vedeți startul meu — în plin sezon sau în extrasezon?"]}}},{"id":"cta","label":"Închidere / pas următor","final":{"ru":{"heading":"К нашей встрече: как я вижу первые шаги","intro":"К нашей встрече я подготовился предметно — не как кандидат, который ищет место, а как человек, который уже изучил «Лидер»: два юрлица (Esplan-Lux и Eurodesign с выходом на левый берег), собственные марки черепицы Florentina, Lider, Melano с лучшей маржой, портфель ArcelorMittal/Fakro/Rockwool и сеть из ~10 филиалов. Это и есть та сцена, на которой я хочу работать. Ниже — мой угол атаки, чтобы на встрече мы сверяли конкретику, а не знакомились заново.","points":["Мой угол, которого нет у обычного коммерческого кандидата: я говорю на одном языке с клиентом, с прорабом на объекте и с производством — прошёл путь и как продавец стройматериалов, и как строитель «под ключ», и как предприниматель, выстроивший бизнес на CRM и автоматизации. То есть приношу ровно ту систему контроля воронки и KPI, которой вам не хватает, и при этом понимаю стройку и сезонность кровли изнутри.","Зона, за которую я реально отвечаю как директор по развитию/коммерции: B2B-направление (дилеры и стройка), возврат «спящих» клиентов и дисциплина продаж в CRM. Закупки, логистику и дебиторку не «забираю под контроль» с первого дня — это смежные зоны, где я выстраиваю взаимодействие, а не ломаю то, что уже работает.","Сначала слушаю, потом меняю: первые 2–3 недели — это филиалы, РОПы, реальные потоки и аудит воронки и базы неактивных клиентов за последние 12–18 месяцев. Моя задача — усилить ваших руководителей филиалов и РОПов, а не напугать их «реформами».","Гипотезы KPI на 90 дней — как пример того, КАК я мыслю в цифрах (точные значения уточним под ваши реалии): реактивация N «спящих» B2B-дилеров за квартал; единая воронка в CRM по всем филиалам с дисциплиной заполнения и видимым дашбордом для руководства; сокращение просроченной дебиторки по дилерам и скорость «запрос → коммерческое предложение». Отдельный фокус — рост доли собственных марок (Florentina/Lider/Melano) в продажах.","Предлагаю агенду встречи в 4 блока: (1) точная зона ответственности и роль; (2) KPI на 90 дней; (3) формат и условия — full-time, испытательный период, фикс + бонус за результат; (4) первые шаги и пробные 30–60–90 дней, чтобы вы могли безопасно проверить меня результатом в полях. Горизонт 12 месяцев я тоже держу в голове: системная B2B-машина по филиалам, возвращённые дилеры и управляемая дебиторка.","По срокам конкретно: готов выйти в течение 2 недель после договорённости и в первый же месяц показать результат в полях. — Олег Гилецки. Скажите, какой день вам удобен, — подстроюсь."]},"ro":{"heading":"Pentru întâlnirea noastră: cum văd primii pași","intro":"Pentru întâlnirea noastră m-am pregătit la concret — nu ca un candidat care caută un loc, ci ca un om care a studiat deja «Lider»: două entități juridice (Esplan-Lux și Eurodesign, cu acoperire pe malul stâng), mărcile proprii de țiglă Florentina, Lider, Melano cu marja cea mai bună, portofoliul ArcelorMittal/Fakro/Rockwool și rețeaua de ~10 filiale. Aceasta este scena pe care vreau să lucrez. Mai jos e ordinea mea de atac, ca la întâlnire să sincronizăm concretul, nu să ne cunoaștem din nou.","points":["Unghiul meu, pe care un candidat comercial obișnuit nu îl are: vorbesc aceeași limbă cu clientul, cu prorabul de pe șantier și cu producția — am parcurs drumul și ca vânzător de materiale de construcții, și ca constructor «la cheie», și ca antreprenor care și-a clădit afacerea pe CRM și automatizare. Adică aduc exact sistemul de control al pâlniei și de KPI care vă lipsește, înțelegând în același timp șantierul și sezonalitatea acoperișurilor din interior.","Zona de care răspund realist ca director de dezvoltare/comercial: direcția B2B (dealeri și șantiere), revenirea clienților «adormiți» și disciplina vânzărilor în CRM. Achizițiile, logistica și debitoarea nu le «preiau sub control» din prima zi — sunt zone conexe, unde construiesc interfața și colaborarea, nu sparg ce funcționează deja.","Întâi ascult, apoi schimb: primele 2–3 săptămâni înseamnă filialele, ROP-ii, fluxurile reale și un audit al pâlniei și al bazei de clienți inactivi din ultimele 12–18 luni. Scopul meu e să vă întăresc directorii de filiale și ROP-ii, nu să-i sperii cu «reforme».","Ipoteze de KPI pentru 90 de zile — ca exemplu al modului în care gândesc în cifre (valorile exacte le calibrăm pe realitățile dumneavoastră): reactivarea a N dealeri B2B «adormiți» pe trimestru; o pâlnie unică în CRM pe toate filialele, cu disciplină de completare și un dashboard vizibil pentru management; reducerea debitoarei restante pe dealeri și viteza «cerere → ofertă». Un focus separat — creșterea ponderii mărcilor proprii (Florentina/Lider/Melano) în vânzări.","Vă propun o agendă a întâlnirii în 4 blocuri: (1) zona exactă de responsabilitate și rolul; (2) KPI pe 90 de zile; (3) formatul și condițiile — full-time, perioadă de probă, fix + bonus pe rezultat; (4) primii pași și o probă de 30–60–90 de zile, ca să mă puteți verifica în siguranță prin rezultat în teren. Țin în minte și orizontul de 12 luni: o mașină B2B sistematizată pe filiale, dealeri readuși și o debitoare ținută sub control.","La termene, concret: pot începe în maximum 2 săptămâni de la acord și pot arăta rezultat în teren chiar din prima lună. — Oleg Ghiletchi. Spuneți-mi ce zi vă convine și mă aliniez."]}}}]</script>
<script>
var SECTIONS=JSON.parse(document.getElementById('data').textContent);
var EB={"hero":{"ru":"Кандидатура · конфиденциально","ro":"Candidatură · confidențial"},"holding":{"ru":"Я изучил холдинг","ro":"Am studiat holdingul"},"diagnoza":{"ru":"Что я вижу · возможности","ro":"Ce văd · oportunități"},"avantaj":{"ru":"Почему я","ro":"De ce eu"},"plan":{"ru":"План 30 / 60 / 90 дней","ro":"Plan 30 / 60 / 90 zile"},"raspunsuri":{"ru":"Ответы на ваши вопросы","ro":"Răspunsuri la întrebările voastre"},"victorii":{"ru":"Первые быстрые победы","ro":"Primele victorii rapide"},"cta":{"ru":"Следующий шаг","ro":"Pasul următor"}};
var FOOT={ru:'Конфиденциальный материал, подготовленный к личной встрече. Данные о холдинге собраны из открытых источников и подлежат уточнению. © Oleg Ghiletchi.',ro:'Material confidențial, pregătit pentru întâlnirea personală. Datele despre holding sunt din surse publice și se vor confirma. © Oleg Ghiletchi.'};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function byId(id){return SECTIONS.find(function(s){return s.id===id;});}
function render(lang){
  document.documentElement.lang=lang;
  var app=document.getElementById('app');
  var H='';
  // HERO
  var hero=byId('hero').final[lang];
  H+='<section class="hero wrap reveal"><div class="name">Oleg Ghiletchi · Олег Гилецки</div>';
  H+='<div class="eyebrow">'+esc(EB.hero[lang])+'</div>';
  H+='<h1>'+esc(hero.heading)+'</h1>';
  H+='<div class="intro">'+esc(hero.intro)+'</div>';
  H+='<div class="chips">'+hero.points.map(function(p){return '<div class="chip">'+esc(p)+'</div>';}).join('')+'</div>';
  H+='</section>';
  // generic card sections
  function cardSec(id){
    var d=byId(id).final[lang];
    var s='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB[id][lang])+'</div><h2>'+esc(d.heading)+'</h2>';
    if(d.intro) s+='<p class="intro">'+esc(d.intro)+'</p>';
    s+='</div><div class="grid">'+d.points.map(function(p){return '<div class="card"><span class="mk"></span><p>'+esc(p)+'</p></div>';}).join('')+'</div></section>';
    return s;
  }
  H+=cardSec('holding');
  H+=cardSec('diagnoza');
  H+=cardSec('avantaj');
  // PLAN timeline
  var pl=byId('plan').final[lang];
  H+='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB.plan[lang])+'</div><h2>'+esc(pl.heading)+'</h2>';
  if(pl.intro)H+='<p class="intro">'+esc(pl.intro)+'</p>';
  H+='</div><div class="timeline">'+pl.points.map(function(p,i){
    var parts=p.split(/s[—–-]s/);
    var k=parts.length>1?parts.shift():(lang==='ru'?'Этап '+(i+1):'Etapa '+(i+1));
    var body=parts.join(' — ');
    return '<div class="phase"><div class="ph-k">'+esc(k)+'</div><p>'+esc(body)+'</p></div>';
  }).join('')+'</div></section>';
  // RASPUNSURI qa
  var qa=byId('raspunsuri').final[lang];
  H+='<section class="wrap reveal"><div class="sec-head"><div class="eyebrow">'+esc(EB.raspunsuri[lang])+'</div><h2>'+esc(qa.heading)+'</h2>';
  if(qa.intro)H+='<p class="intro">'+esc(qa.intro)+'</p>';
  H+='</div><div class="qa">'+qa.points.map(function(p,i){return '<div class="item"><div class="n">'+(i+1)+'</div><p>'+esc(p)+'</p></div>';}).join('')+'</div></section>';
  // VICTORII
  H+=cardSec('victorii');
  // CTA
  var c=byId('cta').final[lang];
  H+='<section class="cta wrap reveal"><div class="eyebrow">'+esc(EB.cta[lang])+'</div><h2 style="margin:12px 0 16px">'+esc(c.heading)+'</h2>';
  if(c.intro)H+='<p class="intro">'+esc(c.intro)+'</p>';
  H+='<div class="cta-card">'+c.points.map(function(p){return '<div class="line">'+esc(p)+'</div>';}).join('')+'</div></section>';
  app.innerHTML=H;
  document.getElementById('foot').textContent=FOOT[lang];
  // toggle buttons
  [].slice.call(document.querySelectorAll('.langtg button')).forEach(function(b){b.classList.toggle('on',b.getAttribute('data-l')===lang);});
  try{localStorage.setItem('oleg_lang',lang);}catch(e){}
  // reveal
  requestAnimationFrame(function(){
    var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
    document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
  });
}
document.querySelectorAll('.langtg button').forEach(function(b){b.addEventListener('click',function(){render(b.getAttribute('data-l'));});});
var saved='ru';try{saved=localStorage.getItem('oleg_lang')||'ru';}catch(e){}
render(saved);
</script>
</body>
</html>
